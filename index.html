<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab</title>
    <!-- Tailwind CSS for modern layout styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- Pyodide to run Python directly inside the browser -->
    <script src="https://jsdelivr.net"></script>
    <!-- Chart.js for automatic graphing capabilities -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-6">

    <div class="max-w-3xl w-full bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
        <h1 class="text-3xl font-extrabold text-indigo-400 mb-2 text-center">📐 Universal Math Engine</h1>
        <p class="text-gray-400 text-center mb-6 text-sm">Solves algebra, limits, derivatives, integrals, and matrices locally.</p>

        <!-- Status indicator for the Python framework engine -->
        <div id="status" class="bg-amber-900/40 text-amber-300 text-xs px-3 py-2 rounded-lg mb-6 border border-amber-700 text-center font-mono">
            ⏳ Initializing internal math core engines... Please wait.
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Select Math Problem Category:</label>
                <select id="mode" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-indigo-500 outline-none" onchange="updatePlaceholder()">
                    <option value="simplify">Simplify Expression (e.g., (x**2 - 1)/(x - 1))</option>
                    <option value="solve">Solve Equation for X (e.g., x**2 - 5*x + 6)</option>
                    <option value="derivative">Find Derivative (d/dx) (e.g., sin(x) * x**2)</option>
                    <option value="integral">Find Integral (∫) (e.g., 2*x + 5)</option>
                    <option value="limit">Find Limit (x → 0) (e.g., sin(x)/x)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-1">Enter Mathematical Expression:</label>
                <input type="text" id="mathInput" placeholder="Enter math formula here..." class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white font-mono focus:ring-2 focus:ring-indigo-500 outline-none">
                <span class="text-xs text-gray-500 mt-1 block">Note: Use * for multiplication (2*x) and ** for exponents (x**2).</span>
            </div>

            <button onclick="processMath()" id="solveBtn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg transition dynamic-btn shadow-md cursor-not-allowed">
                Compute Solution
            </button>
        </div>

        <!-- Output section containing results and plots -->
        <div id="outputContainer" class="hidden mt-8 space-y-4 border-t border-gray-700 pt-6">
            <h3 class="text-lg font-bold text-gray-200">Result Trace:</h3>
            <div id="result" class="bg-gray-950 p-4 rounded-lg border border-gray-800 font-mono text-emerald-400 overflow-x-auto whitespace-pre-wrap"></div>
            
            <div id="graphContainer" class="hidden bg-gray-950 p-4 rounded-lg border border-gray-800">
                <h4 class="text-sm font-semibold text-gray-400 mb-2">Visual Function Plot:</h4>
                <canvas id="mathChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let pyodide;
        let chartInstance = null;

        // Dynamic placeholder helper text update
        function updatePlaceholder() {
            const mode = document.getElementById('mode').value;
            const input = document.getElementById('mathInput');
            if(mode === 'simplify') input.placeholder = "(x**2 - 1)/(x - 1)";
            if(mode === 'solve') input.placeholder = "x**2 - 5*x + 6";
            if(mode === 'derivative') input.placeholder = "sin(x) * x**2";
            if(mode === 'integral') input.placeholder = "2*x + 5";
            if(mode === 'limit') input.placeholder = "sin(x)/x";
        }

        // Initialize Python core script inside the browser context
        async function initPyodide() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage("sympy");
                
                // Initialize standard symbolic variables inside workspace 
                await pyodide.runPythonAsync(`
                    import sympy as sp
                    x, y, z = sp.symbols('x y z')
                `);

                document.getElementById('status').className = "bg-emerald-950/40 text-emerald-400 text-xs px-3 py-2 rounded-lg mb-6 border border-emerald-800 text-center font-mono";
                document.getElementById('status').innerText = "✅ Core Engine Active. Ready to solve calculations.";
                const btn = document.getElementById('solveBtn');
                btn.disabled = false;
                btn.classList.remove('cursor-not-allowed', 'disabled:bg-gray-600');
            } catch (err) {
                document.getElementById('status').innerText = "❌ Engine initialization failed: " + err.message;
            }
        }

        async function processMath() {
            const mode = document.getElementById('mode').value;
            const rawExpression = document.getElementById('mathInput').value.trim();
            const resultBox = document.getElementById('result');
            const outputContainer = document.getElementById('outputContainer');
            const graphContainer = document.getElementById('graphContainer');

            if (!rawExpression) return alert("Please type an algebraic expression first.");

            outputContainer.classList.remove('hidden');
            resultBox.innerText = "Computing math processing loops...";
            graphContainer.classList.add('hidden');

            try {
                // Pass target values to Python variables safely
                pyodide.globals.set("user_expr", rawExpression);
                
                let pythonScript = "";
                if (mode === "simplify") pythonScript = "str(sp.simplify(user_expr))";
                if (mode === "solve") pythonScript = "str(sp.solve(sp.Eq(sp.sympify(user_expr), 0), x))";
                if (mode === "derivative") pythonScript = "str(sp.diff(user_expr, x))";
                if (mode === "integral") pythonScript = "str(sp.integrate(user_expr, x))";
                if (mode === "limit") pythonScript = "str(sp.limit(user_expr, x, 0))";

                let outcome = await pyodide.runPythonAsync(pythonScript);
                resultBox.innerText = `Final Mathematical Solution:\n\n${outcome}`;

                // Dynamically plot numeric ranges if 'x' is included in expression sequence
                if (rawExpression.includes('x') && mode !== 'solve') {
                    generatePlot(rawExpression);
                }
            } catch(e) {
                resultBox.innerText = `Parsing Error Detected:\n\n${e.message}\n\nTip: Ensure variables match Python markup rules (e.g. use 3*x instead of 3x).`;
            }
        }

        async function generatePlot(expression) {
            try {
                // Compute array matrices values mapping x values to numeric ranges [-10, 10]
                const xValues = [];
                const yValues = [];
                for (let i = -10; i <= 10; i += 0.5) {
                    xValues.push(i);
                }

                pyodide.globals.set("x_arr", xValues);
                const pyPlotScript = `
                    expr_parsed = sp.sympify(user_expr)
                    y_out = []
                    for val in x_arr:
                        try:
                            res = float(expr_parsed.subs(x, val).evalf())
                            y_out.append(res)
                        except:
                            y_out.append(None)
                    y_out
                `;
                
                let yOutputs = await pyodide.runPythonAsync(pyPlotScript);
                const cleanY = yOutputs.toJs();

                document.getElementById('graphContainer').classList.remove('hidden');
                const ctx = document.getElementById('mathChart').getContext('2d');
                
                if (chartInstance) chartInstance.destroy();

                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: xValues,
                        datasets: [{
                            label: `f(x) = ${expression}`,
                            data: cleanY,
                            borderColor: 'rgb(99, 102, 241)',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            borderWidth: 2,
                            tension: 0.2,
                            spanGaps: false
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } },
                            y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af' } }
                        }
                    }
                });
            } catch (err) {
                console.log("Plot pipeline skipped: ", err);
            }
        }

        // Fire initialization sequence on DOM payload ready state
        initPyodide();
    </script>
</body>
</html>
