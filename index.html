<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Tycoon</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b1016;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            gap: 20px;
            height: 95vh;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        canvas {
            background-color: #121820;
            border: 2px solid #233043;
            border-radius: 8px;
            cursor: pointer;
        }
        #stats-panel {
            background: #161f2c;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            font-weight: bold;
            border: 1px solid #233043;
        }
        .stat { color: #4caf50; }
        .stat-money { color: #ffd700; }
        .stat-hp { color: #f44336; }
        
        #tycoon-panel {
            flex: 1;
            background: #161f2c;
            border: 2px solid #233043;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            color: #ffd700;
            border-bottom: 2px solid #233043;
            padding-bottom: 5px;
            font-size: 1.4em;
        }
        .category-title {
            font-size: 1.1em;
            color: #00bcd4;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .upgrade-card {
            background: #233043;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .upgrade-card:hover {
            border-color: #00bcd4;
            background: #2c3e50;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .upgrade-name {
            font-weight: bold;
            font-size: 0.95em;
        }
        .upgrade-desc {
            font-size: 0.8em;
            color: #b0bec5;
        }
        .upgrade-level {
            font-size: 0.8em;
            color: #4caf50;
            font-weight: bold;
        }
        .upgrade-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }
        .upgrade-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .build-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .build-btn {
            flex: 1;
            padding: 8px;
            background: #233043;
            border: 1px solid #34495e;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .build-btn.active {
            background: #00bcd4;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stats-panel">
            <div>Wave: <span id="wave-txt" class="stat">1</span></div>
            <div>Cash: $<span id="cash-txt" class="stat-money">500</span></div>
            <div>Income: $<span id="income-txt" class="stat-money">10</span>/s</div>
            <div>Base HP: <span id="hp-txt" class="stat-hp">100</span></div>
        </div>
        <div class="build-selector">
            <button class="build-btn active" id="btn-t1" onclick="setBuildType(1)">Basic Gun ($100)</button>
            <button class="build-btn" id="btn-t2" onclick="setBuildType(2)">Plasma Beam ($250)</button>
        </div>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
    </div>

    <div id="tycoon-panel">
        <h2>Tycoon Core Upgrades (30 Protocols)</h2>
        <div id="upgrades-container"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Core Game Variables
        let cash = 500;
        let baseHp = 100;
        let maxBaseHp = 100;
        let passiveIncome = 10;
        let wave = 1;
        let waveTimer = 0;
        let selectedBuildType = 1;

        // Configuration Modifiers (Affected by upgrades)
        let globalDamageMult = 1.0;
        let globalRangeMult = 1.0;
        let globalSpeedMult = 1.0;
        let killRewardMult = 1.0;
        let sellReturnRate = 0.5;
        let goldPerHit = 0;
        let interestRate = 0;
        let criticalChance = 0;
        let plasmaSlowAmount = 0;

        // Path configurations
        const path = [
            {x: 0, y: 120}, {x: 200, y: 120}, {x: 200, y: 360},
            {x: 440, y: 360}, {x: 440, y: 200}, {x: 640, y: 200}
        ];

        let towers = [];
        let enemies = [];
        let projectiles = [];

        // Definition of the 30 unique multi-level tycoon upgrades
        const upgradesConfig = [

            { id: 2, cat: "Economy", name: "Bounty Contracts", desc: "Earn extra money from every enemy eliminated.", lvl: 0, max: 70, cost: 150, scale: 1.6, effect: () => { killRewardMult += 0.2; } },
            { id: 3, cat: "Economy", name: "Corporate Interest", desc: "Earn 2% of your current cash at the end of each wave.", lvl: 0, max: 5, cost: 300, scale: 2.0, effect: () => { interestRate += 0.02; } },
            { id: 4, cat: "Economy", name: "Siphon rounds", desc: "Gain pocket money every single time a projectile strikes an enemy.", lvl: 0, max: 5, cost: 400, scale: 1.8, effect: () => { goldPerHit += 1; } },
            { id: 5, cat: "Economy", name: "Liquidation Policy", desc: "Improves refund money recovered when removing towers.", lvl: 0, max: 3, cost: 200, scale: 2.2, effect: () => { sellReturnRate += 0.15; } },
            { id: 6, cat: "Economy", name: "Crypto Mining Rig", desc: "Provides a flat mega lump sum injection instantly.", lvl: 0, max: 10, cost: 500, scale: 1.7, effect: () => { cash += 400; } },
            { id: 7, cat: "Economy", name: "Wholesale Permits", desc: "Reduces original placement costs of all defense layout units.", lvl: 0, max: 5, cost: 600, scale: 1.6, effect: () => { /* Calculated dynamically */ } },
            { id: 8, cat: "Economy", name: "Hyper Inflation Engine", desc: "Boosts overall passive generation power levels globally.", lvl: 0, max: 3, cost: 1200, scale: 2.5, effect: () => { passiveIncome *= 1.3; } },

            // CATEGORY 2: COMBAT MATRIX (9-16)
            { id: 9, cat: "Combat", name: "Caliber Overhaul", desc: "Augments baseline impact output damage points directly.", lvl: 0, max: 10, cost: 100, scale: 1.5, effect: () => { globalDamageMult += 0.15; } },
            { id: 10, cat: "Combat", name: "Polished Focal Lenses", desc: "Widens target validation tracking grid footprint scopes.", lvl: 0, max: 10, cost: 120, scale: 1.4, effect: () => { globalRangeMult += 0.08; } },
            { id: 11, cat: "Combat", name: "Overclocked Rotors", desc: "Enables modules to fire rapid munitions configurations.", lvl: 0, max: 8, cost: 200, scale: 1.6, effect: () => { globalSpeedMult += 0.12; } },
            { id: 12, cat: "Combat", name: "Weakspot Protocols", desc: "Grants a chance to land double damage critical hits.", lvl: 0, max: 5, cost: 350, scale: 1.8, effect: () => { criticalChance += 0.06; } },
            { id: 13, cat: "Combat", name: "Dense Alloys", desc: "Increases basic gun projectile speeds.", lvl: 0, max: 5, cost: 150, scale: 1.4, effect: () => { } },
            { id: 14, cat: "Combat", name: "Cryo Cores", desc: "Plasma beams lower enemy movement parameters upon impact.", lvl: 0, max: 5, cost: 400, scale: 1.7, effect: () => { plasmaSlowAmount += 0.1; } },
            { id: 15, cat: "Combat", name: "Uranium Coating", desc: "Adds tiny passive damage ticks over time.", lvl: 0, max: 5, cost: 500, scale: 1.9, effect: () => { globalDamageMult += 0.25; } },
            { id: 16, cat: "Combat", name: "Singularity Drive", desc: "Massive final scale execution damage threshold modifier.", lvl: 0, max: 2, cost: 2000, scale: 3.0, effect: () => { globalDamageMult *= 1.5; } },

            // CATEGORY 3: FORTRESS INFRASTRUCTURE (17-24)
            { id: 17, cat: "Fortress", name: "Titanium Bulkheads", desc: "Increases maximum health pool cap threshold limits.", lvl: 0, max: 10, cost: 100, scale: 1.4, effect: () => { maxBaseHp += 50; baseHp += 50; } },
            { id: 18, cat: "Fortress", name: "Nanite Restoration", desc: "Instantly fixes structure integrity stress values.", lvl: 0, max: 20, cost: 75, scale: 1.3, effect: () => { baseHp = Math.min(maxBaseHp, baseHp + 30); } },
            { id: 19, cat: "Fortress", name: "Reactive Spikes", desc: "Damages close range hostiles who strike defensive grids.", lvl: 0, max: 5, cost: 250, scale: 1.6, effect: () => { } },
