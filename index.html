<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Arena: Multiplayer Chaos</title>
    <!-- We use GunDB for instant, unblockable multiplayer sync on GitHub Pages -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #090d16;
            --surface: #121824;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #eab308;
            --border: #29354f;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h2 { margin: 0; color: var(--accent); font-size: 28px; text-shadow: 0 0 10px rgba(56,189,248,0.2); }
        
        .dashboard {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel-card {
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .score-card {
            border-color: var(--gold);
            color: var(--gold);
            font-size: 18px;
        }

        #game-canvas {
            background-color: #0f172a;
            border: 3px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }

        .status-footer { font-size: 13px; color: #64748b; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>

    <h2>SURVIVAL ARENA: MULTIPLAYER</h2>
    
    <div class="dashboard">
        <div class="panel-card"><span id="match-status-label">Lobby Status: Active Sandbox</span></div>
        <div class="panel-card score-card">Coins: <span id="score-val">0</span></div>
        <div class="panel-card" style="color: var(--success); border-color: var(--success);">⚡ Dash: <span id="boost-status">READY</span></div>
    </div>

    <canvas id="game-canvas" width="850" height="480"></canvas>
    
    <div class="status-footer">
        Controls: [W,A,S,D / Arrows] Move | [Spacebar] Dash Burst | Room: <span id="connection-status">Connecting to sync relay...</span>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Generate a unique ID for this player window
    const myId = 'player_' + Math.random().toString(36).substring(2, 9);
    
    // Connect to a public GunDB network node relay
    const gun = Gun(['https://herokuapp.com']);
    const gameRoom = gun.get('nexus_global_multiplayer_arena_v4');

    // Local player properties
    let me = {
        id: myId,
        x: Math.floor(Math.random() * 500) + 150,
        y: Math.floor(Math.random() * 250) + 100,
        color: `hsl(${Math.random() * 360}, 85%, 60%)`,
        score: 0
    };

    let players = {};
    let keysPressed = {};
    let speed = 5;
    let dashCooldown = 0;

    // Game Entities
    let coin = { x: 425, y: 240, radius: 9 };
    let aiBot = { x: 100, y: 100, radius: 15, speed: 2.2 };

    // --- NETWORK SYNC: Send our position to the cloud database ---
    function sendMyData() {
        gameRoom.get(myId).put({
            id: me.id,
            x: me.x,
            y: me.y,
            color: me.color,
            score: me.score,
            lastSeen: Date.now()
        });
    }

    // --- NETWORK SYNC: Listen for all other players joining ---
    gameRoom.map().on((playerData, id) => {
        if (!playerData) return;
        
        // If player has been offline for more than 7 seconds, remove them
        if (Date.now() - playerData.lastSeen > 7000) {
            delete players[id];
            return;
        }

        if (id !== myId) {
            players[id] = playerData;
        }
    });

    // Sync global coin coordinates through the database
    gameRoom.get('shared_coin_target').on((coinData) => {
        if (coinData) {
            coin.x = coinData.x;
            coin.y = coinData.y;
        }
    });

    document.getElementById('connection-status').textContent = "Connected to global peer chain!";

    // Input handlers
    window.addEventListener('keydown', (e) => { 
        keysPressed[e.key.toLowerCase()] = true; 
        
        // Spacebar Dash mechanics
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            if (dashCooldown <= 0) {
                executeBurstDash();
            }
        }
    });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function executeBurstDash() {
        let dx = 0; let dy = 0;
        if (keysPressed['w'] || keysPressed['arrowup']) dy = -1;
        if (keysPressed['s'] || keysPressed['arrowdown']) dy = 1;
        if (keysPressed['a'] || keysPressed['arrowleft']) dx = -1;
        if (keysPressed['d'] || keysPressed['arrowright']) dx = 1;

        if (dx !== 0 || dy !== 0) {
            let length = Math.hypot(dx, dy);
            me.x += (dx / length) * 50;
            me.y += (dy / length) * 50;
            dashCooldown = 60; // 1 second cooldown
            document.getElementById('boost-status').textContent = 'CHARGING';
            document.getElementById('boost-status').parentElement.style.borderColor = 'var(--danger)';
            document.getElementById('boost-status').parentElement.style.color = 'var(--danger)';
        }
    }

    function processGameLogic() {
        let moved = false;

        if (dashCooldown > 0) {
            dashCooldown--;
            if (dashCooldown === 0) {
                document.getElementById('boost-status').textContent = 'READY';
                document.getElementById('boost-status').parentElement.style.borderColor = 'var(--success)';
                document.getElementById('boost-status').parentElement.style.color = 'var(--success)';
            }
        }

        if (keysPressed['w'] || keysPressed['arrowup']) { me.y -= speed; moved = true; }
        if (keysPressed['s'] || keysPressed['arrowdown']) { me.y += speed; moved = true; }
        if (keysPressed['a'] || keysPressed['arrowleft']) { me.x -= speed; moved = true; }
        if (keysPressed['d'] || keysPressed['arrowright']) { me.x += speed; moved = true; }

        me.x = Math.max(16, Math.min(canvas.width - 16, me.x));
        me.y = Math.max(16, Math.min(canvas.height - 16, me.y));

        // Periodically announce presence and movement vectors
        if (moved || Math.random() < 0.05) {
            sendMyData();
        }

        // Count active network players
        let activeOpponents = Object.keys(players).length;
        const statusLabel = document.getElementById('match-status-label');
        
        if (activeOpponents > 0) {
            statusLabel.innerHTML = `Multiplayer Active: ${activeOpponents + 1} Players in Lobby ⚔️`;
        } else {
            statusLabel.innerHTML = 'Practice Mode: Waiting for human players...';
        }

        // --- Coin Gathering Mechanic ---
        if (Math.hypot(me.x - coin.x, me.y - coin.y) < 16 + coin.radius) {
            me.score++;
            document.getElementById('score-val').textContent = me.score;
            
            // Randomize and upload new shared coin coordinates to the database
            gameRoom.get('shared_coin_target').put({
                x: Math.floor(Math.random() * (canvas.width - 60)) + 30,
                y: Math.floor(Math.random() * (canvas.height - 60)) + 30
            });
            sendMyData();
        }

        // --- AI Chaser Drone (Only moves if you are alone) ---
        if (activeOpponents === 0) {
            let angle = Math.atan2(me.y - aiBot.y, me.x - aiBot.x);
            aiBot.x += Math.cos(angle) * (aiBot.speed + (me.score * 0.1));
            aiBot.y += Math.sin(angle) * (aiBot.speed + (me.score * 0.1));

            if (Math.hypot(me.x - aiBot.x, me.y - aiBot.y) < 16 + aiBot.radius) {
                me.score = 0;
                document.getElementById('score-val').textContent = me.score;
                aiBot.x = aiBot.x > canvas.width / 2 ? 40 : canvas.width - 40;
                aiBot.y = aiBot.y > canvas.height / 2 ? 40 : canvas.height - 40;
                sendMyData();
            }
        }
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        processGameLogic();

        // 1. Render Golden Coins
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'var(--gold)';
        ctx.shadowBlur = 15; ctx.shadowColor = 'var(--gold)';
        ctx.fill();
        ctx.closePath();
        ctx.shadowBlur = 0;

        // 2. Render Drone if singleplayer
        if (Object.keys(players).length === 0) {
            ctx.beginPath();
            ctx.arc(aiBot.x, aiBot.y, aiBot.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'var(--danger)';
            ctx.shadowBlur = 10; ctx.shadowColor = 'var(--danger)';
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        // 3. Render Opponent Players
        for (let id in players) {
            let p = players[id];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.closePath();

            // Label tag rendering
