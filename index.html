<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Matchmaking P2P Arena</title>
    <!-- PeerJS Framework Module -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin: 0; color: #38bdf8; }
        .setup-box {
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #334155;
            font-weight: 500;
        }
        #game-canvas {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        .status { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        .pulse {
            width: 8px; height: 8px; background: #eab308; border-radius: 50%;
            display: inline-block; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>Auto-Matchmaking Arena</h2>
    <p class="status">Move using <strong>W, A, S, D</strong> or the <strong>Arrow Keys</strong>.</p>

    <!-- Automated Status Panel Layout -->
    <div class="setup-box">
        <div id="lobby-pulse" class="pulse"></div>
        <span id="match-status-label">Initializing matchmaking matrix...</span>
    </div>

    <canvas id="game-canvas" width="800" height="450"></canvas>
    <p id="connection-status" class="status">Connecting to matchmaking services...</p>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Network & Game state tracking configurations
    let peer;
    let connections = [];
    let myId = null;
    let players = {};
    let speed = 5;
    let keysPressed = {};

    // Standard public cluster room name identifiers
    const LOBBY_HOST_ID = 'nexus_public_matchmaker_lobby_v1';
    let isHost = false;

    function createSelfPlayer(id) {
        myId = id;
        players[myId] = {
            id: myId,
            x: Math.floor(Math.random() * 600) + 100,
            y: Math.floor(Math.random() * 300) + 100,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`
        };
    }

    // Attempt to join as a client first to see if an active host exists
    function startMatchmaking() {
        const statusLabel = document.getElementById('match-status-label');
        statusLabel.innerHTML = 'Searching for an open match...';

        // 1. Initialize client peer profile using a randomized tracking string
        const clientRandomId = 'client_' + Math.random().toString(36).substring(2, 9);
        peer = new Peer(clientRandomId, {
            config: {
                'iceServers': [
                    { url: 'stun:://google.com' },
                    { url: 'stun:://google.com' }
                ]
            }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            
            // Try connecting directly to the designated Host ID slot
            const conn = peer.connect(LOBBY_HOST_ID);
            setupConnectionTracking(conn);

            // Timeout safety latch: If the host doesn't accept the connection, become the host instead
            setTimeout(() => {
                if (connections.length === 0 && !isHost) {
                    switchToHostMode();
                }
            }, 3000);
        });

        peer.on('error', (err) => {
            // Intercept taken broker errors gracefully to switch layout states
            if (err.type === 'unavailable-id') {
                switchToHostMode();
            }
        });
    }

    // 2. Initialize Host Profile mode if no active host is found
    function switchToHostMode() {
        if (isHost) return;
        isHost = true;
        
        if (peer) peer.destroy();

        const statusLabel = document.getElementById('match-status-label');
        const pulse = document.getElementById('lobby-pulse');
        
        statusLabel.innerHTML = 'Waiting for players to join your session...';
        pulse.style.backgroundColor = '#10b981'; // Green status anchor

        // Bind directly to the standard public room ID slot
        peer = new Peer(LOBBY_HOST_ID, {
            config: {
                'iceServers': [
                    { url: 'stun:://google.com' },
                    { url: 'stun:://google.com' }
                ]
            }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            document.getElementById('connection-status').textContent = "Lobby active. You are the host.";
        });

        peer.on('connection', (conn) => {
            setupConnectionTracking(conn);
        });
    }

    function setupConnectionTracking(conn) {
        conn.on('open', () => {
            connections.push(conn);
            document.getElementById('match-status-label').innerHTML = 'Match Found! Opponent Connected. 🔥';
            document.getElementById('lobby-pulse').style.backgroundColor = '#2563eb'; // Blue active status
            document.getElementById('connection-status').textContent = "Arena synchronized via peer pipelines.";
            
            // Send local player properties to the connected peer
            conn.send({ type: 'handshake', player: players[myId] });
        });

        conn.on('data', (data) => {
            if (data.type === 'handshake') {
                players[data.player.id] = data.player;
                conn.send({ type: 'sync', player: players[myId] });
            } 
            else if (data.type === 'sync') {
                players[data.player.id] = data.player;
            } 
            else if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
            }
        });

        conn.on('close', () => {
            document.getElementById('match-status-label').innerHTML = 'Opponent left. Re-entering matchmaking...';
            document.getElementById('lobby-pulse').style.backgroundColor = '#eab308';
            connections = connections.filter(c => c !== conn);
            
            // Clean up left player reference
            for (let id in players) {
                if (id !== myId) delete players[id];
            }

            if (!isHost) {
                switchToHostMode();
            }
        });
    }

    // Input collection listeners
    window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function broadcastMovement(x, y) {
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({ type: 'move', id: myId, x: x, y: y });
            }
        });
    }

    function processMovementLogic() {
        if (!myId || !players[myId]) return;

        let me = players[myId];
        let changed = false;

        if (keysPressed['w'] || keysPressed['arrowup']) { me.y -= speed; changed = true; }
        if (keysPressed['s'] || keysPressed['arrowdown']) { me.y += speed; changed = true; }
        if (keysPressed['a'] || keysPressed['arrowleft']) { me.x -= speed; changed = true; }
        if (keysPressed['d'] || keysPressed['arrowright']) { me.x += speed; changed = true; }

        me.x = Math.max(16, Math.min(canvas.width - 16, me.x));
        me.y = Math.max(16, Math.min(canvas.height - 16, me.y));

        if (changed) {
            broadcastMovement(me.x, me.y);
        }
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        processMovementLogic();

        for (let id in players) {
            let p = players[id];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            
            if (id === myId) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            ctx.closePath();
        }

        requestAnimationFrame(renderLoop);
    }

    // Boot up automated matchmaking initialization sequence
    startMatchmaking();
    renderLoop();
</script>
</body>
</html>
