<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --browser-frame: #1e293b;
            --url-bar: #0f172a;
            --viewport-bg: #ffffff;
            --accent: #38bdf8;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .browser-container {
            width: 100%;
            max-width: 950px;
            background-color: var(--browser-frame);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* Top Navigation Bar Tabs */
        .tab-strip {
            display: flex;
            background-color: #0b0f19;
            padding: 8px 8px 0 8px;
            gap: 4px;
            overflow-x: auto;
        }

        .tab {
            background-color: #1e293b;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            max-width: 150px;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .tab.active {
            background-color: var(--browser-frame);
            color: var(--text-light);
            border-color: var(--border);
        }

        .close-tab {
            margin-left: auto;
            color: #ef4444;
            font-weight: bold;
            cursor: pointer;
        }

        .add-tab-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 0 12px;
            align-self: center;
        }

        /* Address Bar Panel */
        .chrome-navigation {
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 10px;
            background-color: var(--browser-frame);
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            background: var(--url-bar);
            border: 1px solid var(--border);
            color: var(--text-light);
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background-color: var(--border); }

        .address-bar-input {
            flex: 1;
            background-color: var(--url-bar);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .address-bar-input:focus {
            border-color: var(--accent);
        }

        /* Bookmark Strip */
        .bookmark-bar {
            display: flex;
            gap: 12px;
            padding: 6px 12px;
            background-color: #131d31;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .bookmark-link {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }

        /* Main Display Screen Viewport */
        .viewport {
            flex: 1;
            background-color: var(--viewport-bg);
            color: var(--text-dark);
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }

        /* Built-in Mock Pages Templates Style rules */
        .welcome-screen { text-align: center; margin-top: 40px; }
        .welcome-screen h2 { color: #4f46e5; }
        
        .search-results-block { display: none; }
        .search-item { margin-bottom: 20px; }
        .search-item a { color: #1d4ed8; font-size: 18px; font-weight: 600; text-decoration: none; }
        .search-item p { margin: 4px 0 0 0; color: #4b5563; font-size: 14px; }

        .app-window { display: none; background: #f3f4f6; padding: 16px; border-radius: 8px; border: 1px solid #d1d5db; }
    </style>
</head>
<body>

<div class="browser-container">
    <!-- Top Tabs Strip -->
    <div class="tab-strip" id="tab-strip-container"></div>

    <!-- Navigation Control Frame -->
    <div class="chrome-navigation">
        <button class="nav-btn" onclick="browserBack()">◀</button>
        <button class="nav-btn" onclick="browserRefresh()">🔄</button>
        <button class="nav-btn" onclick="browserHome()">🏠</button>
        <input type="text" class="address-bar-input" id="browser-url-field" placeholder="Search internet or type a virtual domain URL...">
        <button class="nav-btn" onclick="toggleBookmark()">⭐</button>
    </div>

    <!-- Bookmarks Bar Component -->
    <div class="bookmark-bar" id="bookmarks-container"></div>

    <!-- Live Render Screen Window -->
    <div class="viewport" id="viewport-screen"></div>
</div>

<script>
    // In-memory data states
    let tabs = [
        { id: 1, title: "Home Network", url: "nexus://home", history: ["nexus://home"], historyIndex: 0 }
    ];
    let activeTabId = 1;
    let bookmarks = JSON.parse(localStorage.getItem('v_bookmarks')) || ["nexus://home", "nexus://search", "nexus://notes"];

    const tabStrip = document.getElementById('tab-strip-container');
    const urlField = document.getElementById('browser-url-field');
    const viewport = document.getElementById('viewport-screen');
    const bookmarksBar = document.getElementById('bookmarks-container');

    // Mock Databank Router for sites that bypass CORS limitations
    const mockInternetRegistry = {
        "nexus://home": `
            <div class="welcome-screen">
                <h2>Welcome to Nexus Virtual Web Studio</h2>
                <p>A completely sandbox-isolated browser environment built in HTML.</p>
                <div style="margin-top:24px; display:flex; gap:12px; justify-content:center;">
                    <button onclick="navigateViewport('nexus://search')" style="padding:10px 16px; background:#4f46e5; color:#fff; border:none; border-radius:6px; cursor:pointer;">Launch Search Nexus</button>
                    <button onclick="navigateViewport('nexus://notes')" style="padding:10px 16px; background:#10b981; color:#fff; border:none; border-radius:6px; cursor:pointer;">Open Local Notes Pad</button>
                </div>
            </div>`,
        "nexus://search": `
            <div style="max-width:500px; margin:0 auto; text-align:center;">
                <h2 style="color:#2563eb;">Search Nexus</h2>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="internal-search-input" placeholder="Search the mock web network..." style="flex:1; padding:10px; border:1px solid #cbd5e1; border-radius:6px;">
                    <button onclick="executeInternalSearch()" style="padding:10px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer;">Search</button>
                </div>
                <div id="internal-results" style="text-align:left; margin-top:20px;"></div>
            </div>`,
        "nexus://notes": `
            <div>
                <h3>Local Browser Scratchpad</h3>
                <textarea id="scratchpad-box" oninput="saveScratchNotes()" style="width:100%; height:200px; padding:12px; border:1px solid #cbd5e1; border-radius:8px; font-family:inherit;" placeholder="Draft anything here. This notepad uses absolute browser lifecycle persistence parameters..."></textarea>
                <p style="font-size:12px; color:#6b7280; margin-top:6px;">Changes commit directly onto local cache arrays automatically.</p>
            </div>`
    };

    function renderTabs() {
        tabStrip.innerHTML = '';
        tabs.forEach(t => {
            const tabEl = document.createElement('div');
            tabEl.className = `tab ${t.id === activeTabId ? 'active' : ''}`;
            tabEl.setAttribute('onclick', `switchTab(${t.id})`);
            tabEl.innerHTML = `
                <span>${t.title}</span>
                <span class="close-tab" onclick="closeTab(${t.id}); event.stopPropagation();">✕</span>
            `;
            tabStrip.appendChild(tabEl);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'add-tab-btn';
        addBtn.onclick = addNewTab;
        addBtn.textContent = '+';
        tabStrip.appendChild(addBtn);
    }

    function renderBookmarks() {
        bookmarksBar.innerHTML = '<span>Favorites: </span>';
        bookmarks.forEach(b => {
            const a = document.createElement('a');
            a.className = 'bookmark-link';
            a.textContent = b.replace('nexus://', '');
            a.onclick = () => navigateViewport(b);
            bookmarksBar.appendChild(a);
        });
        localStorage.setItem('v_bookmarks', JSON.stringify(bookmarks));
    }

    function switchTab(id) {
        activeTabId = id;
        const currentTab = tabs.find(t => t.id === activeTabId);
        urlField.value = currentTab.url;
