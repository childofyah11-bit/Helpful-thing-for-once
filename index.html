<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Guardian Arena</title>
    <style>
        :root {
            --bg: #090d16;
            --surface: #121824;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #eab308;
            --border: #29354f;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h2 { margin: 0; color: var(--accent); font-size: 28px; }
        
        .dashboard {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            align-items: center;
        }

        .panel-card {
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
        }

        .score-card { border-color: var(--gold); color: var(--gold); }
        .boss-card { border-color: var(--danger); color: var(--danger); }

        #game-canvas {
            background-color: #0f172a;
            border: 3px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }

        .status-footer { font-size: 13px; color: #64748b; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>

    <h2>ARCADE GUARDIAN ARENA</h2>
    
    <div class="dashboard">
        <div class="panel-card score-card">Score Coins: <span id="score-val">0</span></div>
        <div class="panel-card boss-card">Boss HP: <span id="boss-hp">100</span>%</div>
    </div>

    <canvas id="game-canvas" width="800" height="450"></canvas>
    
    <div class="status-footer">
        Controls: [W,A,S,D / Arrows] Move | [Spacebar] Fire Blaster Projectile
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Player state parameters
    let player = { x: 400, y: 300, radius: 15, speed: 5, color: '#38bdf8' };
    let score = 0;
    let keysPressed = {};

    // Projectile tracking array
    let lasers = [];

    // Boss parameters
    let boss = { x: 400, y: 100, radius: 30, speed: 2, hp: 100, maxHp: 100 };

    // Coin collectible
    let coin = { x: 200, y: 220, radius: 8 };

    window.addEventListener('keydown', (e) => { 
        keysPressed[e.key.toLowerCase()] = true; 
        
        // Shoot blaster bullet on spacebar down
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            fireLaser();
        }
    });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function fireLaser() {
        lasers.push({
            x: player.x,
            y: player.y - 15,
            speed: 8,
            radius: 4
        });
    }

    function gameLoop() {
        // --- 1. Movement Calculations ---
        if (keysPressed['w'] || keysPressed['arrowup']) player.y -= player.speed;
        if (keysPressed['s'] || keysPressed['arrowdown']) player.y += player.speed;
        if (keysPressed['a'] || keysPressed['arrowleft']) player.x -= player.speed;
        if (keysPressed['d'] || keysPressed['arrowright']) player.x += player.speed;

        // Wall barriers mapping
        player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
        player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

        // --- 2. Boss Track Mechanics ---
        let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.x += Math.cos(angle) * boss.speed;
        boss.y += Math.sin(angle) * boss.speed;

        // Player-to-Boss Collision
        if (Math.hypot(player.x - boss.x, player.y - boss.y) < player.radius + boss.radius) {
            score = 0; // Wipe points
            document.getElementById('score-val').textContent = score;
            boss.x = 400; boss.y = 100; // Reset boss position
        }

        // --- 3. Collectible Coin Detection ---
        if (Math.hypot(player.x - coin.x, player.y - coin.y) < player.radius + coin.radius) {
            score += 10;
            document.getElementById('score-val').textContent = score;
            coin.x = Math.floor(Math.random() * (canvas.width - 60)) + 30;
            coin.y = Math.floor(Math.random() * (canvas.height - 60)) + 30;
        }

        // --- 4. Laser Routing & Collision ---
        for (let i = lasers.length - 1; i >= 0; i--) {
            lasers[i].y -= lasers[i].speed; // Fly straight up

            // Check hit on boss
            if (Math.hypot(lasers[i].x - boss.x, lasers[i].y - boss.y) < lasers[i].radius + boss.radius) {
                boss.hp -= 5;
                if (boss.hp <= 0) {
                    boss.hp = 100; // Respawn boss loop
                    boss.speed += 0.5; // Escalate difficulty speed
                }
                document.getElementById('boss-hp').textContent = boss.hp;
                lasers.splice(i, 1);
                continue;
            }

            // Remove out of bound lasers
            if (lasers[i].y < 0) {
                lasers.splice(i, 1);
            }
        }

        // --- 5. Graphic Render Passing ---
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Render Coin
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'var(--gold)';
        ctx.fill();
        ctx.closePath();

        // Render Lasers
        ctx.fillStyle = 'var(--success)';
        lasers.forEach(l => {
            ctx.beginPath();
            ctx.arc(l.x, l.y, l.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        });

        // Render Boss
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'var(--danger)';
        ctx.fill();
        ctx.closePath();

        // Render Player
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.closePath();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
