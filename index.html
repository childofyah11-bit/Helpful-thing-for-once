<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommsStation: Automatic P2P Walkie-Talkie</title>
    <!-- Imports the PeerJS network engine library automatically -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-base: #11140f;
            --panel-card: #1c2217;
            --army-green: #4d5d3e;
            --neon-glow: #7fff00;
            --alert-red: #ff3333;
            --txt-bright: #f0f5eb;
            --txt-muted: #708264;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--txt-bright);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .station-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-card);
            border-radius: 8px;
            padding: 25px;
            border: 3px solid var(--army-green);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.9);
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--army-green);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--neon-glow); text-transform: uppercase; letter-spacing: 1px; }

        .status-panel {
            background: #090c07;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--army-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .indicator { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert-red); box-shadow: 0 0 8px var(--alert-red); }
        .dot.active { background: var(--neon-glow); box-shadow: 0 0 8px var(--neon-glow); }

        .deck {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--army-green);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--neon-glow); text-transform: uppercase; }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            background: #050704;
            color: var(--neon-glow);
            border: 1px solid var(--army-green);
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        input:focus { outline: none; border-color: var(--neon-glow); }

        .btn {
            background: var(--army-green); color: var(--txt-bright); font-weight: bold;
            border: 1px solid #637751; padding: 10px 16px; cursor: pointer; text-transform: uppercase;
            font-family: inherit; border-radius: 4px;
        }
        .btn:hover { background: #5c704a; }

        .ptt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
        }

        .ptt-button {
            width: 130px; height: 130px; border-radius: 50%;
            background: linear-gradient(135deg, #a62b2b, #591313);
            border: 5px solid #3d0d0d; color: white;
            font-family: inherit; font-size: 1rem; font-weight: bold; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 8px 0 #2b0909, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.05s ease; user-select: none; -webkit-user-select: none;
        }

        .ptt-button:active, .ptt-button.transmitting {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2b0909, 0 5px 10px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #ff3b3b, #991c1c);
        }

        .ptt-button:disabled {
            background: #2c2f29; border-color: #1a1c18; color: #555; cursor: not-allowed; box-shadow: none; transform: none;
        }

        .terminal {
            background: #050704; border: 1px solid var(--army-green); height: 100px;
            border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 0.75rem; color: #a4bfa3;
        }
        .log { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="station-container">
        <header>
            <h1>📡 AUTOMATIC WALKIE-TALKIE</h1>
        </header>

        <div class="status-panel">
            <div class="indicator">NET: <div class="dot" id="linkDot"></div> <span id="linkTxt">OFFLINE</span></div>
            <div class="indicator">MIC: <div class="dot" id="micDot"></div> <span id="micTxt">MUTED</span></div>
        </div>

        <!-- AUTOMATIC JOIN CONFIGURATION PANEL -->
        <div class="deck">
            <h2>Enter Shared Secret Frequency Room Code</h2>
            <div class="input-row">
                <input type="text" id="roomInput" placeholder="e.g., alpha-bravo-99" value="hq-frequency">
                <button class="btn" onclick="connectToFrequencyChannel()">Connect</button>
            </div>
        </div>

        <!-- PUSH TO TALK COMMS INTERFACE -->
        <div class="deck ptt-container">
            <button class="ptt-button" id="pttBtn" disabled>HOLD TO<br>TALK</button>
            <div style="margin-top: 15px; font-size: 0.7rem; color: var(--txt-muted); text-align: center; line-height: 1.3;">
                Type the same code on both devices and click Connect. Once linked, hold the button or Spacebar to transmit.
            </div>
        </div>

        <!-- RUNTIME LOGGER -->
        <div class="terminal" id="activityBox">
            <div class="log">[SYS] Standing by. Enter a frequency code to initialize hardware channels.</div>
        </div>
    </div>

    <!-- Receiver Voice Audio Destination Node -->
    <audio id="remoteAudioPlayer" autoplay></audio>

    <script>
        let peerInstance = null;
        let localMicStream = null;
        let microphoneAudioTrack = null;
        let incomingAudioCallRef = null;

        const pttButton = document.getElementById('pttBtn');
        const roomInputField = document.getElementById('roomInput');
        const logTerminal = document.getElementById('activityBox');
        
        const linkDot = document.getElementById('linkDot');
        const linkTxt = document.getElementById('linkTxt');
        const micDot = document.getElementById('micDot');
        const micTxt = document.getElementById('micTxt');

        function writeLog(tag, info) {
            const line = document.createElement('div');
            line.classList.add('log');
            line.innerHTML = `[${tag}] ${info}`;
            logTerminal.appendChild(line);
            logTerminal.scrollTop = logTerminal.scrollHeight;
        }

        // Initialize local microphone stream permissions
        async function getMicrophoneAccess() {
            try {
                localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                microphoneAudioTrack = localMicStream.getAudioTracks()[0];
                microphoneAudioTrack.enabled = false; // Keep muted until push-to-talk triggers
                writeLog('HARDWARE', 'Microphone connection confirmed and armed.');
                return true;
            } catch (err) {
                writeLog('ERROR', 'Mic Access Denied: ' + err.message);
                alert("Microphone permission is strictly required for walkie-talkie mode!");
                return false;
            }
        }

        async function connectToFrequencyChannel() {
            const secretRoomId = roomInputField.value.trim().toLowerCase();
            if (!secretRoomId) return alert("Please enter a room code channel phrase!");

            const micArmed = await getMicrophoneAccess();
            if (!micArmed) return;

            writeLog('NET', `Contacting signaling node room: [${secretRoomId}]...`);
            
            // Connect automatically using PeerJS public infrastructure cloud brokers
            peerInstance = new Peer(secretRoomId, {
                config: { iceServers: [{ urls: 'stun:://google.com' }] }
            });

            peerInstance.on('open', (id) => {
                writeLog('SYS', `Channel active. Listening as Master Station Node: ${id}`);
                linkDot.classList.add('active');
                linkTxt.textContent = "LISTENING ON CHANNEL";
                
                // Proactively attempt connection to see if another device is already in the room
                attemptCallToRemotePeer(secretRoomId + "-client");
            });

            // If the room name is already taken, switch to a client role automatically to hook up with the host
            peerInstance.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    writeLog('SYS', 'Primary slot taken. Linking to channel room as secondary client...');
                    peerInstance = new Peer(secretRoomId + "-client", {
                        config: { iceServers: [{ urls: 'stun:://google.com' }] }
                    });
                    
                    peerInstance.on('open', () => {
                        writeLog('SYS', 'Secondary channel online. Pairing directly with host node...');
                        attemptCallToRemotePeer(secretRoomId);
                    });
                } else {
                    writeLog('ERROR', 'Network collision encountered: ' + err.type);
