<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommsStation: P2P Voice Walkie-Talkie</title>
    <style>
        :root {
            --bg-base: #11140f;
            --panel-card: #1c2217;
            --army-green: #4d5d3e;
            --neon-glow: #7fff00;
            --alert-red: #ff3333;
            --txt-bright: #f0f5eb;
            --txt-muted: #708264;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--txt-bright);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .station-container {
            width: 100%;
            max-width: 600px;
            background: var(--panel-card);
            border-radius: 8px;
            padding: 25px;
            border: 3px solid var(--army-green);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.9);
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--army-green);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--neon-glow); text-transform: uppercase; letter-spacing: 1px; }

        .status-panel {
            background: #090c07;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--army-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .indicator { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert-red); box-shadow: 0 0 8px var(--alert-red); }
        .dot.active { background: var(--neon-glow); box-shadow: 0 0 8px var(--neon-glow); }

        .deck {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--army-green);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--neon-glow); text-transform: uppercase; }

        textarea {
            width: 100%; height: 70px; background: #050704; color: var(--neon-glow);
            border: 1px solid var(--army-green); border-radius: 4px; padding: 10px;
            font-family: inherit; font-size: 0.8rem; box-sizing: border-box; resize: none;
        }

        .btn {
            background: var(--army-green); color: var(--txt-bright); font-weight: bold;
            border: 1px solid #637751; padding: 10px; cursor: pointer; text-transform: uppercase;
            font-family: inherit; border-radius: 4px;
        }
        .btn:hover { background: #5c704a; }

        /* Classic Heavy Push-To-Talk Button */
        .ptt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        .ptt-button {
            width: 140px; height: 140px; border-radius: 50%;
            background: linear-gradient(135deg, #a62b2b, #591313);
            border: 5px solid #3d0d0d; color: white;
            font-family: inherit; font-size: 1.1rem; font-weight: bold; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 8px 0 #2b0909, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.05s ease; user-select: none; -webkit-user-select: none;
        }

        .ptt-button:active, .ptt-button.transmitting {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2b0909, 0 5px 10px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #ff3b3b, #991c1c);
            color: #fff;
        }

        .terminal {
            background: #050704; border: 1px solid var(--army-green); height: 110px;
            border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 0.75rem; color: #a4bfa3;
        }
        .log { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="station-container">
        <header>
            <h1>🗲 COMMS-STATION P2P</h1>
        </header>

        <div class="status-panel">
            <div class="indicator">LINK: <div class="dot" id="linkDot"></div> <span id="linkTxt">DISCONNECTED</span></div>
            <div class="indicator">MIC: <div class="dot" id="micDot"></div> <span id="micTxt">MUTED</span></div>
        </div>

        <!-- LINK COUPLING CONTROLS -->
        <div class="deck">
            <h2>1. Direct Secure Signal Connection Matrix</h2>
            <textarea id="tokenBox" placeholder="Paste data signal token packages here..."></textarea>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 8px;">
                <button class="btn" onclick="initiateVoiceOffer()">1. Make Offer</button>
                <button class="btn" onclick="replyToVoiceOffer()">2. Reply</button>
                <button class="btn" onclick="lockVoiceLink()">3. Lock Link</button>
            </div>
        </div>

        <!-- PUSH TO TALK COMMS INTERFACE -->
        <div class="deck ptt-container">
            <button class="ptt-button" id="pttBtn" disabled>HOLD TO<br>TALK</button>
            <div style="margin-top: 12px; font-size: 0.7rem; color: var(--txt-muted); text-align: center;">
                Channel remains air-locked until connection locks. Once locked, hold mouse or tap spacebar to transmit voice.
            </div>
        </div>

        <!-- ACTIVITY MONITOR LOGGER -->
        <div class="terminal" id="activityBox">
            <div class="log">[NET] Terminal offline. Awaiting pipeline synchronization.</div>
        </div>
    </div>

    <!-- Incoming Remote Audio Element Stream Destination -->
    <audio id="incomingAudioNode" autoplay></audio>

    <script>
        const ICE_CONFIG = { iceServers: [{ urls: 'stun:://google.com' }] };

        let rtcConnection = null;
        let internalMicStream = null;
        let micAudioTrack = null;

        const pttButtonNode = document.getElementById('pttBtn');
        const tokenInputField = document.getElementById('tokenBox');
        const logTerminalNode = document.getElementById('activityBox');
        
        const linkDot = document.getElementById('linkDot');
        const linkTxt = document.getElementById('linkTxt');
        const micDot = document.getElementById('micDot');
        const micTxt = document.getElementById('micTxt');

        function printLog(system, info) {
            const line = document.createElement('div');
            line.classList.add('log');
            line.innerHTML = `[${system}] ${info}`;
            logTerminalNode.appendChild(line);
            logTerminalNode.scrollTop = logTerminalNode.scrollHeight;
        }

        // Request local audio input context permissions hardware access hooks
        async function captureMicrophoneHardware() {
            try {
                internalMicStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                micAudioTrack = internalMicStream.getAudioTracks()[0];
                micAudioTrack.enabled = false; // Muted initially (Classic Walkie-Talkie profile)
                printLog('HARDWARE', 'Microphone subsystem online and armed.');
                return true;
            } catch (err) {
                printLog('ERROR', 'Microphone initialization denied: ' + err.message);
                alert("Walkie-Talkie requires microphone permissions to function!");
                return false;
            }
        }

        function createPeerInstance() {
            rtcConnection = new RTCPeerConnection(ICE_CONFIG);

            // Bind outgoing sound tracks to connection stream matrix channels
            if (internalMicStream) {
                internalMicStream.getTracks().forEach(track => rtcConnection.addTrack(track, internalMicStream));
            }

            // Route inbound receiver streams to output node
            rtcConnection.ontrack = (event) => {
                printLog('COMMS', 'Inbound live audio track stream pipeline attached.');
                document.getElementById('incomingAudioNode').srcObject = event.streams[0];
            };

            rtcConnection.onconnectionstatechange = () => {
                if (rtcConnection.connectionState === 'connected') {
                    linkDot.classList.add('active');
                    linkTxt.textContent = "SECURELY UNLOCKED";
                    pttButtonNode.disabled = false;
                    printLog('NET', 'P2P secure connection bridge active.', 'var(--neon-glow)');
                }
            };
        }

        // STEP 1: DEVICE A GENERATES ENCRYPTED OFFER
        async function initiateVoiceOffer() {
            const armed = await captureMicrophoneHardware();
            if (!armed) return;

            createPeerInstance();

            rtcConnection.onicecandidate = (e) => {
                if (!e.candidate) {
                    tokenInputField.value = btoa(JSON.stringify(rtcConnection.localDescription));
                    printLog('MATRIX', 'Signal Offer Token generated. Copy it over to Device B.');
                }
            };

            const offer = await rtcConnection.createOffer();
            await rtcConnection.setLocalDescription(offer);
        }

        // STEP 2: DEVICE B RECEIVES OFFER AND RESPONDS WITH ANSWER
        async function replyToVoiceOffer() {
            const rawToken = tokenInputField.value.trim();
            if (!rawToken) return alert("Paste Device A's signal packet inside the matrix box!");
