<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-City Chronicles: Text RPG</title>
    <style>
        :root {
            --term-bg: #0a0a0f;
            --neon-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-amber: #ffb703;
            --text-main: #d1d5db;
        }

        body {
            background-color: var(--term-bg);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 750px;
            background: #12121a;
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            box-sizing: border-box;
        }

        /* Status Parameters HUD Bar Layout */
        .hud-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px dashed #2a2a3a;
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: var(--neon-blue);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .hud-item span {
            color: var(--neon-amber);
        }

        /* Dynamic Main Console Messaging Frame */
        .story-display {
            min-height: 180px;
            line-height: 1.6;
            font-size: 1.05rem;
            margin-bottom: 25px;
            white-space: pre-line;
        }

        .system-alert {
            color: var(--neon-amber);
            font-weight: bold;
        }

        /* Interactive Decisions Layout Setup */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: #1a1a26;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 14px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            text-align: left;
            transition: all 0.2s;
        }

        .choice-btn:hover {
            background: rgba(57, 255, 20, 0.1);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
            transform: translateX(4px);
        }

        /* Inventory Panel Tags */
        .inventory-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #2a2a3a;
            font-size: 0.85rem;
            color: #8a8a9a;
        }

        .inventory-list {
            display: inline-flex;
            gap: 8px;
            color: var(--text-main);
            margin-left: 5px;
        }

        .inv-tag {
            background: #222233;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #3d3d5c;
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <!-- Dashboard Live Status Metrics -->
        <div class="hud-bar">
            <div class="hud-item">LOC: <span id="hudLoc">NEO-CITY GRID 0</span></div>
            <div class="hud-item">CREDITS: <span id="hudCash">100</span></div>
            <div class="hud-item">REPUTATION: <span id="hudRep">NEUTRAL</span></div>
        </div>

        <!-- System Narrative Delivery Screen Module -->
        <div class="story-display" id="storyText">Loading mainframe...</div>

        <!-- Choice Navigation Buttons Block -->
        <div class="options-container" id="choicesBox"></div>

        <!-- Databank Items Tracking Footnotes -->
        <div class="inventory-box">
            💾 DATABANK INVENTORY: <span id="invList" class="inventory-list">Empty</span>
        </div>
    </div>

    <script>
        // --- LIVE METRIC MONITOR VARS ---
        let gameState = {
            credits: 100,
            reputation: "Neutral",
            inventory: [],
            currentScene: "start"
        };

        // --- SCENARIO NODE DATABASES ---
        const storyNodes = {
            start: {
                location: "DISTRICT 9 - DOCKING BAY",
                text: "You awaken in a neon-drenched alleyway. Rain drips from glowing advertisements above. Your data-jack is buzzing.\n\nA local fixer named Kael stands under an umbrella nearby, tossing a cryptographic data-chip in his hand. 'Got a job for you, runner. Pays well, but it's dangerous.'",
                choices: [
                    { text: "Accept the data-chip job from Kael.", next: "accept_job" },
                    { text: "Hack Kael's private cyberware rig instead.", next: "hack_kael" },
                    { text: "Ignore him and head straight into the Net-Bar.", next: "net_bar" }
                ]
            },
            accept_job: {
                location: "DOWNTOWN - CORPORATE PLAZA",
                text: "Kael hands you the chip. 'Deliver this to the bartender at the Tech-Noire Club.'\n\nAs you walk down Corporate Plaza, an armored corporate drone drops down, flashing red warning lights: <span class='system-alert'>[HALT SECURE SCAN IN PROGRESS]</span>. Do you run or stay?",
                action: () => { 
                    gameState.inventory.push("Data-Chip"); 
                    gameState.credits += 50;
                },
                choices: [
                    { text: "Bribe the drone data ports using 50 credits.", next: "bribe_drone", condition: () => gameState.credits >= 50 },
                    { text: "Sprint down into the subterranean maintenance tunnels.", next: "subway_run" }
                ]
            },
            hack_kael: {
                location: "DISTRICT 9 - ALLEY",
                text: "Your neural interface spikes into his system. Success! You siphon 200 credits into your accounts, but your rig overheats.\n\nKael realizes what you did, draws a plasma shock-pistol, and alerts local street gangs.",
                action: () => { 
                    gameState.credits += 200; 
                    gameState.reputation = "Wanted";
                },
                choices: [
                    { text: "Dive through the glass window into the Net-Bar.", next: "net_bar" },
                    { text: "Surrender and offer to pay back double.", next: "surrender_kael" }
                ]
            },
            net_bar: {
                location: "THE REBOOT BAR",
                text: "The bar smells of ozone and synthetic gin. Net-runners are floating in deep sensory tanks. The bartender looks you over.\n\n'Looking for clean hardware or dirty data, stranger?'",
                choices: [
                    { text: "Ask if anyone needs a mercenary data specialist.", next: "find_work" },
                    { text: "Leave the bar before trouble arrives.", next: "start" }
                ]
            },
            bribe_drone: {
                location: "TECH-NOIRE CLUB",
                text: "The drone accepts the encrypted payment protocol, resets its pathing vectors, and flies off. You safely deliver the Data-Chip to the bartender!\n\n<span class='system-alert'>[MISSION COMPLETE]</span> Kael wires your bonus rewards. You are safe... for tonight.",
                action: () => { 
                    gameState.credits += 300; 
                    gameState.reputation = "Legendary";
                    gameState.inventory = gameState.inventory.filter(i => i !== "Data-Chip");
                },
                choices: [
                    { text: "Restart Simulation", next: "start", reset: true }
                ]
            },
            subway_run: {
                location: "SUBTERRANEAN TUNNELS",
                text: "You slide down a ventilation shaft. The drone loses lock coordinates but tracking dogs are barking nearby.\n\nYou stumble across a black-market cyber-clinic hidden in the dark.",
                choices: [
                    { text: "Trade information for safe passage out.", next: "find_work" }
                ]
            },
            surrender_kael: {
                location: "DISTRICT 9 - DETENTION CELL",
                text: "Kael laughs, strips your data deck, and throws you to the corporate police enforcers.\n\nYour cybernetic run has come to an early end.",
                action: () => { 
                    gameState.credits = 0; 
                    gameState.reputation = "Incarcerated";
                },
                choices: [
                    { text: "Reboot Cyberdeck (Restart)", next: "start", reset: true }
                ]
            },
            find_work: {
                location: "THE NET-BAR COUCHES",
                text: "A mysterious operative in a long trench coat sits across from you. 'I hear you're fast with terminal matrices. Let's see what you can do.'\n\nTo be continued in Chapter II...",
                choices: [
                    { text: "Restart Matrix", next: "start", reset: true }
                ]
            }
        };

        // --- SCENE ROUTER PROCESSOR ---
        function renderActiveScene(nodeKey) {
            const node = storyNodes[nodeKey];
            if (!node) return;

            gameState.currentScene = nodeKey;

            // Execute scene setup calculations if present
            if (node.action) {
                node.action();
            }

            // Sync structural component data properties to GUI outputs
            document.getElementById('hudLoc').textContent = node.location;
            document.getElementById('hudCash').textContent = gameState.credits;
            document.getElementById('hudRep').textContent = gameState.reputation.toUpperCase();
