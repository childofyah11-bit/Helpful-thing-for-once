<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Math Core</title>
    <style>
        /* Unblockable Native CSS Styles - Ultra-Premium Cyberpunk Mode */
        :root {
            --bg-main: #080c14;
            --bg-card: #111827;
            --bg-input: #1f2937;
            --border-glow: #6366f1;
            --text-glow: #818cf8;
            --accent-green: #34d399;
            --accent-error: #f87171;
        }

        body {
            background-color: var(--bg-main);
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .solver-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 550px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 30px rgba(99, 102, 241, 0.15);
            border: 1px solid #374151;
        }

        .header-group {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            color: var(--text-glow);
            font-size: 30px;
            font-weight: 900;
            margin: 0 0 6px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 13px;
            margin: 0;
        }

        .input-wrapper {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            background-color: var(--bg-input);
            border: 2px solid #4b5563;
            border-radius: 14px;
            padding: 16px;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            resize: vertical;
            min-height: 80px;
        }

        textarea:focus {
            border-color: var(--border-glow);
            box-shadow: 0 0 14px rgba(99, 102, 241, 0.3);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .clear-btn {
            background: #374151;
            color: #d1d5db;
            box-shadow: none;
            max-width: 100px;
        }

        .clear-btn:hover {
            background: #4b5563;
            box-shadow: none;
        }

        .output-panel {
            display: none;
            background-color: #030712;
            padding: 24px;
            border-radius: 14px;
            border: 1px solid #1f2937;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .output-label {
            font-size: 11px;
            color: var(--text-glow);
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #finalResult {
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: 800;
            color: var(--accent-green);
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="solver-card">
        <div class="header-group">
            <h1>⚡ Unbreakable Math Core</h1>
            <p class="subtitle">Extracts equations, basic percentages, and sale prices from text</p>
        </div>

        <div class="input-wrapper">
            <label for="mathInput">Type or Paste Any Question</label>
            <textarea id="mathInput" placeholder="Paste full discount questions or percentages here..."></textarea>
        </div>

        <div class="button-group">
            <button onclick="computeProblem()">Compute Problem</button>
            <button class="clear-btn" onclick="clearInput()">Clear</button>
        </div>

        <div id="outputWindow" class="output-panel">
            <div class="output-label">Calculated Answer:</div>
            <div id="finalResult"></div>
        </div>
    </div>

    <script>
        function clearInput() {
            document.getElementById('mathInput').value = '';
            document.getElementById('outputWindow').style.display = 'none';
        }

        function computeProblem() {
            const mathInput = document.getElementById('mathInput');
            const outputWindow = document.getElementById('outputWindow');
            const finalResult = document.getElementById('finalResult');
            
            let rawInput = mathInput.value.trim();
            if (!rawInput) {
                alert("Please input or paste a math problem first!");
                return;
            }

            outputWindow.style.display = "block";

            try {
                let solution = "";
                let isCurrency = false;

                // 1. SMART DISCOUNT / SALE PRICE ENGINE
                // Scans for patterns like "$54" and "25% off" or "discount of 25%"
                const priceMatch = rawInput.match(/(?:\$|price\s*(?:of|is)?\s*\$?)\s*([0-9.]+)/i);
                const discountMatch = rawInput.match(/([0-9.]+)\s*%\s*(?:off|discount)/i) || rawInput.match(/(?:discount\s*(?:of|is)?\s*)([0-9.]+)\s*%/i);

                if (priceMatch && discountMatch) {
                    const originalPrice = parseFloat(priceMatch[1]);
                    const discountPercent = parseFloat(discountMatch[1]);
                    
                    // Sale Price = Original Price - (Discount% of Original Price)
                    solution = originalPrice - ((discountPercent / 100) * originalPrice);
                    isCurrency = true;
                } 
                // 2. SMART PERCENTAGE EXTRACTION FALLBACK ("75% of 55")
                else {
                    const percentRegex = /([0-9.]+)\s*%\s*of\s*([0-9.]+)/i;
                    const percentMatch = rawInput.match(percentRegex);

                    if (percentMatch) {
                        const percentVal = parseFloat(percentMatch[1]);
                        const numberVal = parseFloat(percentMatch[2]);
                        solution = (percentVal / 100) * numberVal;
                    } else {
                        // 3. STANDARD EQUATION CLEANUP FALLBACK
                        let expression = rawInput;

                        // Swap standard letter "x" for true computer multiplication asterisks
                        expression = expression.replace(/([0-9.]+)\s*[xX]\s*([0-9.]+)/g, "$1 * $2");

                        // Handle algebraic variables (e.g. "when x = 5")
                        const varMatch = expression.match(/(?:when|if|where|,|\s)\s*([a-zA-Z])\s*(?:=|\bis\b)\s*(-?[0-9.]+)/i);
                        if (varMatch) {
                            const variableName = varMatch[1];
                            const variableValue = varMatch[2];
                            expression = expression.replace(/(?:when|if|where|,|\s)\s*[a-zA-Z]\s*(?:=|\bis\b)\s*-?[0-9.]+/i, '');
                            const varRegex = new RegExp('\\b' + variableName + '\\b', 'g');
                            expression = expression.replace(varRegex, `(${variableValue})`);
                        }

                        // Add missing operators (e.g., 2x -> 2*x)
                        expression = expression.replace(/([0-9.]+)\s*([a-zA-Z\(])/g, "$1 * $2");
                        expression = expression.replace(/([\)a-zA-Z])\s*([0-9.]+)/g, "$1 * $2");

                        // Translate exponents (e.g., 5^3)
                        while (expression.includes('^')) {
                            expression = expression.replace(/([0-9.xX]+)\s*\^\s*([0-9.xX]+)/g, "Math.pow($1, $2)");
                        }

                        // Standardize core functions
                        expression = expression.replace(/sqrt/gi, "Math.sqrt");
                        expression = expression.replace(/abs/gi, "Math.abs");

                        // Clean non-math words to prevent crash loops
                        expression = expression.replace(/[^0-9\+\-\*\/\(\)\.\s,Math\.powsqrtabs]/gi, '');

                        solution = Function('"use strict"; return (' + expression + ')')();
                    }
                }
                
                if (solution === undefined || isNaN(solution)) {
                    throw new Error("Could not extract a valid mathematical problem from your text.");
                }

                // Format outputs cleanly
                if (isCurrency) {
                    solution = "$" + solution.toFixed(2);
                } else if (typeof solution === 'number' && !Number.isInteger(solution)) {
                    solution = parseFloat(solution.toFixed(6));
                }
