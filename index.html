<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Tycoon Nexus</title>
    <style>
        :root {
            --bg: #05070f;
            --panel: #0d1122;
            --panel-light: #161e38;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #eab308;
            --purple: #a855f7;
            --border: #1e294b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow-x: hidden;
        }

        .header-layout {
            display: flex;
            justify-content: space-between;
            width: 1050px;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 { margin: 0; color: var(--accent); font-size: 24px; font-weight: 800; letter-spacing: 0.5px; }
        
        .dashboard { display: flex; gap: 10px; }
        .hud-card {
            background: var(--panel);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-weight: 700;
            font-size: 14px;
        }
        .gold-card { border-color: var(--gold); color: var(--gold); }
        .hp-card { border-color: var(--danger); color: var(--danger); }

        /* Massive Tycoon Upgrade Grid Matrix */
        .upgrade-matrix-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 1050px;
            margin-bottom: 12px;
        }

        .upgrade-section {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2px;
        }

        .up-node-btn {
            background: var(--panel-light);
            border: 1px solid var(--border);
            color: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s ease;
        }
        .up-node-btn:hover { background: var(--border); border-color: var(--accent); }
        .up-node-btn span { color: var(--gold); }
        .up-node-btn em { font-style: normal; color: #94a3b8; }

        #game-canvas {
            background-color: #030408;
            border: 3px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }

        .footer-hud {
            width: 1050px;
            margin-top: 8px;
            font-size: 11px;
            color: #4b526d;
            font-family: monospace;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-layout">
        <h2>DEFENSE MATRIX TYCOON // TIER PHASES</h2>
        <div class="dashboard">
            <div class="hud-card" style="border-color: var(--purple); color: var(--purple);">WAVE: <span id="wave-lbl">1</span></div>
            <div class="hud-card gold-card">GOLD REVENUE: $<span id="gold-lbl">150</span></div>
            <div class="hud-card hp-card">CORE SHIELD: <span id="hp-lbl">100</span>%</div>
        </div>
    </div>

    <!-- Massive 100+ Total Combination Tier Upgrade Matrix Panel Grid -->
    <div class="upgrade-matrix-grid">
        
        <!-- SECTION 1: TYCOON INDUSTRIAL SYSTEM -->
        <div class="upgrade-section" style="border-left: 4px solid var(--gold);">
            <div class="section-title" style="color: var(--gold);">🏭 Industrial Automated Generator</div>
            <button class="up-node-btn" onclick="purchaseNode('mineRate')">Mine Drill Yield (Lvl <em id="mineRate-lvl">1</em>) <span id="mineRate-cost">$50</span></button>
            <button class="up-node-btn" onclick="purchaseNode('mineSpeed')">Drill Processing Speed (Lvl <em id="mineSpeed-lvl">1</em>) <span id="mineSpeed-cost">$75</span></button>
            <button class="up-node-btn" onclick="purchaseNode('interest')">Crypto Investment Bonds (Lvl <em id="interest-lvl">1</em>) <span id="interest-cost">$150</span></button>
        </div>

        <!-- SECTION 2: DEFENSE WEAPONS PLATFORMS -->
        <div class="upgrade-section" style="border-left: 4px solid var(--accent);">
            <div class="section-title" style="color: var(--accent);">⚔️ Anti-Creep Gun Batteries</div>
            <button class="up-node-btn" onclick="purchaseNode('gunDmg')">Laser Core Power (Lvl <em id="gunDmg-lvl">1</em>) <span id="gunDmg-cost">$60</span></button>
            <button class="up-node-btn" onclick="purchaseNode('gunFr')">Weapon Cycle Speed (Lvl <em id="gunFr-lvl">1</em>) <span id="gunFr-cost">$90</span></button>
            <button class="up-node-btn" onclick="purchaseNode('gunRange')">Radar Scanner Range (Lvl <em id="gunRange-lvl">1</em>) <span id="gunRange-cost">$120</span></button>
        </div>

        <!-- SECTION 3: ADVANCED MATRIX CORE MODS -->
        <div class="upgrade-section" style="border-left: 4px solid var(--purple);">
            <div class="section-title" style="color: var(--purple);">🔮 Quantum Core Modifiers</div>
            <button class="up-node-btn" onclick="purchaseNode('bulletArray')">Multi-Shot Spread Count (Lvl <em id="bulletArray-lvl">1</em>) <span id="bulletArray-cost">$250</span></button>
            <button class="up-node-btn" onclick="purchaseNode('coreRepair')">Automated Nanite Repair <span id="coreRepair-cost">$100</span></button>
            <button class="up-node-btn" onclick="purchaseNode('bounty')">Scrap Scrap Value Bonus (Lvl <em id="bounty-lvl">1</em>) <span id="bounty-cost">$80</span></button>
        </div>

    </div>

    <!-- Main Strategy Defense Viewport Field -->
    <canvas id="game-canvas" width="1050" height="400"></canvas>
    
    <div class="footer-hud">
        UPGRADE ENGINE METRICS STACK EXPONENTIALLY // AUTOMATED GENERATORS TICK IN BACKGROUND LOOPS CONTINUOUSLY
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Progression Tycoon variables
    let gold = 150;
    let baseHp = 100;
    let wave = 1;
    let gameOver = false;
    let frameCount = 0;

    // Defense turret asset states
    let turret = { x: 950, y: 200, radius: 24, color: '#38bdf8', lastShot: 0 };

    // Upgrade configuration database dictionaries
    let upgradeLevels = {
        mineRate: 1, mineSpeed: 1, interest: 1,
        gunDmg: 1, gunFr: 1, gunRange: 1,
        bulletArray: 1, bounty: 1
    };

    let upgradeCosts = {
        mineRate: 50, mineSpeed: 75, interest: 150,
        gunDmg: 60, gunFr: 90, gunRange: 120,
        bulletArray: 250, bounty: 80
    };

    // Tracking arrays
    let enemies = [];
    let lasers = [];
    let floatingTexts = [];

    function spawnFloatingText(x, y, str, color) {
        floatingTexts.push({ x, y, str, color, alpha: 1 });
    }

    // --- TYCOON REVENUE ENGINE (Click/Auto tick integrations) ---
    function triggerAutomatedTycoonPayout() {
        if (gameOver) return;
        
        let baselinePayout = 5 + (upgradeLevels.mineRate * 8);
        let bonusMultiplier = 1 + (upgradeLevels.interest * 0.15);
        let finalPayout = Math.floor(baselinePayout * bonusMultiplier);

        gold += finalPayout;
        document.getElementById('gold-lbl').textContent = gold;
        spawnFloatingText(turret.x, turret.y - 30, `+$${finalPayout}`, 'var(--gold)');
        
        // Queue next variable idle payout cycle sequence loop
        let delay = Math.max(200, 2000 - (upgradeLevels.mineSpeed * 150));
        setTimeout(triggerAutomatedTycoonPayout, delay);
    }

    // --- PURCHASE HANDLER ---
    window.purchaseNode = function(type) {
        if (gameOver) return;

        if (type === 'coreRepair') {
            if (gold >= 100) {
                gold -= 100;
                baseHp = Math.min(100, baseHp + 25);
                document.getElementById('hp-lbl').textContent = baseHp;
                document.getElementById('gold-lbl').textContent = gold;
                spawnFloatingText(turret.x, turret.y - 30, `+25 Core Armor`, 'var(--success)');
            }
            return;
        }

        let cost = upgradeCosts[type];
        if (gold >= cost) {
            gold -= cost;
            upgradeLevels[type]++;
            
            // Adjust scaling factors exponentially
            upgradeCosts[type] = Math.floor(cost * 1.6);
            
            // Re-render display labels
            document.getElementById(`${type}-lvl`).textContent = upgradeLevels[type];
            document.getElementById(`${type}-cost`).textContent = `$${upgradeCosts[type]}`;
            document.getElementById('gold-lbl').textContent = gold;
            
            spawnFloatingText(turret.x, turret.y - 30, `UPGRADED`, 'var(--accent)');
        }
    };

    function handleWeaponFireSystem() {
        let delay = Math.max(6, 40 - (upgradeLevels.gunFr * 3));
        if (frameCount - turret.lastShot > delay) {
            
            // Look for closest creeping enemy in range limits
            let target = null;
