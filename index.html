<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Life Simulator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 16px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--accent); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 4px; }

        .meter-container {
            margin-top: 8px;
            background: #334155;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            background: var(--success);
            width: 100%;
            transition: width 0.3s ease;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid #334155;
            padding-bottom: 4px;
        }

        .actions-panel, .log-panel {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            height: 320px;
            overflow-y: auto;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .log-entry {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #1e293b;
        }
        .log-neutral { color: var(--text-main); }
        .log-good { color: var(--success); }
        .log-bad { color: var(--danger); }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <h1 id="player-name">Life Simulator</h1>
            <div><strong>Age:</strong> <span id="stat-age">18.0</span> years</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Bank Balance</div>
                <div class="stat-value" id="stat-cash">$1,500</div>
                <div class="stat-label" style="margin-top:4px;" id="stat-job">Unemployed</div>
            </div>
            <div class="stat-card" style="border-left-color: var(--success)">
                <div class="stat-label">Health & Well-being</div>
                <div class="stat-value" id="val-health">100%</div>
                <div class="meter-container">
                    <div class="meter-fill" id="fill-health" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: #eab308">
                <div class="stat-label">Education</div>
                <div class="stat-value" id="stat-edu">High School Diploma</div>
            </div>
            <div class="stat-card" style="border-left-color: #a855f7">
                <div class="stat-label">Credit Score</div>
                <div class="stat-value" id="stat-credit">650</div>
            </div>
        </div>

        <div class="main-layout">
            <div>
                <div class="panel-title">Actions Available</div>
                <div class="actions-panel">
                    <button class="btn" id="btn-age" onclick="advanceTime()">⌛ Age 6 Months (Pay Bills)</button>
                    <button class="btn" id="btn-job" onclick="lookForJob()">💼 Apply for a Better Job</button>
                    <button class="btn" id="btn-edu" onclick="studyDegree()">🎓 Enroll in College (-$20,000 Loan)</button>
                    <button class="btn" id="btn-invest" onclick="investMarkets()">📈 Invest $500 in Index Funds</button>
                    <button class="btn" id="btn-health" onclick="visitDoctor()">🏥 Healthcare Checkup (-$300)</button>
                </div>
            </div>

            <div>
                <div class="panel-title">Life Ledger</div>
                <div class="log-panel" id="log-container">
                    <div class="log-entry log-neutral">You stepped out into adulthood at 18. Good luck.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game State Variables
        let state = {
            age: 18.0,
            cash: 1500,
            debt: 0,
            health: 100,
            education: 0, // 0: HS, 1: College, 2: Masters
            jobLevel: 0,  // 0: Unemployed, 1: Minimum Wage, 2: Professional, 3: Executive
            investments: 0,
            creditScore: 650,
            isAlive: true
        };

        const jobTitles = ["Unemployed", "Fast Food Crew", "Corporate Accountant", "Managing Director"];
        const jobSalaries = [0, 12000, 55000, 140000]; // Semi-annual salaries (per 6 months)

        function updateUI() {
            document.getElementById('stat-age').innerText = state.age.toFixed(1);
            document.getElementById('stat-cash').innerText = `$${Math.floor(state.cash).toLocaleString()}`;
            document.getElementById('val-health').innerText = `${Math.floor(state.health)}%`;
            document.getElementById('fill-health').style.width = `${Math.min(100, Math.max(0, state.health))}%`;
            document.getElementById('stat-job').innerText = `${jobTitles[state.jobLevel]} (+$${(jobSalaries[state.jobLevel]).toLocaleString()}/6mo)`;
            
            let eduText = "High School Diploma";
            if(state.education === 1) eduText = "Bachelor's Degree";
            if(state.education === 2) eduText = "Master's Degree";
            document.getElementById('stat-edu').innerText = eduText;
            document.getElementById('stat-credit').innerText = Math.floor(state.creditScore);

            // Button requirements checks
            document.getElementById('btn-edu').disabled = state.education >= 2;
            document.getElementById('btn-invest').disabled = state.cash < 500;
            document.getElementById('btn-health').disabled = state.cash < 300;
            
            if(!state.isAlive) {
                document.querySelectorAll('.btn').forEach(b => b.disabled = true);
            }
        }

        function logEvent(text, type='neutral') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerText = `[Age ${state.age.toFixed(1)}] ${text}`;
            container.insertBefore(entry, container.firstChild);
        }

        function advanceTime() {
            if(!state.isAlive) return;

            state.age += 0.5;

            // 1. Core Economic Calculations (Income and Taxes)
            let income = jobSalaries[state.jobLevel];
            let taxRate = 0.10;
            if(income > 60000) taxRate = 0.32;
            else if(income > 20000) taxRate = 0.22;
            
            let taxesPaid = income * taxRate;
            let costOfLiving = 8000; // General rent, groceries, and basic needs per 6mo
            
            let netSemiAnnual = income - taxesPaid - costOfLiving;
            state.cash += netSemiAnnual;

            if(taxesPaid > 0) logEvent(`Paid $${Math.floor(taxesPaid)} in progressive income taxes.`, 'neutral');

            // 2. Compound Interest & Investment Return Variance
            if(state.investments > 0) {
                let marketReturn = (Math.random() * 0.16) - 0.04; // Random return between -4% and +12%
                let yieldEarned = state.investments * marketReturn;
                state.investments += yieldEarned;
                state.cash += yieldEarned;
                if(yieldEarned > 0) logEvent(`Your index assets yielded a dividend profit of +$${Math.floor(yieldEarned)}.`, 'good');
            }

            // 3. Living Costs & Cash Deficit Constraints
