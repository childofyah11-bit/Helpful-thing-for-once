<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Virtual Open Web Browser</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --browser-frame: #1e293b;
            --url-bar: #0f172a;
            --viewport-bg: #ffffff;
            --accent: #38bdf8;
            --text-dark: #1e293b;
            --text-light: #f8fafc;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .browser-container {
            width: 100%;
            max-width: 1050px;
            background-color: var(--browser-frame);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 88vh;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .tab-strip {
            display: flex;
            background-color: #0b0f19;
            padding: 8px 8px 0 8px;
            gap: 4px;
            overflow-x: auto;
        }

        .tab {
            background-color: #1e293b;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            max-width: 160px;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .tab.active {
            background-color: var(--browser-frame);
            color: var(--text-light);
            border-color: var(--border);
        }

        .close-tab {
            margin-left: auto;
            color: #ef4444;
            font-weight: bold;
            cursor: pointer;
        }

        .add-tab-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 0 12px;
            align-self: center;
        }

        .chrome-navigation {
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 10px;
            background-color: var(--browser-frame);
            border-bottom: 1px solid var(--border);
        }

        .nav-btn {
            background: var(--url-bar);
            border: 1px solid var(--border);
            color: var(--text-light);
            width: 34px;
            height: 34px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background-color: var(--border); }

        .address-bar-input {
            flex: 1;
            background-color: var(--url-bar);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .address-bar-input:focus { border-color: var(--accent); }

        .bookmark-bar {
            display: flex;
            gap: 12px;
            padding: 6px 12px;
            background-color: #131d31;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .bookmark-link { color: var(--accent); text-decoration: none; cursor: pointer; }

        .viewport {
            flex: 1;
            background-color: var(--viewport-bg);
            color: var(--text-dark);
            overflow-y: auto;
            position: relative;
        }

        .sandbox-loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #4f46e5;
            font-size: 18px;
            z-index: 10;
        }

        /* Built-in Portal Pages Layouts */
        .welcome-screen { text-align: center; padding: 40px 20px; }
        .welcome-screen h2 { color: #4f46e5; font-size: 24px; }
        
        .search-results-block { padding: 20px; }
        .search-item { margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .search-item a { color: #1d4ed8; font-size: 18px; font-weight: 600; text-decoration: none; cursor: pointer; }
        .search-item p { margin: 4px 0 0 0; color: #4b5563; font-size: 14px; }

        /* Proxy Sandbox Container Style Tweaks */
        .proxy-content-wrapper {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .proxy-content-wrapper a { color: #2563eb; cursor: pointer; }
    </style>
</head>
<body>

<div class="browser-container">
    <div class="tab-strip" id="tab-strip-container"></div>

    <div class="chrome-navigation">
        <button class="nav-btn" onclick="browserBack()">◀</button>
        <button class="nav-btn" onclick="browserRefresh()">🔄</button>
        <button class="nav-btn" onclick="browserHome()">🏠</button>
        <input type="text" class="address-bar-input" id="browser-url-field" placeholder="Type a URL (example: wikipedia.org) or search terms...">
        <button class="nav-btn" onclick="toggleBookmark()">⭐</button>
    </div>

    <div class="bookmark-bar" id="bookmarks-container"></div>

    <div class="viewport" id="viewport-screen">
        <div class="sandbox-loading-overlay" id="loading-overlay">Proxying secure network stream...</div>
        <div id="view-content-target" style="height: 100%; width: 100%;"></div>
    </div>
</div>

        "nexus://notes": `

            </div>`
    };

    function renderTabs() {
        tabStrip.innerHTML = '';
        tabs.forEach(t => {
            const tabEl = document.createElement('div');
            tabEl.className = `tab ${t.id === activeTabId ? 'active' : ''}`;
            tabEl.setAttribute('onclick', `switchTab(${t.id})`);
            tabEl.innerHTML = `
                <span>${t.title}</span>
                <span class="close-tab" onclick="closeTab(${t.id}); event.stopPropagation();">✕</span>
            `;
            tabStrip.appendChild(tabEl);
        });

        addBtn.textContent = '+';
        tabStrip.appendChild(addBtn);
    }
