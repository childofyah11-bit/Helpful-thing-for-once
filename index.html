<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Productivity Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.5rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        /* Timer Styles */
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            background-color: #334155;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #475569;
        }

        button.primary {
            background-color: var(--accent-color);
            color: #0f172a;
        }

        button.primary:hover {
            background-color: #7dd3fc;
        }

        /* Notes Styles */
        textarea {
            width: 100%;
            height: 120px;
            background-color: #0f172a;
            color: white;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        textarea:focus {
            outline: 2px solid var(--accent-color);
        }

        /* Quote Styles */
        .quote-text {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .quote-author {
            color: var(--text-muted);
            text-align: right;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <!-- Card 1: Pomodoro Timer -->
        <div class="card">
            <h2>⏱️ Focus Timer</h2>
            <div class="timer-display" id="timer">25:00</div>
            <div class="btn-group">
                <button class="primary" id="startBtn" onclick="toggleTimer()">Start</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <!-- Card 2: Quick Scratchpad -->
        <div class="card">
            <h2>📝 Quick Notes</h2>
            <textarea id="notesArea" placeholder="Type your thoughts here... They automatically save!" oninput="saveNotes()"></textarea>
        </div>

        <!-- Card 3: Motivation Engine -->
        <div class="card">
            <h2>💡 Daily Motivation</h2>
            <div>
                <div class="quote-text" id="quote">"The best way to predict the future is to create it."</div>
                <div class="quote-author" id="author">- Peter Drucker</div>
            </div>
            <button style="margin-top: 20px;" onclick="generateQuote()">New Quote</button>
        </div>
    </div>

    <script>
        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const startBtn = document.getElementById('startBtn');
            if (timerId === null) {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        alert("Time's up! Take a short break.");
                        timeLeft = 25 * 60;
                        updateTimerDisplay();
                        startBtn.textContent = 'Start';
                    }
                }, 1000);
                startBtn.textContent = 'Pause';
                startBtn.style.backgroundColor = '#f43f5e';
                startBtn.style.color = 'white';
            } else {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = 'Start';
                startBtn.style.backgroundColor = 'var(--accent-color)';
                startBtn.style.color = '#0f172a';
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateTimerDisplay();
            const startBtn = document.getElementById('startBtn');
            startBtn.textContent = 'Start';
            startBtn.style.backgroundColor = 'var(--accent-color)';
            startBtn.style.color = '#0f172a';
        }

        // --- LOCAL STORAGE NOTES LOGIC ---
        window.onload = function() {
            const savedNotes = localStorage.getItem('dashboard_notes');
            if (savedNotes) {
                document.getElementById('notesArea').value = savedNotes;
            }
        };

        function saveNotes() {
            const notesText = document.getElementById('notesArea').value;
            localStorage.setItem('dashboard_notes', notesText);
        }

        // --- RANDOM QUOTE LOGIC ---
        const quotes = [
            { text: "The best way to predict the future is to create it.", author: "Peter Drucker" },
            { text: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
            { text: "Your talent determines what you can do. Your motivation determines how much you are willing to do.", author: "Lou Holtz" },
            { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
            { text: "Action is the foundational key to all success.", author: "Pablo Picasso" }
        ];

        function generateQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote').textContent = `"${quotes[randomIndex].text}"`;
            document.getElementById('author').textContent = `- ${quotes[randomIndex].author}`;
        }
    </script>
</body>
</html>
