<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Utility Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 30px;
            flex-wrap: wrap;
        }
        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            width: 320px;
            min-height: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        h2 {
            font-size: 1.2rem;
            color: #38bdf8;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Utility styles shared across fields */
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            outline: none;
            margin-bottom: 12px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Timer Styles */
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: auto 0;
            color: #f43f5e;
            font-family: monospace;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn-start { background: #10b981; color: white; width: 100%; }
        .btn-start:hover { background: #059669; }
        .btn-reset { background: #64748b; color: white; width: 100%; }
        .btn-reset:hover { background: #475569; }
        
        /* Calculator Styles */
        .calc-screen {
            height: 50px;
            text-align: right;
            font-size: 1.5rem;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: auto;
        }
        .btn-calc { background: #334155; color: white; font-size: 1.1rem; }
        .btn-calc:hover { background: #475569; }
        .btn-op { background: #f59e0b; }
        .btn-op:hover { background: #d97706; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }

        /* Converter Styles */
        .conv-result {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #10b981;
            margin-top: auto;
            border: 1px dashed #334155;
        }

        /* Flashcard Styles */
        .flashcard-wrapper {
            perspective: 1000px;
            margin: auto 0;
            cursor: pointer;
        }
        .flashcard {
            width: 100%;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #475569;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .card-back {
            background: #1e3a8a;
            color: #38bdf8;
            transform: rotateY(180deg);
        }
        .flash-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn-flash { background: #3b82f6; color: white; }
        .btn-flash:hover { background: #2563eb; }
    </style>
</head>
<body>

    <!-- Panel 1: Focus Timer -->
    <div class="panel">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timer">25:00</div>
        <div class="btn-group">
            <button class="btn-start" id="start-btn" onclick="toggleTimer()">Start</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Panel 2: Quick Calculator -->
    <div class="panel">
        <h2>Calculator</h2>
        <input type="text" class="calc-screen" id="screen" readonly>
        <div class="calc-grid">
            <button class="btn-calc btn-clear" onclick="clearScreen()">C</button>
            <button class="btn-calc btn-op" onclick="press('/')">/</button>
            <button class="btn-calc btn-op" onclick="press('*')">*</button>
            <button class="btn-calc btn-op" onclick="press('-')">-</button>
            
            <button class="btn-calc" onclick="press('7')">7</button>
            <button class="btn-calc" onclick="press('8')">8</button>
            <button class="btn-calc" onclick="press('9')">9</button>
            <button class="btn-calc btn-op" onclick="press('+')">+</button>
            
            <button class="btn-calc" onclick="press('4')">4</button>
            <button class="btn-calc" onclick="press('5')">5</button>
            <button class="btn-calc" onclick="press('6')">6</button>
            <button class="btn-calc btn-op" onclick="calculate()">=</button>
            
            <button class="btn-calc" onclick="press('1')">1</button>
            <button class="btn-calc" onclick="press('2')">2</button>
            <button class="btn-calc" onclick="press('3')">3</button>
            <button class="btn-calc" onclick="press('0')">0</button>
        </div>
    </div>

    <!-- Panel 3: Smart Unit Converter -->
    <div class="panel">
        <h2>Converter</h2>
        <input type="number" id="conv-input" placeholder="Enter value..." oninput="runConversion()">
        <select id="conv-type" onchange="runConversion()">
            <option value="miles-km">Miles to Kilometers</option>
            <option value="km-miles">Kilometers to Miles</option>
            <option value="lbs-kg">Pounds (lbs) to Kilograms</option>
            <option value="kg-lbs">Kilograms to Pounds (lbs)</option>
            <option value="f-c">Fahrenheit to Celsius</option>
            <option value="c-f">Celsius to Fahrenheit</option>
        </select>
        <div class="conv-result" id="conv-result">Result will show here</div>
    </div>

    <!-- Panel 4: Quick Flashcards -->
    <div class="panel">
        <h2>Flashcards</h2>
        <div class="flashcard-wrapper" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front" id="card-front">Front loading...</div>
                <div class="card-face card-back" id="card-back">Back loading...</div>
            </div>
        </div>
        <div class="flash-controls">
            <button class="btn-flash" onclick="prevCard()">← Prev</button>
            <button class="btn-flash" onclick="nextCard()">Next →</button>
        </div>
    </div>

    <script>
        // Timer Logic
        let timeLeft = 1500; 
        let timerId = null;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            if (timerId === null) {
                btn.textContent = "Pause";
                btn.style.background = "#f59e0b";
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerId);
                        alert("Time is up! Take a useful break.");
                        resetTimer();
                    }
                }, 1000);
            } else {
                clearInterval(timerId);
                timerId = null;
                btn.textContent = "Start";
                btn.style.background = "#10b981";
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 1500;
            updateTimerDisplay();
            const btn = document.getElementById('start-btn');
            btn.textContent = "Start";
            btn.style.background = "#10b981";
        }

        // Calculator Logic
        const screen = document.getElementById('screen');
        function press(val) { screen.value += val; }
        function clearScreen() { screen.value = ''; }
        function calculate() {
            try {
                if (screen.value) { screen.value = eval(screen.value); }
            } catch (error) { screen.value = 'Error'; }
        }

        // Unit Converter Logic
        function runConversion() {
            const val = parseFloat(document.getElementById('conv-input').value);
