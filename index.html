<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Tycoon & Clicker</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b1016;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            gap: 20px;
            height: 95vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        canvas {
            background-color: #121820;
            border: 2px solid #233043;
            border-radius: 8px;
            cursor: default;
        }
        #stats-panel {
            background: #161f2c;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            font-weight: bold;
            border: 1px solid #233043;
        }
        .stat { color: #00bcd4; }
        .stat-money { color: #ffd700; }
        .stat-hp { color: #f44336; }
        
        #tycoon-panel {
            flex: 1;
            background: #161f2c;
            border: 2px solid #233043;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            color: #ffd700;
            border-bottom: 2px solid #233043;
            padding-bottom: 5px;
            font-size: 1.4em;
        }
        .category-title {
            font-size: 1.1em;
            color: #00bcd4;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .upgrade-card {
            background: #233043;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .upgrade-card:hover {
            border-color: #00bcd4;
            background: #2c3e50;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .upgrade-name {
            font-weight: bold;
            font-size: 0.95em;
        }
        .upgrade-desc {
            font-size: 0.8em;
            color: #b0bec5;
        }
        .upgrade-level {
            font-size: 0.8em;
            color: #4caf50;
            font-weight: bold;
        }
        .upgrade-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            min-width: 80px;
            text-align: center;
        }
        .upgrade-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        .build-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .build-btn {
            flex: 1;
            padding: 8px;
            background: #233043;
            border: 1px solid #34495e;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .build-btn.active {
            background: #00bcd4;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stats-panel">
            <div>Wave: <span id="wave-txt" class="stat">1</span></div>
            <div>Cash: $<span id="cash-txt" class="stat-money">500</span></div>
            <div>Income: $<span id="income-txt" class="stat-money">10</span>/s</div>
            <div>Base HP: <span id="hp-txt" class="stat-hp">100</span></div>
        </div>
        <div class="build-selector">
            <button class="build-btn active" id="btn-t1" onclick="setBuildType(1)">Basic Gun ($100)</button>
            <button class="build-btn" id="btn-t2" onclick="setBuildType(2)">Plasma Beam ($250)</button>
        </div>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
    </div>

    <div id="tycoon-panel">
        <h2>Tycoon Core Upgrades (30 Protocols)</h2>
        <div id="upgrades-container"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Grid Configuration (40x40 px tiles)
        const TILE_SIZE = 40;
        const GRID_COLS = 16;
        const GRID_ROWS = 12;

        let cash = 550;
        let baseHp = 100;
        let maxBaseHp = 100;
        let passiveIncome = 10;
        let clickValue = 5;
        let wave = 1;
        let waveTimer = 0;
        let selectedBuildType = 1;

        let globalDamageMult = 1.0;

        let sellReturnRate = 0.5;
        let goldPerHit = 0;

        let criticalChance = 0;
        let plasmaSlowAmount = 0;

        // Clicker visual feedback floats
        let clickFloats = [];

        // Exact grid tile definitions for path blocking
        const mapGrid = Array(GRID_ROWS).fill().map(() => Array(GRID_COLS).fill(0));

        const pathTiles = [

            {r:9, c:6}, {r:9, c:7}, {r:9, c:8}, {r:9, c:9}, {r:9, c:10}, {r:9, c:11},
            {r:8, c:11}, {r:7, c:11}, {r:6, c:11}, {r:5, c:11},
            {r:5, c:12}, {r:5, c:13}, {r:5, c:14}, {r:5, c:15}
        ];
        pathTiles.forEach(t => mapGrid[t.r][t.c] = 1); // 1 = Path

        // Define Clicker Core bounding area (bottom left corner space)
        const clickerCore = { x: 40, y: 380, w: 100, h: 80, pulse: 0 };

        let towers = [];
        let enemies = [];
        let projectiles = [];

        // Definition of the 30 unique upgrades
        const upgradesConfig = [
            // CATEGORY 1: ECONOMY BOOSTER (1-8)
            { id: 1, cat: "Economy", name: "Solar Generators", desc: "Increases passive income generation rate.", lvl: 0, max: 10, cost: 80, scale: 1.5, effect: () => { passiveIncome += 6; } },
            { id: 2, cat: "Economy", name: "Kinetic Capacitors", desc: "Increases your manual click generator value significantly.", lvl: 0, max: 10, cost: 60, scale: 1.4, effect: () => { clickValue += 8; } },
            { id: 3, cat: "Economy", name: "Bounty Contracts", desc: "Earn extra money from every enemy eliminated.", lvl: 0, max: 10, cost: 150, scale: 1.6, effect: () => { killRewardMult += 0.25; } },
            { id: 4, cat: "Economy", name: "Corporate Interest", desc: "Earn 2% of your cash reserves back at end of cycles.", lvl: 0, max: 5, cost: 300, scale: 2.0, effect: () => { interestRate += 0.02; } },
            { id: 5, cat: "Economy", name: "Siphon Rounds", desc: "Gain pocket money when projectiles strike hostiles.", lvl: 0, max: 5, cost: 400, scale: 1.8, effect: () => { goldPerHit += 1; } },
            { id: 6, cat: "Economy", name: "Liquidation Policy", desc: "Improves refund money recovered when removing towers.", lvl: 0, max: 3, cost: 200, scale: 2.2, effect: () => { sellReturnRate += 0.15; } },
            { id: 7, cat: "Economy", name: "Wholesale Permits", desc: "Reduces original building layout unit prices.", lvl: 0, max: 5, cost: 500, scale: 1.6, effect: () => {} },
            { id: 8, cat: "Economy", name: "Hyper Inflation Engine", desc: "Boosts overall passive generation power globally by 30%.", lvl: 0, max: 3, cost: 1200, scale: 2.5, effect: () => { passiveIncome *= 1.3; } },

            // CATEGORY 2: COMBAT MATRIX (9-16)
            { id: 9, cat: "Combat", name: "Caliber Overhaul", desc: "Augments baseline impact output damage points directly.", lvl: 0, max: 10, cost: 100, scale: 1.5, effect: () => { globalDamageMult += 0.2; } },
            { id: 10, cat: "Combat", name: "Polished Lenses", desc: "Widens target validation tracking range.", lvl: 0, max: 10, cost: 120, scale: 1.4, effect: () => { globalRangeMult += 0.1; } },
            { id: 11, cat: "Combat", name: "Overclocked Rotors", desc: "Enables modules to fire rapid munitions configurations.", lvl: 0, max: 8, cost: 200, scale: 1.6, effect: () => { globalSpeedMult += 0.15; } },
            { id: 12, cat: "Combat", name: "Weakspot Protocols", desc: "Grants a chance to land double damage critical hits.", lvl: 0, max: 5, cost: 350, scale: 1.8, effect: () => { criticalChance += 0.08; } },
            { id: 13, cat: "Combat", name: "Dense Alloys", desc: "Speeds up projectile tracking velocities.", lvl: 0, max: 5, cost: 150, scale: 1.4, effect: () => { } },
            { id: 14, cat: "Combat", name: "Cryo Cores", desc: "Plasma beams lower enemy movement parameters upon impact.", lvl: 0, max: 5, cost: 400, scale: 1.7, effect: () => { plasmaSlowAmount += 0.12; } },
            { id: 15, cat: "Combat", name: "Uranium Coating", desc: "Adds large toxic auxiliary damage modifiers.", lvl: 0, max: 5, cost: 500, scale: 1.9, effect: () => { globalDamageMult += 0.3; } },
