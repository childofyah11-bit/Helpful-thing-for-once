<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Hunt</title>
    <style>
        :root {
            --bg: #0b0f19;
            --surface: #1e293b;
            --accent: #38bdf8;
            --danger: #ef4444;
            --border: #334155;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            width: 1100px;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 { margin: 0; font-size: 24px; color: var(--accent); font-weight: 800; letter-spacing: 1px; }

        .timer-card {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-weight: bold;
            font-size: 16px;
        }

        #game-canvas {
            background-color: #5cbeee; /* Sky color */
            border: 3px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }

        .hud-bottom {
            width: 1100px;
            margin-top: 10px;
            background: var(--surface);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 13px;
            text-align: center;
            box-sizing: border-box;
            color: #94a3b8;
        }
        .hud-bottom strong { color: var(--accent); }
    </style>
</head>
<body>

    <div class="hud-top">
        <h2>BLOCK HUNT // AI VS HUMAN</h2>
        <div class="timer-card" id="match-timer-label">Hiding Phase: 15s</div>
    </div>

    <!-- Full-Size Single Player Viewport Canvas -->
    <canvas id="game-canvas" width="1100" height="520"></canvas>
    
    <div class="hud-bottom">
        <strong>CONTROLS:</strong> [W, A, S, D] or [Arrows] to Move & Jump | 
        <strong>MORPH DISGUISES:</strong> Press Keys [1 = Grass] [2 = Stone] [3 = Wood] [4 = Brick] [5 = Leaves] [0 = Human Shape]
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const BLOCK_SIZE = 40; 
    const LEVEL_COLS = 50; 
    const LEVEL_ROWS = canvas.height / BLOCK_SIZE;

    // Standard Minecraft Textures Palette
    const BLOCK_TYPES = {
        0: { name: 'Air', color: 'transparent' },
        1: { name: 'Grass', color: '#34d399' },
        2: { name: 'Stone', color: '#64748b' },
        3: { name: 'Wood', color: '#b45309' },
        4: { name: 'Brick', color: '#ef4444' },
        5: { name: 'Leaves', color: '#16a34a' }
    };

    // Static World Environment Matrix Setup
    let worldMap = {};
    for (let c = 0; c < LEVEL_COLS; c++) {
        let groundLevel = LEVEL_ROWS - 3;
        // Hills and architectural structures
        if (c > 12 && c < 18) groundLevel = LEVEL_ROWS - 5;
        if (c > 30 && c < 36) groundLevel = LEVEL_ROWS - 6;

        for (let r = 0; r < LEVEL_ROWS; r++) {
            if (r === groundLevel) {
                worldMap[`${c},${r}`] = 1; 
            } else if (r > groundLevel) {
                worldMap[`${c},${r}`] = 2; 
            }
        }
    }

    // Spawn environment blocks to blend with
    worldMap["6," + (LEVEL_ROWS-4)] = 3; worldMap["6," + (LEVEL_ROWS-5)] = 5; 
    worldMap["22," + (LEVEL_ROWS-4)] = 4; worldMap["23," + (LEVEL_ROWS-4)] = 4; 
    worldMap["42," + (LEVEL_ROWS-4)] = 3; worldMap["42," + (LEVEL_ROWS-5)] = 5; 

    // Character Entities
    let hider = { x: 120, y: 200, w: 24, h: 38, vx: 0, vy: 0, currentMorph: 0, color: '#38bdf8' };
    let aiSeeker = { x: 1800, y: 200, w: 24, h: 38, vx: 0, vy: 0, color: '#f43f5e', state: 'idle', targetX: 1800, actionCooldown: 0 };
    
    let speed = 4.5;
    let gravity = 0.5;
    let keys = {};
    
    // Match Timer Logic
    let timeRemaining = 15; 
    let hiderPhase = true;
    let matchOver = false;
    let matchResultText = "";

    let countdownInterval = setInterval(() => {
        if (matchOver) return;
        timeRemaining--;
        
        const label = document.getElementById('match-timer-label');
        if (hiderPhase) {
            label.textContent = `Hiding Phase: ${timeRemaining}s`;
            if (timeRemaining <= 0) {
                hiderPhase = false;
                timeRemaining = 45; 
                label.style.color = 'var(--danger)';
                aiSeeker.state = 'patrol';
            }
        } else {
            label.textContent = `AI Hunting Time: ${timeRemaining}s`;
            if (timeRemaining <= 0) {
                matchOver = true;
                matchResultText = "YOU WIN! YOU FOOLED THE AI 🏆";
                label.textContent = "MATCH CONCLUDED";
                clearInterval(countdownInterval);
            }
        }
    }, 1000);

    window.addEventListener('keydown', (e) => { 
        keys[e.key.toLowerCase()] = true; 
        keys[e.code] = true;

        if (matchOver) return;

        // Player 1 Morph Triggers (Keys 1-5)
        if (e.key === '1') hider.currentMorph = 1;
        if (e.key === '2') hider.currentMorph = 2;
        if (e.key === '3') hider.currentMorph = 3;
        if (e.key === '4') hider.currentMorph = 4;
        if (e.key === '5') hider.currentMorph = 5;
        if (e.key === '0') hider.currentMorph = 0; 
    });

    window.addEventListener('keyup', (e) => { 
        keys[e.key.toLowerCase()] = false; 
        keys[e.code] = false;
    });

    function checkLevelCollision(x, y) {
        let col = Math.floor(x / BLOCK_SIZE);
        let row = Math.floor(y / BLOCK_SIZE);
        return worldMap[`${col},${row}`] ? true : false;
    }

    function movePlayer() {
        hider.vx = 0;
        if (keys['a'] || keys['arrowleft']) hider.vx = -speed;
        if (keys['d'] || keys['arrowright']) hider.vx = speed;

        hider.vy += gravity;
        hider.x += hider.vx;

        if (hider.x < 0) hider.x = 0;
        if (hider.x + hider.w > LEVEL_COLS * BLOCK_SIZE) hider.x = (LEVEL_COLS * BLOCK_SIZE) - hider.w;

        hider.y += hider.vy;
        let grounded = false;
        let footY = hider.y + hider.h;

        if (checkLevelCollision(hider.x, footY) || checkLevelCollision(hider.x + hider.w, footY)) {
            let snappedRow = Math.floor(footY / BLOCK_SIZE);
            hider.y = (snappedRow * BLOCK_SIZE) - hider.h;
            hider.vy = 0;
            grounded = true;
        }

        if ((keys[' '] || keys['w'] || keys['arrowup']) && grounded) {
            hider.vy = -10;
        }
    }

    function processAIIntelligence() {
        if (hiderPhase || matchOver) return;

        aiSeeker.vy += gravity;
        let distanceToHider = Math.abs(aiSeeker.x - hider.x);
        
        // AI Radar Vision parameters (Disguises vastly lower detection range)
        let visionRange = hider.currentMorph === 0 ? 550 : 90; 

        if (distanceToHider < visionRange) {
            aiSeeker.state = 'chase';
            aiSeeker.targetX = hider.x;
        } else if (aiSeeker.state === 'chase' || aiSeeker.state === 'idle') {
            aiSeeker.state = 'patrol';
            aiSeeker.targetX = Math.random() * (LEVEL_COLS * BLOCK_SIZE - 200) + 100;
        }

        let aiMovementSpeed = aiSeeker.state === 'chase' ? 3.8 : 2.2;
        if (aiSeeker.x < aiSeeker.targetX - 5) {
            aiSeeker.vx = aiMovementSpeed;
        } else if (aiSeeker.x > aiSeeker.targetX + 5) {
            aiSeeker.vx = -aiMovementSpeed;
        } else {
            aiSeeker.vx = 0;
            if (aiSeeker.state === 'patrol') {
                aiSeeker.targetX = Math.random() * (LEVEL_COLS * BLOCK_SIZE - 200) + 100;
            }
        }

        aiSeeker.x += aiSeeker.vx;

        // Auto Obstacle Jump Climbing
        let checkX = aiSeeker.vx > 0 ? aiSeeker.x + aiSeeker.w + 5 : aiSeeker.x - 5;
        let isBlockedAhead = checkLevelCollision(checkX, aiSeeker.y + aiSeeker.h - 10);

        let grounded = false;
        let footY = aiSeeker.y + aiSeeker.h;
        aiSeeker.y += aiSeeker.vy;

        if (checkLevelCollision(aiSeeker.x, footY) || checkLevelCollision(aiSeeker.x + aiSeeker.w, footY)) {
            let snappedRow = Math.floor(footY / BLOCK_SIZE);
            aiSeeker.y = (snappedRow * BLOCK_SIZE) - aiSeeker.h;
            aiSeeker.vy = 0;
            grounded = true;
        }

        if (isBlockedAhead && grounded) {
            aiSeeker.vy = -10.5; 
        }

        // Catch Verification
        let actualDist = Math.hypot((aiSeeker.x + aiSeeker.w/2) - (hider.x + hider.w/2), (aiSeeker.y + aiSeeker.h/2) - (hider.y + hider.h/2));
        if (actualDist < 35) {
            matchOver = true;
            matchResultText = "AI CAUGHT YOU! GAME OVER 🎯";
            clearInterval(countdownInterval);
        }
    }

    function mainEngineLoop() {
        if (!matchOver) {
            movePlayer();
            processAIIntelligence();
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        let camX = hider.x - canvas.width / 2;
        camX = Math.max(0, Math.min((LEVEL_COLS * BLOCK_SIZE) - canvas.width, camX));
        ctx.translate(-camX, 0);

        // 1. Draw World Matrix blocks
        for (let col = 0; col < LEVEL_COLS; col++) {
            for (let row = 0; row < LEVEL_ROWS; row++) {
                let blockId = worldMap[`${col},${row}`];
                if (blockId) {
