<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Arena: Chaos Edition</title>
    <!-- PeerJS Framework Module -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #090d16;
            --surface: #121824;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --gold: #eab308;
            --border: #29354f;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        h2 { margin: 0; color: var(--accent); font-size: 28px; text-shadow: 0 0 10px rgba(56,189,248,0.2); }
        
        .dashboard {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel-card {
            background: var(--surface);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .score-card {
            border-color: var(--gold);
            color: var(--gold);
            font-size: 18px;
        }

        #game-canvas {
            background-color: #0f172a;
            border: 3px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }

        .status-footer { font-size: 13px; color: #64748b; margin-top: 8px; font-family: monospace; }
        
        .pulse {
            width: 10px; height: 10px; background: #ea580c; border-radius: 50%;
            display: inline-block; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>

    <h2>SURVIVAL ARENA: CHAOS MODE</h2>
    
    <div class="dashboard">
        <div class="panel-card">
            <div id="lobby-pulse" class="pulse"></div>
            <span id="match-status-label">Initializing internal network matrices...</span>
        </div>
        <div class="panel-card score-card">Coins: <span id="score-val">0</span></div>
        <div class="panel-card" style="color: var(--success); border-color: var(--success);">⚡ Boost: <span id="boost-status">READY</span></div>
    </div>

    <canvas id="game-canvas" width="850" height="480"></canvas>
    
    <div class="status-footer">
        Controls: [W,A,S,D / Arrows] Move | [Spacebar] Instant Burst Dash | System: <span id="connection-status">Booting cores...</span>
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Network Engine Parameters
    let peer;
    let connections = [];
    let myId = null;
    let players = {};
    let baseSpeed = 5;
    let currentSpeed = 5;
    let keysPressed = {};
    let score = 0;

    // Matchmaking Room Configuration Strings
    const LOBBY_HOST_ID = 'nexus_public_matchmaker_lobby_v3';
    let isHost = false;
    let hasRealOpponent = false;

    // Advanced Game Mechanics & Entity States
    let coin = { x: 425, y: 240, radius: 9 };
    let speedBoost = { x: 200, y: 150, radius: 10, active: true, respawnTimer: 0 };
    let aiBot = { x: 100, y: 100, radius: 15, baseSpeed: 2.2, currentSpeed: 2.2 };
    
    let boostDuration = 0;
    let dashCooldown = 0;

    function createSelfPlayer(id) {
        myId = id;
        players[myId] = {
            id: myId,
            x: Math.floor(Math.random() * 500) + 150,
            y: Math.floor(Math.random() * 250) + 100,
            color: `hsl(${Math.random() * 360}, 85%, 60%)`,
            label: id.startsWith('client_') ? 'Guest' : 'Host'
        };
    }

    function startMatchmaking() {
        const statusLabel = document.getElementById('match-status-label');
        statusLabel.innerHTML = 'Searching match clusters... [Solo Sandbox Running]';

        const clientRandomId = 'client_' + Math.random().toString(36).substring(2, 9);
        peer = new Peer(clientRandomId, {
            config: { 'iceServers': [{ url: 'stun:://google.com' }, { url: 'stun:://google.com' }] }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            const conn = peer.connect(LOBBY_HOST_ID);
            setupConnectionTracking(conn);

            setTimeout(() => {
                if (connections.length === 0 && !isHost) {
                    switchToHostMode();
                }
            }, 2500);
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') switchToHostMode();
        });
    }

    function switchToHostMode() {
        if (isHost) return;
        isHost = true;
        if (peer) peer.destroy();

        const statusLabel = document.getElementById('match-status-label');
        const pulse = document.getElementById('lobby-pulse');
        
        statusLabel.innerHTML = 'Solo Chaos Mode (Waiting for human connections...)';
        pulse.style.backgroundColor = '#ea580c'; // Search mode pulse

        peer = new Peer(LOBBY_HOST_ID, {
            config: { 'iceServers': [{ url: 'stun:://google.com' }, { url: 'stun:://google.com' }] }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            document.getElementById('connection-status').textContent = "P2P Lobby active.";
        });

        peer.on('connection', (conn) => {
            setupConnectionTracking(conn);
        });
    }

    function setupConnectionTracking(conn) {
        conn.on('open', () => {
            connections.push(conn);
            hasRealOpponent = true;
            document.getElementById('match-status-label').innerHTML = 'Multiplayer Connected! Bot disabled. ⚔️';
            document.getElementById('lobby-pulse').style.backgroundColor = 'var(--success)';
            document.getElementById('connection-status').textContent = "Mesh pipeline stable.";
            
            conn.send({ type: 'handshake', player: players[myId], coin: coin, boost: speedBoost });
        });

        conn.on('data', (data) => {
            if (data.type === 'handshake' || data.type === 'sync') {
                players[data.player.id] = data.player;
                if (data.coin) coin = data.coin;
                if (data.boost) speedBoost = data.boost;
                if (data.type === 'handshake') conn.send({ type: 'sync', player: players[myId], coin: coin, boost: speedBoost });
            } 
            else if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
            }
            else if (data.type === 'coinGathered') {
                coin = data.nextCoin;
            }
            else if (data.type === 'boostGathered') {
                speedBoost = data.nextBoost;
            }
        });

        conn.on('close', () => {
            document.getElementById('match-status-label').innerHTML = 'Opponent left. Returning to Solo Mode...';
            document.getElementById('lobby-pulse').style.backgroundColor = '#ea580c';
            connections = connections.filter(c => c !== conn);
            hasRealOpponent = false;
            
            for (let id in players) {
                if (id !== myId) delete players[id];
            }
            if (!isHost) switchToHostMode();
        });
    }

    window.addEventListener('keydown', (e) => { 
        keysPressed[e.key.toLowerCase()] = true; 
        
        // --- DASH EXECUTION UTILITY (Spacebar Trigger) ---
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            if (dashCooldown <= 0 && (myId && players[myId])) {
                executeBurstDash(players[myId]);
            }
        }
    });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function broadcastState(type, dataMap) {
        connections.forEach(conn => { if (conn.open) conn.send({ type: type, ...dataMap }); });
    }

    function executeBurstDash(me) {
        let dx = 0; let dy = 0;
        if (keysPressed['w'] || keysPressed['arrowup']) dy = -1;
        if (keysPressed['s'] || keysPressed['arrowdown']) dy = 1;
        if (keysPressed['a'] || keysPressed['arrowleft']) dx = -1;
        if (keysPressed['d'] || keysPressed['arrowright']) dx = 1;

        if (dx !== 0 || dy !== 0) {
            // Normalize velocity vector
            let length = Math.hypot(dx, dy);
            me.x += (dx / length) * 45;
            me.y += (dy / length) * 45;
            dashCooldown = 90; // Frame counter delay restriction
            document.getElementById('boost-status').textContent = 'CHARGING';
            document.getElementById('boost-status').parentElement.style.borderColor = 'var(--danger)';
            document.getElementById('boost-status').parentElement.style.color = 'var(--danger)';
        }
    }

    function processMovementLogic() {
        if (!myId || !players[myId]) return;

        let me = players[myId];
        let moved = false;

        // Manage Timers
        if (dashCooldown > 0) {
            dashCooldown--;
            if(dashCooldown === 0) {
