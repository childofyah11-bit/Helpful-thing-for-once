<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pixel Art Studio</title>
    <style>
        body {
            background-color: #1a1a24;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #ff007f;
            text-shadow: 2px 2px #00f0ff;
            margin-bottom: 5px;
            font-size: 2rem;
        }

        .subtitle {
            color: #a0aec0;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .studio-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2d2d3a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #3f3f56;
        }

        /* Color Palette Layout */
        .palette {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #1a1a24;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.1s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* Art Canvas Pixel Grid Layout */
        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(16, 22px);
            grid-template-rows: repeat(16, 22px);
            gap: 1px;
            background-color: #3f3f56;
            border: 4px solid #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
        }

        .pixel {
            background-color: #ffffff;
            cursor: crosshair;
            transition: background-color 0.05s;
        }

        .pixel:hover {
            filter: brightness(0.9);
        }

        /* Control Panel Operations */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .btn {
            flex: 1;
            background-color: #1a1a24;
            color: #ffffff;
            border: 2px solid #00f0ff;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #00f0ff;
            color: #1a1a24;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .btn-clear {
            border-color: #ff007f;
        }

        .btn-clear:hover {
            background-color: #ff007f;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }
    </style>
</head>
<body>

    <h1>PIXEL CRAFT</h1>
    <div class="subtitle">Click and drag cursor across grid spaces to paint</div>

    <div class="studio-container">
        <!-- Palette Colors Picker selection board -->
        <div class="palette" id="colorPalette">
            <div class="color-swatch active" style="background-color: #ff007f;" data-color="#ff007f"></div>
            <div class="color-swatch" style="background-color: #00f0ff;" data-color="#00f0ff"></div>
            <div class="color-swatch" style="background-color: #ffbe0b;" data-color="#ffbe0b"></div>
            <div class="color-swatch" style="background-color: #00ff66;" data-color="#00ff66"></div>
            <div class="color-swatch" style="background-color: #7000ff;" data-color="#7000ff"></div>
            <div class="color-swatch" style="background-color: #1a1a24;" data-color="#1a1a24"></div>
            <div class="color-swatch" style="background-color: #ffffff;" data-color="#ffffff"></div>
        </div>

        <!-- The Paint Canvas Matrix Grid Area -->
        <div class="canvas-grid" id="pixelCanvas"></div>

        <!-- System Reset Cleansing Commands Row -->
        <div class="controls">
            <button class="btn btn-clear" onclick="clearCanvas()">Reset Grid</button>
            <button class="btn" onclick="fillCanvas()">Fill Grid</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pixelCanvas');
        const palette = document.getElementById('colorPalette');
        
        let currentSelectedColor = '#ff007f';
        let isMouseDownGlobalState = false;

        // Initialize Global Drag Event Tracking Listeners 
        document.body.onmousedown = () => (isMouseDownGlobalState = true);
        document.body.onmouseup = () => (isMouseDownGlobalState = false);

        // Render Canvas Grid Matrix Map (16x16 Node Elements)
        function createGridElements() {
            for (let i = 0; i < 256; i++) {
                const pixelNode = document.createElement('div');
                pixelNode.classList.add('pixel');
                
                // Mouse Trigger Application Functions
                pixelNode.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    pixelNode.style.backgroundColor = currentSelectedColor;
                });
                
                pixelNode.addEventListener('mouseenter', () => {
                    if (isMouseDownGlobalState) {
                        pixelNode.style.backgroundColor = currentSelectedColor;
                    }
                });

                canvas.appendChild(pixelNode);
            }
        }

        // Palette Activation Selection Processing Event Routing 
        palette.addEventListener('click', (event) => {
            if (event.target.classList.contains('color-swatch')) {
                // Clear active styling indicators globally across element lists
                document.querySelectorAll('.color-swatch').forEach(swatchItem => {
                    swatchItem.classList.remove('active');
                });
                
                // Establish current workspace paint assignments
                event.target.classList.add('active');
                currentSelectedColor = event.target.getAttribute('data-color');
            }
        });

        // Clear Canvas Matrix Nodes back to initial base structural assignments
        function clearCanvas() {
            document.querySelectorAll('.pixel').forEach(pixelNode => {
                pixelNode.style.backgroundColor = '#ffffff';
            });
        }

        // Fill complete active canvas grid layout using target selection context
        function fillCanvas() {
            document.querySelectorAll('.pixel').forEach(pixelNode => {
                pixelNode.style.backgroundColor = currentSelectedColor;
            });
        }

        // Run structural composition initialization processes
        createGridElements();
    </script>
</body>
</html>
