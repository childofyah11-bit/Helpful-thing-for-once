<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Builder</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #10b981;
            --border: #334155;
            --text: #f8fafc;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 800px;
            align-items: center;
            margin-bottom: 10px;
        }

        h2 { margin: 0; font-size: 22px; color: var(--accent); font-weight: 800; }

        .palette {
            display: flex;
            gap: 8px;
            background: var(--surface);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .swatch {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .swatch:hover { transform: scale(1.1); }
        .swatch.active { border-color: white; transform: scale(1.1); }

        #game-canvas {
            background-color: #7dd3fc; /* Sky blue background */
            border: 3px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        .instructions {
            width: 800px;
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="hud">
        <h2>PEACEFUL BUILDER</h2>
        <div class="palette" id="block-palette">
            <!-- Swatches will be generated dynamically by JS -->
        </div>
    </div>

    <canvas id="game-canvas" width="800" height="480"></canvas>
    
    <div class="instructions">
        <strong>Controls:</strong> [A / D] or [Left / Right Arrows] Move Character | [Spacebar] Jump <br>
        <strong>Building:</strong> [Left Click] Place Selected Block | [Right Click / Shift + Click] Remove Block
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    const BLOCK_SIZE = 32;
    const GRID_COLS = canvas.width / BLOCK_SIZE;
    const GRID_ROWS = canvas.height / BLOCK_SIZE;

    // Peaceful Block Material Definitions
    const MATERIALS = {
        1: { name: 'Grass', color: '#22c55e' },
        2: { name: 'Dirt', color: '#78350f' },
        3: { name: 'Stone', color: '#64748b' },
        4: { name: 'Wood', color: '#b45309' },
        5: { name: 'Leaves', color: '#15803d' },
        6: { name: 'Brick', color: '#b91c1c' },
        7: { name: 'Glass', color: '#e2e8f0' }
    };

    let selectedMaterial = 1;
    let grid = {};

    // Character State Properties
    let player = {
        x: 100,
        y: 200,
        width: 20,
        height: 38,
        vx: 0,
        vy: 0,
        speed: 4,
        jumpForce: 10,
        gravity: 0.5,
        grounded: false
    };

    let keys = {};

    // Generate Palette HTML Elements
    const paletteContainer = document.getElementById('block-palette');
    Object.keys(MATERIALS).forEach(id => {
        const swatch = document.createElement('div');
        swatch.className = `swatch ${id == selectedMaterial ? 'active' : ''}`;
        swatch.style.backgroundColor = MATERIALS[id].color;
        swatch.title = MATERIALS[id].name;
        swatch.onclick = () => {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            swatch.classList.add('active');
            selectedMaterial = parseInt(id);
        };
        paletteContainer.appendChild(swatch);
    });

    // Build Initial Grass Ground Baseline
    const groundRow = GRID_ROWS - 3;
    for (let col = 0; col < GRID_COLS; col++) {
        grid[`${col},${groundRow}`] = 1; // Grass
        for (let row = groundRow + 1; row < GRID_ROWS; row++) {
            grid[`${col},${row}`] = 2; // Dirt underneath
        }
    }

    // Input collection hooks
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    // Handle Build and Demolish click mechanics
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const col = Math.floor(mouseX / BLOCK_SIZE);
        const row = Math.floor(mouseY / BLOCK_SIZE);
        const key = `${col},${row}`;

        // Right-click or Shift+Left-click breaks blocks
        if (e.button === 2 || e.shiftKey) {
            delete grid[key];
        } else if (e.button === 0) {
            // Left click places selected block if the space is empty
            if (!grid[key]) {
                grid[key] = selectedMaterial;
            }
        }
    });

    // Prevent default right-click menu popups on the canvas
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function checkBlockCollision(x, y) {
        const col = Math.floor(x / BLOCK_SIZE);
        const row = Math.floor(y / BLOCK_SIZE);
        return grid[`${col},${row}`] ? true : false;
    }

    function updatePhysics() {
        // Horizontal Pilot Controls
        player.vx = 0;
        if (keys['a'] || keys['arrowleft']) player.vx = -player.speed;
        if (keys['d'] || keys['arrowright']) player.vx = player.speed;

        // Apply Gravity forces
        player.vy += player.gravity;

        // Predict X Movements and clamp boundaries
        player.x += player.vx;
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

        // Predict Y Movements and scan for block landings
        player.y += player.vy;
        player.grounded = false;

        // Check feet collision against structural grid elements
        const footY = player.y + player.height;
        const leftFootX = player.x;
        const rightFootX = player.x + player.width;

        if (checkBlockCollision(leftFootX, footY) || checkBlockCollision(rightFootX, footY)) {
            const snappedRow = Math.floor(footY / BLOCK_SIZE);
            player.y = (snappedRow * BLOCK_SIZE) - player.height;
            player.vy = 0;
            player.grounded = true;
        }

        // Jump Execution if Grounded
        if ((keys[' '] || keys['w'] || keys['arrowup']) && player.grounded) {
            player.vy = -player.jumpForce;
            player.grounded = false;
        }

        // Sky-falling fallback reset parameter
        if (player.y > canvas.height) {
            player.x = 100;
            player.y = 100;
            player.vy = 0;
        }
    }

    function drawScreen() {
        updatePhysics();

        // Clear Canvas view space with custom bright cloud sun assets
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ambient Sun Element background accent
        ctx.fillStyle = '#fef08a';
        ctx.beginPath();
        ctx.arc(700, 60, 30, 0, Math.PI * 2);
        ctx.fill();
        ctx.closePath();

        // 1. Draw Map Block Structures Matrix
        Object.keys(grid).forEach(key => {
            const [col, row] = key.split(',').map(Number);
            const matId = grid[key];
            
            ctx.fillStyle = MATERIALS[matId].color;
            ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            
            // Draw subtle micro outline details to show grid divisions cleanly
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        });

        // 2. Draw Friendly Character Model Avatar
        ctx.fillStyle = '#ec4899'; // Bright friendly pink character tone
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Draw character backpack detail item
        ctx.fillStyle = '#db2777';
        ctx.fillRect(player.x - 4, player.y + 10, 4, 18);

        // Draw little friendly eyes checking horizontal travel direction vectors
        ctx.fillStyle = '#0f172a';
        let eyeOffset = player.vx >= 0 ? 12 : 2;
        ctx.fillRect(player.x + eyeOffset, player.y + 6, 4, 4);

        requestAnimationFrame(drawScreen);
    }

    // Launch core frame loop execution parameters
    drawScreen();
</script>
</body>
</html>
