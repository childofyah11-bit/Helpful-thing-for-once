<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommsStation: Automatic P2P Text Radio</title>
    <!-- Imports the PeerJS network engine library automatically -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-base: #11140f;
            --panel-card: #1c2217;
            --army-green: #4d5d3e;
            --neon-glow: #7fff00;
            --alert-red: #ff3333;
            --txt-bright: #f0f5eb;
            --txt-muted: #708264;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--txt-bright);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .station-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-card);
            border-radius: 8px;
            padding: 25px;
            border: 3px solid var(--army-green);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.9);
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--army-green);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--neon-glow); text-transform: uppercase; letter-spacing: 1px; }

        .status-panel {
            background: #090c07;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--army-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .indicator { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert-red); box-shadow: 0 0 8px var(--alert-red); }
        .dot.active { background: var(--neon-glow); box-shadow: 0 0 8px var(--neon-glow); }

        .deck {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--army-green);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 12px 0; font-size: 0.85rem; color: var(--neon-glow); text-transform: uppercase; }

        .channel-selector-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .channel-btn {
            background: #090c07;
            color: var(--txt-muted);
            font-weight: bold;
            border: 2px solid var(--army-green);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .channel-btn:hover {
            border-color: var(--neon-glow);
            color: var(--txt-bright);
        }

        .channel-btn.selected-channel {
            background: var(--army-green);
            color: #000;
            border-color: var(--neon-glow);
            box-shadow: 0 0 10px rgba(127, 255, 0, 0.3);
        }

        /* Messaging Text Row Layout styles */
        .transmit-box {
            display: flex;
            gap: 8px;
        }

        .transmit-box input {
            flex: 1;
            background: #050704;
            color: var(--neon-glow);
            border: 1px solid var(--army-green);
            border-radius: 4px;
            padding: 12px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .transmit-box input:focus { outline: none; border-color: var(--neon-glow); }
        .transmit-box input:disabled { background: #131710; cursor: not-allowed; border-color: #2b3324; color: #3b4532; }

        .transmit-btn {
            background: var(--army-green);
            color: var(--txt-bright);
            font-weight: bold;
            border: 1px solid #637751;
            padding: 0 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            border-radius: 4px;
        }
        .transmit-btn:hover:not(:disabled) { background: #5c704a; }
        .transmit-btn:disabled { background: #2c2f29; color: #555; border-color: #1a1c18; cursor: not-allowed; }

        .terminal {
            background: #050704; border: 1px solid var(--army-green); height: 160px;
            border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 0.8rem; color: #a4bfa3;
            line-height: 1.4;
        }
        .log { margin-bottom: 6px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="station-container">
        <header>
            <h1>📡 AUTOMATIC TEXT RADIO</h1>
        </header>

        <div class="status-panel">
            <div class="indicator">NET: <div class="dot" id="linkDot"></div> <span id="linkTxt">OFFLINE</span></div>
            <div class="indicator">COMMS: <div class="dot" id="commsDot"></div> <span id="commsTxt">STANDBY</span></div>
        </div>

        <!-- Room Selector Board Layer -->
        <div class="deck">
            <h2>Select Station Frequency Room</h2>
            <div class="channel-selector-row">
                <button class="channel-btn" onclick="selectAndConnectChannel('a1', this)">A1</button>
                <button class="channel-btn" onclick="selectAndConnectChannel('a2', this)">A2</button>
                <button class="channel-btn" onclick="selectAndConnectChannel('a3', this)">A3</button>
            </div>
        </div>

        <!-- Text Input Transmission Panel Frame replaces old circular button -->
        <div class="deck">
            <h2>Transmit Signal Payload</h2>
            <div class="transmit-box">
                <input type="text" id="textPayloadInput" placeholder="Type transmission packet..." disabled onkeydown="if(event.key==='Enter') sendTextPayload()">
                <button class="transmit-btn" id="sendBtn" disabled onclick="sendTextPayload()">Beam</button>
            </div>
        </div>

        <!-- Chat Stream Console Logger Display -->
        <div class="terminal" id="activityBox">
            <div class="log" style="color: var(--txt-muted);">[SYS] Standing by. Select an active frequency option above to sync data channels.</div>
        </div>
    </div>

    <script>
        let peerInstance = null;
        let dataConnectionRef = null;

        const textInputNode = document.getElementById('textPayloadInput');
        const sendButtonNode = document.getElementById('sendBtn');
        const logTerminal = document.getElementById('activityBox');
        
        const linkDot = document.getElementById('linkDot');
        const linkTxt = document.getElementById('linkTxt');
        const commsDot = document.getElementById('commsDot');
        const commsTxt = document.getElementById('commsTxt');

        function writeLog(tag, info, textHexColor = '#a4bfa3') {
            const line = document.createElement('div');
            line.classList.add('log');
            line.style.color = textHexColor;
            line.innerHTML = `[${tag}] ${info}`;
            logTerminal.appendChild(line);
            logTerminal.scrollTop = logTerminal.scrollHeight;
        }

        function disconnectExistingPeerSession() {
            textInputNode.disabled = true;
            sendButtonNode.disabled = true;
            linkDot.classList.remove('active');
            commsDot.classList.remove('active');
            linkTxt.textContent = "OFFLINE";
            commsTxt.textContent = "STANDBY";
            
            if (dataConnectionRef) {
                dataConnectionRef.close();
                dataConnectionRef = null;
            }
            if (peerInstance) {
                peerInstance.destroy();
                peerInstance = null;
                writeLog('SYS', 'Closed previous radio session context pipelines.', 'var(--txt-muted)');
            }
        }

        async function selectAndConnectChannel(selectedRoomId, buttonElement) {
            disconnectExistingPeerSession();

            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('selected-channel'));
            buttonElement.classList.add('selected-channel');

            writeLog('NET', `Auto-contacting signaling room space: [${selectedRoomId}]...`);
            
            // Connect to direct room string targeting standard STUN parameters
            peerInstance = new Peer(selectedRoomId, {
                config: { iceServers: [{ urls: 'stun:://google.com' }] }
            });

            peerInstance.on('open', (id) => {
                writeLog('SYS', `Channel active. Listening as Master Hub: ${id}`);
                linkDot.classList.add('active');
                linkTxt.textContent = "LISTENING ON CHANNEL";
                
                // Probe to verify if another client node is online inside the network cluster
                attemptDataConnection(selectedRoomId + "-client");
            });

            peerInstance.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    writeLog('SYS', 'Primary slot occupied. Routing as secondary station client...');
                    peerInstance = new Peer(selectedRoomId + "-client", {
                        config: { iceServers: [{ urls: 'stun:://google.com' }] }
                    });
                    
                    peerInstance.on('open', () => {
                        writeLog('SYS', 'Secondary line ready. Intersecting with host node configuration...');
