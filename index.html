<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow Studio</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .studio-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 800px;
        }

        .panel {
            background-color: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 700;
            text-align: center;
            font-variant-numeric: tabular-nums;
            margin: 20px 0;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        button {
            background-color: var(--border-color);
            color: var(--text-main);
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        button.primary {
            background-color: var(--accent);
            color: var(--bg-dark);
        }

        button.primary:hover {
            background-color: var(--accent-hover);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"], textarea {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            max-height: 180px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-dark);
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent);
        }

        .task-item.done {
            opacity: 0.5;
            text-decoration: line-through;
            border-left-color: var(--border-color);
        }

        .delete-icon {
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }

        textarea {
            resize: none;
            flex-grow: 1;
            font-family: inherit;
            line-height: 1.5;
            min-height: 120px;
        }

        .sound-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="studio-layout">
    <div class="panel">
        <h2>Timer Workspace</h2>
        <div class="timer-display" id="time-view">25:00</div>
        
        <div class="controls-row">
            <button class="primary" id="start-stop-btn">Start</button>
            <button id="reset-btn">Reset</button>
        </div>
        
        <div class="controls-row">
            <button id="mode-work" style="font-size: 12px;">Focus (25m)</button>
            <button id="mode-break" style="font-size: 12px;">Break (5m)</button>
        </div>

        <h2 style="margin-top: 20px; font-size: 14px;">White Noise Generator</h2>
        <div class="sound-toggle">
            <span style="font-size: 14px; color: var(--text-muted)">Synthetic Brown Noise</span>
            <button id="audio-btn" style="flex: 0; padding: 6px 12px; font-size: 12px;">Play</button>
        </div>
    </div>

    <div class="panel" style="gap: 12px;">
        <h2>Session Targets</h2>
        <div class="input-group">
            <input type="text" id="task-input" placeholder="What are you working on right now?">
            <button id="add-task-btn" style="flex: 0;">Add</button>
        </div>
        <ul class="task-list" id="task-container"></ul>

        <h2 style="margin-top: 10px;">Quick Scratchpad</h2>
        <textarea id="notes-area" placeholder="Jot down loose thoughts, URLs, or code strings to look at later..."></textarea>
    </div>
</div>

<script>
    let countdown;
    let secondsLeft = 1500; 
    let isRunning = false;
    let audioContext;
    let noiseNode;

    let tasks = JSON.parse(localStorage.getItem('studio_tasks')) || [];
    
    // Check elements safely before population
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('notes-area').value = localStorage.getItem('studio_notes') || '';
        updateTimerUI();
        renderTasks();
    });

    const timeView = document.getElementById('time-view');
    const startStopBtn = document.getElementById('start-stop-btn');
    const notesArea = document.getElementById('notes-area');
    const taskInput = document.getElementById('task-input');
    const taskContainer = document.getElementById('task-container');

    function updateTimerUI() {
        const minutes = Math.floor(secondsLeft / 60);
        const remainderSeconds = secondsLeft % 60;
        timeView.textContent = `${minutes}:${remainderSeconds < 10 ? '0' : ''}${remainderSeconds}`;
    }

    function toggleTimer() {
        if (isRunning) {
            clearInterval(countdown);
            startStopBtn.textContent = 'Start';
            startStopBtn.style.backgroundColor = 'var(--accent)';
        } else {
            startStopBtn.textContent = 'Pause';
            startStopBtn.style.backgroundColor = '#f59e0b';
            countdown = setInterval(() => {
                if (secondsLeft <= 0) {
                    clearInterval(countdown);
                    alert("Time's up! Take a break.");
                    resetTimer(1500);
                    return;
                }
                secondsLeft--;
                updateTimerUI();
            }, 1000);
        }
        isRunning = !isRunning;
    }

    function resetTimer(seconds = 1500) {
        clearInterval(countdown);
        isRunning = false;
        secondsLeft = seconds;
        startStopBtn.textContent = 'Start';
        startStopBtn.style.backgroundColor = 'var(--accent)';
        updateTimerUI();
    }

    function renderTasks() {
        taskContainer.innerHTML = '';
        tasks.forEach((task, idx) => {
            const li = document.createElement('li');
            li.className = `task-item ${task.done ? 'done' : ''}`;
            li.innerHTML = `
                <span onclick="toggleTask(${idx})" style="cursor:pointer; flex: 1;">${task.text}</span>
                <span class="delete-icon" onclick="deleteTask(${idx})">✕</span>
            `;
            taskContainer.appendChild(li);
        });
        localStorage.setItem('studio_tasks', JSON.stringify(tasks));
    }

    function addTask() {
        const val = taskInput.value.trim();
        if (!val) return;
        tasks.push({ text: val, done: false });
        taskInput.value = '';
        renderTasks();
    }

    window.toggleTask = (idx) => { tasks[idx].done = !tasks[idx].done; renderTasks(); };
    window.deleteTask = (idx) => { tasks.splice(idx, 1); renderTasks(); };

    function toggleNoise() {
        const audioBtn = document.getElementById('audio-btn');
        if (audioContext && noiseNode) {
            noiseNode.stop();
            noiseNode = null;
            audioBtn.textContent = 'Play';
            return;
        }

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = 2 * audioContext.sampleRate;
        const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const output = noiseBuffer.getChannelData(0);

        let lastOut = 0.0;
        for (let i = 0; i < bufferSize; i++) {
            const white = Math.random() * 2 - 1;
            output[i] = (lastOut + (0.02 * white)) / 1.02;
            lastOut = output[i];
            output[i] *= 3.5; 
        }

        noiseNode = audioContext.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        noiseNode.loop = true;
        noiseNode.connect(audioContext.destination);
        noiseNode.start();
        audioBtn.textContent = 'Mute';
    }

    // Connect all interaction nodes completely
