<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal School Math Solver</title>
    <!-- Lightweight Tailwind CSS styling engine -->
    <script src="https://jsdelivr.net"></script>
    <!-- Lightweight, powerful math execution script -->
    <script src="https://cloudflare.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-6">

    <div class="max-w-xl w-full bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700 mt-10">
        <h1 class="text-2xl font-bold text-indigo-400 text-center mb-1">📐 School Math Engine</h1>
        <p class="text-xs text-gray-400 text-center mb-6">Instantly solves algebra, expressions, functions, and fractions.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Select Operation Mode</label>
                <select id="mode" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-sm text-white outline-none focus:border-indigo-500">
                    <option value="evaluate">Evaluate Basic / Advanced Math</option>
                    <option value="simplify">Simplify Algebraic Equation</option>
                    <option value="derivative">Find Derivative (d/dx)</option>
                    <option value="rationalize">Rationalize Denominator / Fractions</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Input Problem</label>
                <input type="text" id="mathInput" placeholder="e.g., 2x + 5x - 3" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-sm text-white font-mono outline-none focus:border-indigo-500">
            </div>

            <button onclick="calculateResult()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition text-sm cursor-pointer shadow-md">
                Solve Equation
            </button>
        </div>

        <!-- Real-time responsive output display window -->
        <div id="outputContainer" class="hidden mt-6 bg-gray-950 p-4 rounded-lg border border-gray-800 font-mono">
            <div class="text-xs text-indigo-400 font-bold mb-1">Output Result:</div>
            <div id="finalOutput" class="text-emerald-400 text-lg break-words"></div>
        </div>
    </div>

    <script>
        function calculateResult() {
            const mode = document.getElementById('mode').value;
            const userInput = document.getElementById('mathInput').value.trim();
            const outputBox = document.getElementById('outputContainer');
            const resultText = document.getElementById('finalOutput');

            if (!userInput) {
                alert("Please type a mathematical problem first.");
                return;
            }

            // Unhide output container panel
            outputBox.classList.remove('hidden');

            try {
                let solution = "";

                if (mode === "evaluate") {
                    // Instantly evaluates expressions, roots, trigonometry, matrices
                    solution = math.evaluate(userInput);
                } else if (mode === "simplify") {
                    // Simplifies fractions, polynomials, terms (e.g., 2x + 3x -> 5x)
                    solution = math.simplify(userInput).toString();
                } else if (mode === "derivative") {
                    // Automatically finds algebraic derivative with respect to variable x
                    solution = math.derivative(userInput, 'x').toString();
                } else if (mode === "rationalize") {
                    // Transforms rational rules out of expression fractions
                    solution = math.rationalize(userInput).toString();
                }

                // Render clean string conversion into display element 
                resultText.className = "text-emerald-400 text-lg break-words";
                resultText.innerText = solution;

            } catch (error) {
                // Friendly debug indicator for math syntax failures
                resultText.className = "text-rose-400 text-xs break-words";
                resultText.innerText = "Formatting Error: " + error.message + 
                    "\n\nTip: For algebra, make sure to include implicit operators (e.g., use '2 * x' instead of '2x').";
            }
        }
    </script>
</body>
</html>
