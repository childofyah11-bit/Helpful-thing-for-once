<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Gravity Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #03030c;
            color: #eceff1;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        /* Information overlay setup container HUD panel */
        .hud-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 13, 25, 0.85);
            padding: 18px;
            border-radius: 8px;
            border: 1px solid #2a2b45;
            pointer-events: none;
            max-width: 280px;
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 1.15rem;
            letter-spacing: 1px;
            color: #4fc3f7;
            text-transform: uppercase;
        }

        .instruction {
            font-size: 0.8rem;
            color: #90a4ae;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .metric {
            font-size: 0.85rem;
            font-family: monospace;
            color: #00e676;
            margin-top: 4px;
        }

        /* Configuration utility modifier trigger container */
        .control-shelf {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #1c1c30;
            color: white;
            border: 1px solid #4fc3f7;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .btn:hover {
            background: #4fc3f7;
            color: #03030c;
            box-shadow: 0 0 12px rgba(79, 195, 247, 0.4);
        }
    </style>
</head>
<body>

    <!-- Target Engine Context Node Matrix Canvas Viewport Frame Layer -->
    <canvas id="canvas"></canvas>

    <!-- Information Layer Monitoring Viewport -->
    <div class="hud-overlay">
        <h1>Gravity Sandbox</h1>
        <div class="instruction">Click and drag cursor across empty space to aim and launch custom orbital masses.</div>
        <div class="metric">Active Planetesimals: <span id="planetCount">0</span></div>
    </div>

    <!-- Interface operations reset bar block -->
    <div class="control-shelf">
        <button class="btn" onclick="clearPlanets()">Collapse Universe</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countMetricDisplayNode = document.getElementById('planetCount');

        // Physics constants Configuration parameters
        const G_GRAVITATIONAL_CONSTANT = 0.15;
        const TIME_STEP_FACTOR = 1;

        let canvasWidth = canvas.width = window.innerWidth;
        let canvasHeight = canvas.height = window.innerHeight;

        let cosmicBodiesList = [];
        let interactionState = { isDragging: false, startX: 0, startY: 0, currentX: 0, currentY: 0 };

        // Central Anchor Massive Node Body Structure Definition Properties
        const StarSunAnchorNode = {
            x: canvasWidth / 2,
            y: canvasHeight / 2,
            mass: 12000,
            radius: 24,
            color: '#ffb300'
        };

        // Screen geometry window adjustments tracking loop operations routing handles
        window.addEventListener('resize', () => {
            canvasWidth = canvas.width = window.innerWidth;
            canvasHeight = canvas.height = window.innerHeight;
            StarSunAnchorNode.x = canvasWidth / 2;
            StarSunAnchorNode.y = canvasHeight / 2;
        });

        // Interactive Viewport Mouse Handling Event Trigger Actions Listener Methods
        canvas.addEventListener('mousedown', (e) => {
            interactionState.startX = e.clientX;
            interactionState.startY = e.clientY;
            interactionState.currentX = e.clientX;
            interactionState.currentY = e.clientY;
            interactionState.isDragging = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (interactionState.isDragging) {
                interactionState.currentX = e.clientX;
                interactionState.currentY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (interactionState.isDragging) {
                interactionState.isDragging = false;

                // Slingshot physics calculation vector velocity metrics definition
                const deltaX = interactionState.startX - e.clientX;
                const deltaY = interactionState.startY - e.clientY;
                const launchingVelocityScaleFactor = 0.08;

                // Generate structural planet mass parameters instantiation data package array structure mapping
                cosmicBodiesList.push({
                    x: interactionState.startX,
                    y: interactionState.startY,
                    vx: deltaX * launchingVelocityScaleFactor,
                    vy: deltaY * launchingVelocityScaleFactor,
                    mass: 10 + Math.random() * 40,
                    radius: 4 + Math.random() * 5,
                    color: `hsl(${Math.random() * 360}, 85%, 65%)`,
                    pathHistoryTraceLogs: []
                });
            }
        });

        // Wipe collection array properties reset values parameters configuration data references
        function clearPlanets() {
            cosmicBodiesList = [];
        }

        // Processing mathematical calculations logic tick framing sequence loops runtime operations execution handler
        function enginePhysicsLoopUpdateFrameSequence() {
            // Draw background viewport trace shadows layers frame clear adjustments masking
            ctx.fillStyle = 'rgba(3, 3, 12, 0.25)';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            // Render Central Star Core Node structural details asset parameters map
            ctx.beginPath();
            ctx.arc(StarSunAnchorNode.x, StarSunAnchorNode.y, StarSunAnchorNode.radius, 0, Math.PI * 2);
            ctx.fillStyle = StarSunAnchorNode.color;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff8000';
            ctx.fill();
            ctx.shadowBlur = 0; // Clear structural shadow properties maps arrays configurations profiles definitions

            // Process dynamic calculation matrices properties mappings looping iterations variables transformations updates
            for (let i = cosmicBodiesList.length - 1; i >= 0; i--) {
                const planet = cosmicBodiesList[i];

                // Calculate vector coordinates spatial delta relative points coordinates variables metrics mappings
                const dx = StarSunAnchorNode.x - planet.x;
                const dy = StarSunAnchorNode.y - planet.y;
                const planarDistanceCoordinatesValue = Math.sqrt(dx * dx + dy * dy);

                // Safe range boundary validation loop verification routing parameters configurations criteria mapping bounds
                if (planarDistanceCoordinatesValue < StarSunAnchorNode.radius + planet.radius) {
                    cosmicBodiesList.splice(i, 1);
                    continue;
                }

                // Standard universal Newtonian gravitational physics acceleration calculations math modeling matrix formula 
                const gravityPullForceMagnitudeMetricValue = (G_GRAVITATIONAL_CONSTANT * StarSunAnchorNode.mass) / (planarDistanceCoordinatesValue * planarDistanceCoordinatesValue);
                
                // Track directional acceleration coordinate modifications updates profiles components variables properties
                planet.vx += (dx / planarDistanceCoordinatesValue) * gravityPullForceMagnitudeMetricValue * TIME_STEP_FACTOR;
                planet.vy += (dy / planarDistanceCoordinatesValue) * gravityPullForceMagnitudeMetricValue * TIME_STEP_FACTOR;

                // Sync positional adjustments translation vectors transformations mappings parameters values elements tracking arrays
                planet.x += planet.vx * TIME_STEP_FACTOR;
                planet.y += planet.vy * TIME_STEP_FACTOR;

                // Log trajectory paths coordinate plots tracing history logs collections lists map index parameters details elements
                planet.pathHistoryTraceLogs.push({ x: planet.x, y: planet.y });
                if (planet.pathHistoryTraceLogs.length > 45) {
                    planet.pathHistoryTraceLogs.shift();
                }

                // Render orbital tracer trail paths lines canvas paths elements parameters data layout rendering properties map configurations
                ctx.beginPath();
                if (planet.pathHistoryTraceLogs.length > 0) {
                    ctx.moveTo(planet.pathHistoryTraceLogs[0].x, planet.pathHistoryTraceLogs[0].y);
                    for (let point of planet.pathHistoryTraceLogs) {
                        ctx.lineTo(point.x, point.y);
                    }
                }
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Draw planet rendering parameters profile structure geometry dimensions circles coordinates objects array configuration nodes map details
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
