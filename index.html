<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid P2P Matchmaking Arena</title>
    <!-- PeerJS Framework Module -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin: 0; color: #38bdf8; }
        .dashboard {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            align-items: center;
        }
        .setup-box {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #334155;
            font-weight: 500;
        }
        .score-box {
            background: #0f172a;
            border: 1px solid #38bdf8;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
        }
        #game-canvas {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        .status { font-size: 14px; color: #94a3b8; margin-top: 5px; }
        .pulse {
            width: 8px; height: 8px; background: #eab308; border-radius: 50%;
            display: inline-block; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <h2>Survival Coin Arena</h2>
    <p class="status">Collect 🟡 coins while dodging the 🔴 AI Drone. Real players replace the bot automatically!</p>

    <div class="dashboard">
        <!-- Automated Status Panel Layout -->
        <div class="setup-box">
            <div id="lobby-pulse" class="pulse"></div>
            <span id="match-status-label">Initializing matchmaking matrix...</span>
        </div>
        <!-- Live Score Counter Tracker -->
        <div class="score-box">Coins Collected: <span id="score-val">0</span></div>
    </div>

    <canvas id="game-canvas" width="800" height="450"></canvas>
    <p id="connection-status" class="status">Connecting to matchmaking services...</p>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Network & Game state configurations
    let peer;
    let connections = [];
    let myId = null;
    let players = {};
    let speed = 5;
    let keysPressed = {};
    let score = 0;

    // Single-Room Matchmaker Anchors
    const LOBBY_HOST_ID = 'nexus_public_matchmaker_lobby_v2';
    let isHost = false;
    let hasRealOpponent = false;

    // Game Object Entities
    let coin = { x: 400, y: 225, radius: 8 };
    let aiBot = { x: 100, y: 100, radius: 14, speed: 2 };

    function createSelfPlayer(id) {
        myId = id;
        players[myId] = {
            id: myId,
            x: Math.floor(Math.random() * 500) + 150,
            y: Math.floor(Math.random() * 250) + 100,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`
        };
    }

    function startMatchmaking() {
        const statusLabel = document.getElementById('match-status-label');
        statusLabel.innerHTML = 'Searching for an online match... (Solo Mode Active)';

        const clientRandomId = 'client_' + Math.random().toString(36).substring(2, 9);
        peer = new Peer(clientRandomId, {
            config: { 'iceServers': [{ url: 'stun:://google.com' }, { url: 'stun:://google.com' }] }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            const conn = peer.connect(LOBBY_HOST_ID);
            setupConnectionTracking(conn);

            setTimeout(() => {
                if (connections.length === 0 && !isHost) {
                    switchToHostMode();
                }
            }, 2500);
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                switchToHostMode();
            }
        });
    }

    function switchToHostMode() {
        if (isHost) return;
        isHost = true;
        if (peer) peer.destroy();

        const statusLabel = document.getElementById('match-status-label');
        const pulse = document.getElementById('lobby-pulse');
        
        statusLabel.innerHTML = 'Solo Survival Mode (Waiting for an opponent...)';
        pulse.style.backgroundColor = '#eab308'; // Amber searching pulse

        peer = new Peer(LOBBY_HOST_ID, {
            config: { 'iceServers': [{ url: 'stun:://google.com' }, { url: 'stun:://google.com' }] }
        });

        peer.on('open', (id) => {
            createSelfPlayer(id);
            document.getElementById('connection-status').textContent = "Lobby open. Solitary parameters initialized.";
        });

        peer.on('connection', (conn) => {
            setupConnectionTracking(conn);
        });
    }

    function setupConnectionTracking(conn) {
        conn.on('open', () => {
            connections.push(conn);
            hasRealOpponent = true;
            document.getElementById('match-status-label').innerHTML = 'Match Linked! Real Opponent Active. 🔥';
            document.getElementById('lobby-pulse').style.backgroundColor = '#10b981'; // Green active match
            document.getElementById('connection-status').textContent = "P2P node bridge operational.";
            
            // Sync player data along with current coin positions
            conn.send({ type: 'handshake', player: players[myId], coin: coin });
        });

        conn.on('data', (data) => {
            if (data.type === 'handshake') {
                players[data.player.id] = data.player;
                if (data.coin) coin = data.coin;
                conn.send({ type: 'sync', player: players[myId], coin: coin });
            } 
            else if (data.type === 'sync') {
                players[data.player.id] = data.player;
                if (data.coin) coin = data.coin;
            } 
            else if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
            }
            else if (data.type === 'coinGathered') {
                coin = data.nextCoin;
                if (players[data.byPlayerId] && data.byPlayerId !== myId) {
                    // Update remote visual cues if needed
                }
            }
        });

        conn.on('close', () => {
            document.getElementById('match-status-label').innerHTML = 'Opponent left. Defaulting to Solo Practice...';
            document.getElementById('lobby-pulse').style.backgroundColor = '#eab308';
            connections = connections.filter(c => c !== conn);
            hasRealOpponent = false;
            
            for (let id in players) {
                if (id !== myId) delete players[id];
            }
            if (!isHost) switchToHostMode();
        });
    }

    window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function syncObjectNetworkState(type, dataMap) {
        connections.forEach(conn => {
            if (conn.open) conn.send({ type: type, ...dataMap });
        });
    }

    function processMovementLogic() {
        if (!myId || !players[myId]) return;

        let me = players[myId];
        let moved = false;

        if (keysPressed['w'] || keysPressed['arrowup']) { me.y -= speed; moved = true; }
        if (keysPressed['s'] || keysPressed['arrowdown']) { me.y += speed; moved = true; }
        if (keysPressed['a'] || keysPressed['arrowleft']) { me.x -= speed; moved = true; }
        if (keysPressed['d'] || keysPressed['arrowright']) { me.x += speed; moved = true; }

        me.x = Math.max(16, Math.min(canvas.width - 16, me.x));
        me.y = Math.max(16, Math.min(canvas.height - 16, me.y));

        if (moved) {
            syncObjectNetworkState('move', { id: myId, x: me.x, y: me.y });
        }

        // --- Coin Detection Math Collision check ---
        let distToCoin = Math.hypot(me.x - coin.x, me.y - coin.y);
        if (distToCoin < 16 + coin.radius) {
            score++;
            document.getElementById('score-val').textContent = score;
            
            // Relocate coin to fresh coordinates
            coin.x = Math.floor(Math.random() * (canvas.width - 40)) + 20;
            coin.y = Math.floor(Math.random() * (canvas.height - 40)) + 20;

            // Share new coin coordinates over network if multiplayer is active
            if (hasRealOpponent) {
                syncObjectNetworkState('coinGathered', { byPlayerId: myId, nextCoin: coin });
            }
        }

        // --- AI Drone Management (Only runs when solo) ---
        if (!hasRealOpponent) {
            let angle = Math.atan2(me.y - aiBot.y, me.x - aiBot.x);
            aiBot.x += Math.cos(angle) * aiBot.speed;
            aiBot.y += Math.sin(angle) * aiBot.speed;

            // Check if AI catches you
            let distToAi = Math.hypot(me.x - aiBot.x, me.y - aiBot.y);
            if (distToAi < 16 + aiBot.radius) {
                score = 0; // Penalty trigger
                document.getElementById('score-val').textContent = score;
                // Respawn Drone safely away
                aiBot.x = aiBot.x > canvas.width / 2 ? 50 : canvas.width - 50;
