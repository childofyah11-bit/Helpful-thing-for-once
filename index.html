<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommsStation: Automatic P2P Walkie-Talkie</title>
    <!-- FIX 1: Corrected full library source path to load the P2P connection engine -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-base: #11140f;
            --panel-card: #1c2217;
            --army-green: #4d5d3e;
            --neon-glow: #7fff00;
            --alert-red: #ff3333;
            --txt-bright: #f0f5eb;
            --txt-muted: #708264;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--txt-bright);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .station-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-card);
            border-radius: 8px;
            padding: 25px;
            border: 3px solid var(--army-green);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 15px 35px rgba(0,0,0,0.9);
        }

        header {
            text-align: center;
            border-bottom: 2px dashed var(--army-green);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--neon-glow); text-transform: uppercase; letter-spacing: 1px; }

        .status-panel {
            background: #090c07;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid var(--army-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .indicator { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert-red); box-shadow: 0 0 8px var(--alert-red); }
        .dot.active { background: var(--neon-glow); box-shadow: 0 0 8px var(--neon-glow); }

        .deck {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--army-green);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 12px 0; font-size: 0.85rem; color: var(--neon-glow); text-transform: uppercase; }

        .channel-selector-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .channel-btn {
            background: #090c07;
            color: var(--txt-muted);
            font-weight: bold;
            border: 2px solid var(--army-green);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
            border-radius: 4px;
            transition: all 0.15s ease;
        }

        .channel-btn:hover {
            border-color: var(--neon-glow);
            color: var(--txt-bright);
        }

        .channel-btn.selected-channel {
            background: var(--army-green);
            color: #000;
            border-color: var(--neon-glow);
            box-shadow: 0 0 10px rgba(127, 255, 0, 0.3);
        }

        .ptt-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; }

        .ptt-button {
            width: 130px; height: 130px; border-radius: 50%;
            background: linear-gradient(135deg, #a62b2b, #591313);
            border: 5px solid #3d0d0d; color: white;
            font-family: inherit; font-size: 1rem; font-weight: bold; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 8px 0 #2b0909, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.05s ease; user-select: none; -webkit-user-select: none;
        }

        .ptt-button:active, .ptt-button.transmitting {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2b0909, 0 5px 10px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #ff3b3b, #991c1c);
        }

        .ptt-button:disabled {
            background: #2c2f29; border-color: #1a1c18; color: #555; cursor: not-allowed; box-shadow: none; transform: none;
        }

        .terminal {
            background: #050704; border: 1px solid var(--army-green); height: 100px;
            border-radius: 4px; padding: 10px; overflow-y: auto; font-size: 0.75rem; color: #a4bfa3;
        }
        .log { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="station-container">
        <header>
            <h1>📡 AUTOMATIC WALKIE-TALKIE</h1>
        </header>

        <div class="status-panel">
            <div class="indicator">NET: <div class="dot" id="linkDot"></div> <span id="linkTxt">OFFLINE</span></div>
            <div class="indicator">MIC: <div class="dot" id="micDot"></div> <span id="micTxt">MUTED</span></div>
        </div>

        <div class="deck">
            <h2>Select Station Frequency Room</h2>
            <div class="channel-selector-row">
                <button class="channel-btn" onclick="selectAndConnectChannel('a1', this)">A1</button>
                <button class="channel-btn" onclick="selectAndConnectChannel('a2', this)">A2</button>
                <button class="channel-btn" onclick="selectAndConnectChannel('a3', this)">A3</button>
            </div>
        </div>

        <div class="deck ptt-container">
            <button class="ptt-button" id="pttBtn" disabled>HOLD TO<br>TALK</button>
            <div style="margin-top: 15px; font-size: 0.7rem; color: var(--txt-muted); text-align: center; line-height: 1.3;">
                Select the same room on both devices to auto-join. Once linked, hold the button or Spacebar to transmit.
            </div>
        </div>

        <div class="terminal" id="activityBox">
            <div class="log">[SYS] Standing by. Select an active frequency option above to connect.</div>
        </div>
    </div>

    <audio id="remoteAudioPlayer" autoplay></audio>

    <script>
        let peerInstance = null;
        let localMicStream = null;
        let microphoneAudioTrack = null;
        let incomingAudioCallRef = null;

        const pttButton = document.getElementById('pttBtn');
        const logTerminal = document.getElementById('activityBox');
        
        const linkDot = document.getElementById('linkDot');
        const linkTxt = document.getElementById('linkTxt');
        const micDot = document.getElementById('micDot');
        const micTxt = document.getElementById('micTxt');

        function writeLog(tag, info) {
            const line = document.createElement('div');
            line.classList.add('log');
            line.innerHTML = `[${tag}] ${info}`;
            logTerminal.appendChild(line);
            logTerminal.scrollTop = logTerminal.scrollHeight;
        }

        async function getMicrophoneAccess() {
            try {
                if (!localMicStream) {
                    localMicStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    microphoneAudioTrack = localMicStream.getAudioTracks()[0];
                    writeLog('HARDWARE', 'Microphone connection confirmed and armed.');
                }
                microphoneAudioTrack.enabled = false;
                return true;
            } catch (err) {
                writeLog('ERROR', 'Mic Access Denied: ' + err.message);
                alert("Microphone permission is strictly required for walkie-talkie mode!");
                return false;
            }
        }

        function disconnectExistingPeerSession() {
            pttButton.disabled = true;
            linkDot.classList.remove('active');
            linkTxt.textContent = "OFFLINE";
            
            if (peerInstance) {
                peerInstance.destroy();
                peerInstance = null;
                writeLog('SYS', 'Closed previous session context pipeline.');
            }
        }

        async function selectAndConnectChannel(selectedRoomId, buttonElement) {
            disconnectExistingPeerSession();

            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('selected-channel'));
            buttonElement.classList.add('selected-channel');

            const micArmed = await getMicrophoneAccess();
            if (!micArmed) return;

            writeLog('NET', `Auto-contacting signaling room: [${selectedRoomId}]...`);
            
            // FIX 2: Corrected stable STUN network configuration formats
            peerInstance = new Peer(selectedRoomId, {
                config: { iceServers: [{ urls: 'stun:://google.com' }] }
            });

            peerInstance.on('open', (id) => {
                writeLog('SYS', `Channel active. Listening as Master Station Node: ${id}`);
                linkDot.classList.add('active');
                linkTxt.textContent = "LISTENING ON CHANNEL";
                attemptCallToRemotePeer(selectedRoomId + "-client");
            });

            peerInstance.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    writeLog('SYS', 'Primary slot taken. Linking to channel room as secondary client...');
                    // FIX 3: Corrected client fallback STUN connection definitions
                    peerInstance = new Peer(selectedRoomId + "-client", {
                        config: { iceServers: [{ urls: 'stun:://google.com' }] }
                    });
                    
                    peerInstance.on('open', () => {
