<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI</title>
    <style>
        :root {
            --bg: #090d16;
            --panel: #121824;
            --inner: #1a2336;
            --accent: #38bdf8;
            --text: #f3f4f6;
            --text-dark: #9ca3af;
            --border: #29354f;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        /* Memory Sidebar */
        .sidebar {
            background: #0d121f;
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .sidebar h3 { margin: 0; font-size: 14px; color: var(--accent); text-transform: uppercase; }
        .memory-chip {
            background: var(--inner);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 4px;
            right: 6px;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }
        /* Chat Engine */
        .chat-area { display: flex; flex-direction: column; height: 100%; }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 75%; line-height: 1.5; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 500; }
        .msg.ai { background: var(--inner); border: 1px solid var(--border); align-self: flex-start; }
        
        .input-area {
            padding: 16px;
            background: #0d121f;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: var(--inner);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Long-Term Knowledge Bank Sidebar -->
    <div class="sidebar">
        <h3>Permanent Memories</h3>
        <div id="memory-bank-list"></div>
    </div>

    <!-- Live Dialog Terminal -->
    <div class="chat-area">
        <div class="chat-box" id="chat-box-display">
            <div class="msg ai">Hello! I am your companion engine. Anything important you tell me will be written straight to my permanent memory bank panel on the left so I never forget you.</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-msg-input" placeholder="Say something or share a detail about yourself..." autocomplete="off">
            <button id="send-msg-btn">Send</button>
        </div>
    </div>
</div>

<script>
    // Pull archived logs from native local engine storage paths
    let permanentMemories = JSON.parse(localStorage.getItem('ai_longterm_memories')) || [];
    let conversationHistory = JSON.parse(localStorage.getItem('ai_chat_history')) || [];
    let aiSession;

    const memoryDisplay = document.getElementById('memory-bank-list');
    const chatDisplay = document.getElementById('chat-box-display');
    const textInput = document.getElementById('user-msg-input');
    const sendBtn = document.getElementById('send-msg-btn');

    // Bootstrap local offline browser LLM orchestrations
    async function initializeLocalAI() {
        try {
            if (window.ai && window.ai.assistant) {
                aiSession = await window.ai.assistant.create({
                    systemPrompt: "You are a helpful AI assistant with access to a long-term memory bank. Answer naturally, concisely, and cleanly."
                });
            } else {
                console.warn("Built-in browser LLM interface missing. Falling back to synthetic simulation mode.");
            }
        } catch (err) {
            console.error("AI Session Init Fault:", err);
        }
    }

    function syncMemoryUI() {
        memoryDisplay.innerHTML = '';
        permanentMemories.forEach((fact, index) => {
            const chip = document.createElement('div');
            chip.className = 'memory-chip';
            chip.innerHTML = `${fact} <span class="delete-btn" onclick="forgetMemory(${index})">✕</span>`;
            memoryDisplay.appendChild(chip);
        });
        localStorage.setItem('ai_longterm_memories', JSON.stringify(permanentMemories));
    }

    function syncChatUI() {
        // Clear back to the default message
        chatDisplay.innerHTML = '<div class="msg ai">Hello! I am your companion engine. Anything important you tell me will be written straight to my permanent memory bank panel on the left so I never forget you.</div>';
        conversationHistory.forEach(msg => {
            appendMessageNode(msg.text, msg.sender);
        });
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    function appendMessageNode(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.textContent = text;
        chatDisplay.appendChild(div);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    // Heuristic script parsing logic to scan for self-referential inputs
    function profileUserTraits(text) {
        const patterns = [
            /\bmy name is\s+([a-z0-9 ]+)/i,
            /\bi am a\s+([a-z0-9 ]+)/i,
            /\bi like\s+([a-z0-9 ]+)/i,
            /\bi live in\s+([a-z0-9 ]+)/i,
            /\bremember that\s+([a-z0-9 ,.!?]+)/i
        ];

        patterns.forEach(regex => {
            const match = text.match(regex);
            if (match && match[1]) {
                const cleanFact = match[0].trim();
                if (!permanentMemories.includes(cleanFact)) {
                    permanentMemories.push(cleanFact);
                    syncMemoryUI();
                }
            }
        });
    }

    async function handleTransmission() {
        const queryText = textInput.value.trim();
        if (!queryText) return;

        appendMessageNode(queryText, 'user');
        conversationHistory.push({ text: queryText, sender: 'user' });
        textInput.value = '';

        // Extract context and store memory flags instantly
        profileUserTraits(queryText);

        // Inject long-term memory background context parameters right into the prompt boundary limits
        let contextInjection = "";
        if (permanentMemories.length > 0) {
            contextInjection = `[Context information from your long term memory bank: ${permanentMemories.join('. ')}]\n`;
        }

        let replyString = "";
        if (aiSession) {
            try {
                replyString = await aiSession.prompt(`${contextInjection}User says: ${queryText}`);
            } catch (e) {
                replyString = "I encountered an error trying to process that message locally.";
            }
        } else {
            // High-fidelity local algorithmic backup fallback routine 
            replyString = "I noticed that fact and saved it to my memory vaults! ";
            if (permanentMemories.length > 0) {
                replyString += `I currently know ${permanentMemories.length} details about you. Since your local browser AI is not yet fully activated, I will simulate this environment right here.`;
            }
        }

        appendMessageNode(replyString, 'ai');
        conversationHistory.push({ text: replyString, sender: 'ai' });
        
        // Commit chat string histories directly down to localStorage paths
        localStorage.setItem('ai_chat_history', JSON.stringify(conversationHistory));
    }

    window.forgetMemory = function(idx) {
        permanentMemories.splice(idx, 1);
        syncMemoryUI();
    };

    sendBtn.addEventListener('click', handleTransmission);
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleTransmission(); });

    // Startup bootstrap routines
    initializeLocalAI();
    syncMemoryUI();
    syncChatUI();
</script>
</body>
</html>
