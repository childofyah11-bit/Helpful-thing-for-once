<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Financial Dashboard</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #ea580c;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }
        h2, h3 { margin-top: 0; }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .card {
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .card h4 { margin: 0 0 8px 0; color: #64748b; font-size: 14px; text-transform: uppercase; }
        .card div { font-size: 22px; font-weight: bold; }
        
        .progress-container {
            background: #e2e8f0;
            border-radius: 9999px;
            height: 10px;
            width: 100%;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-bar {
            background: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }
        .progress-bar.danger { background: var(--danger); }
        .progress-bar.warning { background: var(--warning); }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #475569; }
        input, select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 12px; }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: #64748b; }
        button.danger-btn { background: #ef4444; }

        .controls {
            display: flex;
            gap: 12px;
            margin: 24px 0 12px 0;
            align-items: center;
        }
        .search-bar { flex: 2; }
        .filter-select { flex: 1; }

        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 8px;
            font-size: 15px;
        }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; color: #64748b; font-weight: 600; }
        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: #e2e8f0;
        }
        .action-cell { text-align: center; }
        .delete-icon { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 24px;">Financial Dashboard</h2>
    
    <!-- Summary Metrics -->
    <div class="grid-3">
        <div class="card">
            <h4>Total Budget</h4>
            <input type="number" id="monthly-budget" value="2000" style="width: 80%; text-align: center; font-weight: bold; font-size: 18px; padding: 4px;">
        </div>
        <div class="card">
            <h4>Total Spent</h4>
            <div id="total-spent" style="color: var(--danger);">$0.00</div>
        </div>
        <div class="card">
            <h4>Remaining</h4>
            <div id="remaining" style="color: var(--success);">$0.00</div>
        </div>
    </div>

    <!-- Progress Meter -->
    <div style="margin-bottom: 30px;">
        <div style="display: flex; justify-content: space-between; font-size: 13px; color: #64748b;">
            <span>Budget Usage Limit</span>
            <span id="usage-percent">0%</span>
        </div>
        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>
    </div>

    <!-- Input Form -->
    <h3>Log New Transaction</h3>
    <div class="form-row">
        <div class="form-group" style="grid-column: span 2;">
            <label for="exp-title">Description</label>
            <input type="text" id="exp-title" placeholder="Merchant or item name...">
        </div>
        <div class="form-group">
            <label for="exp-amount">Amount ($)</label>
            <input type="number" id="exp-amount" placeholder="0.00" min="0" step="0.01">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="exp-category">Category</label>
            <select id="exp-category">
                <option value="Housing">Housing/Rent</option>
                <option value="Groceries">Groceries</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Transport">Transportation</option>
                <option value="Others">Others</option>
            </select>
        </div>
        <div class="form-group">
            <label for="exp-date">Date</label>
            <input type="date" id="exp-date">
        </div>
    </div>
    <button id="add-btn">Add Transaction</button>

    <!-- Filters & Toolbox -->
    <div class="controls">
        <input type="text" id="search-input" class="search-bar" placeholder="Search transactions...">
        <select id="filter-category" class="filter-select">
            <option value="All">All Categories</option>
            <option value="Housing">Housing</option>
            <option value="Groceries">Groceries</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Transport">Transport</option>
            <option value="Others">Others</option>
        </select>
    </div>

    <!-- Ledger Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th class="action-cell">Action</th>
                </tr>
            </thead>
            <tbody id="ledger-body"></tbody>
        </table>
    </div>

    <!-- Bulk Utilities -->
    <div class="btn-group">
        <button class="secondary" id="export-btn">Export Data (CSV)</button>
        <button class="danger-btn" id="clear-btn">Clear All Logs</button>
    </div>
</div>

<script>
    let budget = parseFloat(localStorage.getItem('adv_budget')) || 2000;
    let expenses = JSON.parse(localStorage.getItem('adv_expenses')) || [];

    const budgetInput = document.getElementById('monthly-budget');
    const expTitle = document.getElementById('exp-title');
    const expAmount = document.getElementById('exp-amount');
    const expCategory = document.getElementById('exp-category');
    const expDate = document.getElementById('exp-date');
    const addBtn = document.getElementById('add-btn');
    const ledgerBody = document.getElementById('ledger-body');
    const searchInput = document.getElementById('search-input');
    const filterCategory = document.getElementById('filter-category');

    // Auto-populate current date helper
    expDate.value = new Date().toISOString().split('T')[0];
    budgetInput.value = budget;

    function updateDashboard() {
        const totalSpent = expenses.reduce((sum, exp) => sum + exp.amount, 0);
        const remaining = budget - totalSpent;
        const percent = Math.min((totalSpent / budget) * 100, 100) || 0;

        document.getElementById('total-spent').textContent = `$${totalSpent.toFixed(2)}`;
        document.getElementById('remaining').textContent = `$${remaining.toFixed(2)}`;
        document.getElementById('usage-percent').textContent = `${Math.round((totalSpent / budget) * 100 || 0)}%`;

        const progressBar = document.getElementById('progress');
        progressBar.style.width = percent + '%';
        
        progressBar.className = 'progress-bar';
        if (percent >= 90) progressBar.classList.add('danger');
        else if (percent >= 75) progressBar.classList.add('warning');

        renderTable();

        localStorage.setItem('adv_budget', budget);
        localStorage.setItem('adv_expenses', JSON.stringify(expenses));
    }

    function renderTable() {
        const query = searchInput.value.toLowerCase();
        const catFilter = filterCategory.value;

        ledgerBody.innerHTML = '';

        expenses.filter(exp => {
            const matchesSearch = exp.title.toLowerCase().includes(query);
