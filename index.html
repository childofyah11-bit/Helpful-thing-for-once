<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank tab</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #080c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            height: 95vh;
            overflow: hidden;
            user-select: none;
        }
        #game-wrapper {
            display: flex;
            gap: 20px;
            background: #10161e;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #1f2937;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #canvas-container {
            position: relative;
        }
        canvas {
            background-color: #040608;
            border: 2px solid #374151;
            border-radius: 6px;
            display: block;
        }
        #shop-panel {
            width: 280px;
            background: #151f2b;
            border: 2px solid #243346;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 500px;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 1.3em;
            text-align: center;
            border-bottom: 2px solid #243346;
            padding-bottom: 8px;
        }
        .stats-display {
            background: #0c131a;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #1f2937;
            font-weight: bold;
        }
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.9em;
        }
        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .upgrade-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .upgrade-title {
            font-weight: bold;
            font-size: 0.9em;
            color: #f3f4f6;
        }
        .upgrade-cost {
            font-size: 0.8em;
            color: #fbbf24;
            font-weight: bold;
        }
        .upgrade-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.2s;
        }
        .upgrade-btn:hover:not(:disabled) {
            background: #059669;
        }
        .upgrade-btn:disabled {
            background: #4b5563;
            color: #9ca3af;
            cursor: not-allowed;
        }
        .controls-hint {
            margin-top: auto;
            font-size: 0.75em;
            color: #9ca3af;
            text-align: center;
            line-height: 1.4;
            border-top: 1px dashed #243346;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="canvas-container">
            <canvas id="arcadeCanvas" width="480" height="530"></canvas>
        </div>

        <div id="shop-panel">
            <h2>Hangar Upgrades</h2>
            <div class="stats-display">
                <div class="stat-line"><span>Credits:</span><span style="color:#fbbf24;" id="credits-txt">$0</span></div>
                <div class="stat-line"><span>Current Score:</span><span style="color:#38bdf8;" id="score-txt">0</span></div>
                <div class="stat-line"><span>Current Wave:</span><span style="color:#a855f7;" id="wave-txt">1</span></div>
            </div>

            <div class="upgrade-list" id="upgrades-container"></div>

            <div class="controls-hint">
                <strong>[CONTROLS]</strong><br>
                ← / → Keys or Mouse to Move<br>
                Spacebar or Mouse Click to Shoot
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('arcadeCanvas');
        const ctx = canvas.getContext('2d');

        // Game Configuration & Currencies
        let credits = 0;
        let score = 0;
        let wave = 1;
        let gameOver = false;

        // Player Attributes
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 40,
            w: 30,
            h: 20,
            speed: 5,
            hp: 3,
            maxHp: 3,
            fireRate: 400, // Cooldown in ms
            lastShot: 0,
            bulletSpeed: 7,
            multishot: 1
        };

        // Arrays for Game Entities
        let bullets = [];
        let enemies = [];
        let enemyBullets = [];
        let particles = [];
        let powerups = [];

        // Keyboard State
        const keys = {};

        // 6 Progressive Shop Upgrades
        const upgrades = [
            { id: 'speed', name: 'Engine Tuning', desc: 'Increases movement speed.', lvl: 1, max: 5, cost: 40, scale: 1.6, action: () => player.speed += 1 },
            { id: 'firerate', name: 'Overclock Lasers', desc: 'Increases firing frequency.', lvl: 1, max: 5, cost: 60, scale: 1.8, action: () => player.fireRate *= 0.8 },
            { id: 'bulletspeed', name: 'Plasma Boost', desc: 'Bullets travel much faster.', lvl: 1, max: 4, cost: 50, scale: 1.5, action: () => player.bulletSpeed += 2 },
            { id: 'multishot', name: 'Split Shot Matrix', desc: 'Fires extra spreading bullets.', lvl: 1, max: 3, cost: 200, scale: 3.0, action: () => player.multishot += 1 },
            { id: 'maxhp', name: 'Reinforced Hull', desc: 'Adds an extra Max HP container.', lvl: 3, max: 6, cost: 100, scale: 2.0, action: () => { player.maxHp++; player.hp++; } },
            { id: 'repair', name: 'Emergency Repair', desc: 'Heals 1 missing health point.', lvl: 0, max: 99, cost: 25, scale: 1.1, action: () => { if(player.hp < player.maxHp) player.hp++; } }
        ];

        // Setup Event Listeners
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Optional mouse control handlers
        let useMouse = false;
        canvas.addEventListener('mousemove', e => {
            useMouse = true;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            // Prevent going out of screen boundaries
            if (player.x < player.w/2) player.x = player.w/2;
            if (player.x > canvas.width - player.w/2) player.x = canvas.width - player.w/2;
        });
        canvas.addEventListener('mousedown', () => { if(!gameOver) fireBullet(); });

        function renderShop() {
            document.getElementById('credits-txt').innerText = `$${credits}`;
            document.getElementById('score-txt').innerText = score;
            document.getElementById('wave-txt').innerText = wave;

            const container = document.getElementById('upgrades-container');
            container.innerHTML = '';

            upgrades.forEach(upg => {
                const item = document.createElement('div');
                item.className = 'upgrade-item';

                let isMax = upg.lvl >= upg.max;
                let cost = Math.floor(upg.cost * Math.pow(upg.scale, upg.id === 'repair' ? 1 : upg.lvl - 1));
                let displayCost = isMax ? 'MAX' : `$${cost}`;
                
                let canBuy = credits >= cost && !isMax;
                if (upg.id === 'repair' && player.hp >= player.maxHp) canBuy = false;

                item.innerHTML = `
                    <div class="upgrade-info">
                        <span class="upgrade-title">${upg.name} ${upg.id !== 'repair' ? `[Lv ${upg.lvl}]` : ''}</span>
                        <span style="font-size:0.75em; color:#94a3b8;">${upg.desc}</span>
                        <span class="upgrade-cost">${displayCost}</span>
                    </div>
                    <button class="upgrade-btn" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${upg.id}', ${cost})">Buy</button>
                `;
                container.appendChild(item);
            });
        }

        function buyUpgrade(id, cost) {
            let upg = upgrades.find(u => u.id === id);
            if (credits >= cost) {
                credits -= cost;
                upg.lvl++;
                upg.action();
                renderShop();
            }
        }

        function spawnParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        function spawnWave() {
            enemies = [];
            enemyBullets = [];
            let rows = Math.min(5, 2 + Math.floor(wave / 2));
            let cols = 6;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: 50 + c * 60,
                        y: 40 + r * 40,
                        w: 24,
                        h: 18,
