<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Multiplayer Arena</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        h2 { margin: 0 0 10px 0; color: #38bdf8; letter-spacing: -0.01em; }
        .controls-hint { font-size: 14px; color: #94a3b8; margin-bottom: 15px; }
        #game-canvas {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h2>Multiplayer Sandbox Arena</h2>
    <div class="controls-hint">Use <strong>W, A, S, D</strong> or the <strong>Arrow Keys</strong> to pilot your node around the arena.</div>

    <canvas id="game-canvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let socket;
    let myId = null;
    let players = {};
    let speed = 4;
    let keysPressed = {};

    function connectToGameServer() {
        const hostLocation = window.location.origin.replace(/^http/, 'ws');
        const socketUrl = hostLocation.includes('github') ? 'wss://://herokuapp.com' : 'ws://localhost:3000';
        
        socket = new WebSocket(socketUrl);

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.type === 'init') {
                myId = data.id;
                players = data.players;
            } else if (data.type === 'newPlayer') {
                players[data.player.id] = data.player;
            } else if (data.type === 'update') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
            } else if (data.type === 'playerLeft') {
                delete players[data.id];
            }
        };

        socket.onclose = () => {
            setTimeout(connectToGameServer, 2000);
        };
    }

    window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function processMovementLogic() {
        if (!myId || !players[myId]) return;

        let localPlayer = players[myId];
        let originalX = localPlayer.x;
        let originalY = localPlayer.y;

        if (keysPressed['w'] || keysPressed['arrowup']) localPlayer.y -= speed;
        if (keysPressed['s'] || keysPressed['arrowdown']) localPlayer.y += speed;
        if (keysPressed['a'] || keysPressed['arrowleft']) localPlayer.x -= speed;
        if (keysPressed['d'] || keysPressed['arrowright']) localPlayer.x += speed;

        localPlayer.x = Math.max(15, Math.min(canvas.width - 15, localPlayer.x));
        localPlayer.y = Math.max(15, Math.min(canvas.height - 15, localPlayer.y));

        if (localPlayer.x !== originalX || localPlayer.y !== originalY) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: 'move',
                    x: localPlayer.x,
                    y: localPlayer.y
                }));
            }
        }
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        processMovementLogic();

        for (let id in players) {
            let p = players[id];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            
            if (id === myId) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            ctx.closePath();
        }

        requestAnimationFrame(renderLoop);
    }

    connectToGameServer();
    renderLoop();
</script>
</body>
</html>
