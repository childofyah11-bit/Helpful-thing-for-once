<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless P2P Arena</title>
    <!-- We load PeerJS directly in the browser so we don't need a server -->
    <script src="https://unpkg.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin: 0; color: #38bdf8; }
        .setup-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid #334155;
        }
        input {
            background: #0f172a;
            border: 1px solid #475569;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #7dd3fc; }
        #game-canvas {
            background-color: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
        }
        .status { font-size: 14px; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>P2P Multiplayer Sandbox</h2>
    <p class="status">Move your circle using <strong>W, A, S, D</strong> or <strong>Arrow Keys</strong>.</p>

    <div class="setup-box">
        <div>
            <span>Your Code: </span>
            <strong id="my-code-display" style="color: #a855f7;">Generating...</strong>
        </div>
        <div style="border-left: 1px solid #475569; height: 20px; margin: 0 10px;"></div>
        <div>
            <input type="text" id="join-code-input" placeholder="Paste friend's code...">
            <button onclick="connectToFriend()">Join Friend</button>
        </div>
    </div>

    <canvas id="game-canvas" width="800" height="450"></canvas>
    <p id="connection-status" class="status">Waiting for network initialization...</p>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let peer;
    let connections = [];
    let myId = null;
    let players = {};
    let speed = 5;
    let keysPressed = {};

    function createSelfPlayer(id) {
        myId = id;
        players[myId] = {
            id: myId,
            x: Math.floor(Math.random() * 600) + 100,
            y: Math.floor(Math.random() * 300) + 100,
            color: `hsl(${Math.random() * 360}, 80%, 60%)`
        };
        document.getElementById('connection-status').textContent = "Ready! Share your code or join a friend.";
    }

    peer = new Peer();

    peer.on('open', (id) => {
        document.getElementById('my-code-display').textContent = id;
        createSelfPlayer(id);
    });

    peer.on('connection', (conn) => {
        setupConnectionTracking(conn);
    });

    function connectToFriend() {
        const friendId = document.getElementById('join-code-input').value.trim();
        if (!friendId) return alert("Please enter a room code first!");
        
        document.getElementById('connection-status').textContent = "Connecting to friend...";
        const conn = peer.connect(friendId);
        setupConnectionTracking(conn);
    }

    function setupConnectionTracking(conn) {
        conn.on('open', () => {
            connections.push(conn);
            document.getElementById('connection-status').textContent = "Connected to player arena!";
            conn.send({ type: 'handshake', player: players[myId] });
        });

        conn.on('data', (data) => {
            if (data.type === 'handshake') {
                players[data.player.id] = data.player;
                conn.send({ type: 'sync', player: players[myId] });
            } 
            else if (data.type === 'sync') {
                players[data.player.id] = data.player;
            } 
            else if (data.type === 'move') {
                if (players[data.id]) {
                    players[data.id].x = data.x;
                    players[data.id].y = data.y;
                }
            }
        });

        conn.on('close', () => {
            document.getElementById('connection-status').textContent = "Player disconnected.";
            connections = connections.filter(c => c !== conn);
        });
    }

    window.addEventListener('keydown', (e) => { keysPressed[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key.toLowerCase()] = false; });

    function broadcastMovement(x, y) {
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({ type: 'move', id: myId, x: x, y: y });
            }
        });
    }

    function processMovementLogic() {
        if (!myId || !players[myId]) return;

        let me = players[myId];
        let changed = false;

        if (keysPressed['w'] || keysPressed['arrowup']) { me.y -= speed; changed = true; }
        if (keysPressed['s'] || keysPressed['arrowdown']) { me.y += speed; changed = true; }
        if (keysPressed['a'] || keysPressed['arrowleft']) { me.x -= speed; changed = true; }
        if (keysPressed['d'] || keysPressed['arrowright']) { me.x += speed; changed = true; }

        me.x = Math.max(15, Math.min(canvas.width - 15, me.x));
        me.y = Math.max(15, Math.min(canvas.height - 15, me.y));

        if (changed) {
            broadcastMovement(me.x, me.y);
        }
    }

    function renderLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        processMovementLogic();

        for (let id in players) {
            let p = players[id];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            
            if (id === myId) {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            ctx.closePath();
        }

        requestAnimationFrame(renderLoop);
    }

    renderLoop();
</script>
</body>
</html>
