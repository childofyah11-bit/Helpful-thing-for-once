<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Utility Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 25px;
            flex-wrap: wrap;
        }
        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 22px;
            width: 320px;
            min-height: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        h2 {
            font-size: 1.1rem;
            color: #38bdf8;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            outline: none;
            margin-bottom: 12px;
        }
        textarea {
            resize: none;
            flex-grow: 1;
            font-size: 0.95rem;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        /* Timer Styles */
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: auto 0;
            color: #f43f5e;
            font-family: monospace;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }
        .btn-start { background: #10b981; color: white; width: 100%; }
        .btn-start:hover { background: #059669; }
        .btn-reset { background: #64748b; color: white; width: 100%; }
        .btn-reset:hover { background: #475569; }
        
        /* Calculator Styles */
        .calc-screen {
            height: 50px;
            text-align: right;
            font-size: 1.5rem;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: auto;
        }
        .btn-calc { background: #334155; color: white; font-size: 1.1rem; }
        .btn-calc:hover { background: #475569; }
        .btn-op { background: #f59e0b; }
        .btn-op:hover { background: #d97706; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }
        
        /* Converter & Crypto Styles */
        .result-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #10b981;
            margin-top: auto;
            border: 1px dashed #334155;
            word-break: break-all;
        }
        .pass-btn { background: #3b82f6; color: white; margin-top: auto; }
        .pass-btn:hover { background: #2563eb; }
    </style>
</head>
<body>

    <!-- Panel 1: Focus Timer -->
    <div class="panel">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timer">25:00</div>
        <div class="btn-group">
            <button class="btn-start" id="start-btn" onclick="toggleTimer()">Start</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Panel 2: Calculator -->
    <div class="panel">
        <h2>Calculator</h2>
        <input type="text" class="calc-screen" id="screen" readonly>
        <div class="calc-grid">
            <button class="btn-calc btn-clear" onclick="clearScreen()">C</button>
            <button class="btn-calc btn-op" onclick="press('/')">/</button>
            <button class="btn-calc btn-op" onclick="press('*')">*</button>
            <button class="btn-calc btn-op" onclick="press('-')">-</button>
            
            <button class="btn-calc" onclick="press('7')">7</button>
            <button class="btn-calc" onclick="press('8')">8</button>
            <button class="btn-calc" onclick="press('9')">9</button>
            <button class="btn-calc btn-op" onclick="press('+')">+</button>
            
            <button class="btn-calc" onclick="press('4')">4</button>
            <button class="btn-calc" onclick="press('5')">5</button>
            <button class="btn-calc" onclick="press('6')">6</button>
            <button class="btn-calc btn-op" onclick="calculate()">=</button>
            
            <button class="btn-calc" onclick="press('1')">1</button>
            <button class="btn-calc" onclick="press('2')">2</button>
            <button class="btn-calc" onclick="press('3')">3</button>
            <button class="btn-calc" onclick="press('0')">0</button>
        </div>
    </div>

    <!-- Panel 3: Unit Converter -->
    <div class="panel">
        <h2>Converter</h2>
        <input type="number" id="conv-input" placeholder="Enter value..." oninput="runConversion()">
        <select id="conv-type" onchange="runConversion()">
            <option value="miles-km">Miles to Kilometers</option>
            <option value="km-miles">Kilometers to Miles</option>
            <option value="lbs-kg">Pounds (lbs) to Kilograms</option>
            <option value="kg-lbs">Kilograms to Pounds (lbs)</option>
            <option value="f-c">Fahrenheit to Celsius</option>
            <option value="c-f">Celsius to Fahrenheit</option>
        </select>
        <div class="result-box" id="conv-result">Result appears here</div>
    </div>

    <!-- Panel 4: Password Generator -->
    <div class="panel">
        <h2>Password Gen</h2>
        <label style="font-size:0.85rem; color:#94a3b8; margin-bottom:5px;">Length (8-24):</label>
        <input type="number" id="pass-length" value="12" min="8" max="24">
        <button class="pass-btn" onclick="generatePassword()">Generate Secure Key</button>
        <div class="result-box" id="pass-result" style="color:#38bdf8; font-family:monospace; cursor:pointer;" onclick="copyPassword()">Click button to generate</div>
    </div>

    <!-- Panel 5: Auto-Save Notepad -->
    <div class="panel">
        <h2>Quick Notes</h2>
        <textarea id="notepad" placeholder="Type notes here... they save automatically!" oninput="saveNotes()"></textarea>
    </div>

    <script>
        // Timer Code
        let timeLeft = 1500;
        let timerId = null;
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }
        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            if (timerId === null) {
                btn.textContent = "Pause";
                btn.style.background = "#f59e0b";
                timerId = setInterval(() => {
                    if (timeLeft > 0) { timeLeft--; updateTimerDisplay(); }
                    else { clearInterval(timerId); alert("Time is up!"); resetTimer(); }
                }, 1000);
            } else {
                clearInterval(timerId); timerId = null;
                btn.textContent = "Start"; btn.style.background = "#10b981";
            }
        }
        function resetTimer() {
            clearInterval(timerId); timerId = null; timeLeft = 1500; updateTimerDisplay();
            const btn = document.getElementById('start-btn'); btn.textContent = "Start"; btn.style.background = "#10b981";
        }

        // Calculator Code
        const screen = document.getElementById('screen');
        function press(val) { screen.value += val; }
        function clearScreen() { screen.value = ''; }
        function calculate() {
            try { if (screen.value) { screen.value = eval(screen.value); } }
            catch (error) { screen.value = 'Error'; }
        }

        // Completed Converter Code
        function runConversion() {
            const val = parseFloat(document.getElementById('conv-input').value);
            const type = document.getElementById('conv-type').value;
            const resBox = document.getElementById('conv-result');
            if (isNaN(val)) { resBox.textContent = "Enter a valid number"; return; }
            let res = 0;
            if (type === "miles-km") { res = (val * 1.60934).toFixed(2) + " km"; }
            else if (type === "km-miles") { res = (val / 1.60934).toFixed(2) + " mi"; }
            else if (type === "lbs-kg") { res = (val * 0.453592).toFixed(2) + " kg"; }
            else if (type === "kg-lbs") { res = (val / 0.453592).toFixed(2) + " lbs"; }
            else if (type === "f-c") { res = ((val - 32) * 5/9).toFixed(1) + " °C"; }
            else if (type === "c-f") { res = ((val * 9/5) + 32).toFixed(1) + " °F"; }
            resBox.textContent = res;
        }

        // New Password Utility
        function generatePassword() {
            let len = parseInt(document.getElementById('pass-length').value) || 12;
            if (len < 8) len = 8; if (len > 24) len = 24;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let pass = "";
