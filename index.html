<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blank tab</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b1016;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            gap: 20px;
            height: 95vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 450px;
            align-items: center;
        }
        #stats-panel {
            width: 100%;
            background: #161f2c;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 1.1em;
            font-weight: bold;
            border: 1px solid #233043;
            box-sizing: border-box;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
        }
        .stat-label { color: #b0bec5; font-size: 0.9em; }
        .stat-money { color: #ffd700; }
        .stat-val { color: #00bcd4; }
        
        #click-zone {
            width: 100%;
            height: 380px;
            background: #121820;
            border: 2px solid #233043;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #reactor-core {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #00f0ff 0%, #0044ff 70%, #121820 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px #0055ff;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        #reactor-core:active {
            transform: scale(0.92);
            box-shadow: 0 0 50px #00ffff;
        }
        .click-float {
            position: absolute;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.3em;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }

        #tycoon-panel {
            flex: 1;
            background: #161f2c;
            border: 2px solid #233043;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        h2 {
            margin-top: 0;
            color: #ffd700;
            border-bottom: 2px solid #233043;
            padding-bottom: 5px;
            font-size: 1.4em;
        }
        .category-title {
            font-size: 1.05em;
            color: #00bcd4;
            margin: 15px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 3px solid #00bcd4;
            padding-left: 6px;
        }
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .upgrade-card {
            background: #233043;
            border: 1px solid #34495e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .upgrade-card:hover {
            border-color: #00bcd4;
            background: #2c3e50;
        }
        .upgrade-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .upgrade-name { font-weight: bold; font-size: 0.95em; }
        .upgrade-desc { font-size: 0.8em; color: #b0bec5; }
        .upgrade-level { font-size: 0.8em; color: #4caf50; font-weight: bold; }
        
        .upgrade-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            min-width: 90px;
            text-align: center;
        }
        .upgrade-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
    </style>
</head>

            </div>
            <div class="stat-row">
                <span class="stat-label">AUTO-GENERATION:</span>

            <div class="stat-row">
                <span class="stat-label">CLICK COEFFICIENT:</span>
                <span class="stat-val">+$<span id="click-txt">1</span></span>
            </div>
        </div>
        
        <div id="click-zone">
            <div id="reactor-core"></div>
        </div>
    </div>
