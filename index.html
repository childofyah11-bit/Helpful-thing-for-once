<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Utility Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 30px;
            flex-wrap: wrap;
        }
        .panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 25px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        h2 {
            font-size: 1.2rem;
            color: #38bdf8;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Timer Styles */
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #f43f5e;
            font-family: monospace;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-start { background: #10b981; color: white; }
        .btn-start:hover { background: #059669; }
        .btn-reset { background: #64748b; color: white; }
        .btn-reset:hover { background: #475569; }
        
        /* Calculator Styles */
        .calc-screen {
            width: 100%;
            height: 50px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            text-align: right;
            padding: 10px;
            font-size: 1.5rem;
            margin-bottom: 15px;
            outline: none;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .btn-calc {
            background: #334155;
            color: white;
            font-size: 1.1rem;
        }
        .btn-calc:hover { background: #475569; }
        .btn-op { background: #f59e0b; }
        .btn-op:hover { background: #d97706; }
        .btn-clear { background: #ef4444; }
        .btn-clear:hover { background: #dc2626; }
    </style>
</head>
<body>

    <!-- Panel 1: Focus Timer -->
    <div class="panel">
        <h2>Focus Timer</h2>
        <div class="timer-display" id="timer">25:00</div>
        <div class="btn-group">
            <button class="btn-start" id="start-btn" onclick="toggleTimer()">Start</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Panel 2: Quick Calculator -->
    <div class="panel">
        <h2>Calculator</h2>
        <input type="text" class="calc-screen" id="screen" readonly>
        <div class="calc-grid">
            <button class="btn-calc btn-clear" onclick="clearScreen()">C</button>
            <button class="btn-calc btn-op" onclick="press('/')">/</button>
            <button class="btn-calc btn-op" onclick="press('*')">*</button>
            <button class="btn-calc btn-op" onclick="press('-')">-</button>
            
            <button class="btn-calc" onclick="press('7')">7</button>
            <button class="btn-calc" onclick="press('8')">8</button>
            <button class="btn-calc" onclick="press('9')">9</button>
            <button class="btn-calc btn-op" onclick="press('+')">+</button>
            
            <button class="btn-calc" onclick="press('4')">4</button>
            <button class="btn-calc" onclick="press('5')">5</button>
            <button class="btn-calc" onclick="press('6')">6</button>
            <button class="btn-calc btn-op" onclick="calculate()">=</button>
            
            <button class="btn-calc" onclick="press('1')">1</button>
            <button class="btn-calc" onclick="press('2')">2</button>
            <button class="btn-calc" onclick="press('3')">3</button>
            <button class="btn-calc" onclick="press('0')">0</button>
        </div>
    </div>

    <script>
        // Timer Logic
        let timeLeft = 1500; 
        let timerId = null;

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            if (timerId === null) {
                btn.textContent = "Pause";
                btn.style.background = "#f59e0b";
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerId);
                        alert("Time is up! Take a useful break.");
                        resetTimer();
                    }
                }, 1000);
            } else {
                clearInterval(timerId);
                timerId = null;
                btn.textContent = "Start";
                btn.style.background = "#10b981";
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 1500;
            updateTimerDisplay();
            const btn = document.getElementById('start-btn');
            btn.textContent = "Start";
            btn.style.background = "#10b981";
        }

        // Calculator Logic
        const screen = document.getElementById('screen');

        function press(val) {
            screen.value += val;
        }

        function clearScreen() {
            screen.value = '';
        }

        function calculate() {
            try {
                if (screen.value) {
                    screen.value = eval(screen.value);
                }
            } catch (error) {
                screen.value = 'Error';
            }
        }
    </script>
</body>
</html>
