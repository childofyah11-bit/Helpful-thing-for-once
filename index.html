<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioNet: Automated P2P Text Beacon</title>
    <!-- Imports the PeerJS network engine library package -->
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg-base: #0a0c10;
            --panel-card: #121620;
            --border-glow: #1f293d;
            --accent-cyan: #00f0ff;
            --accent-green: #39ff14;
            --alert-red: #ff3333;
            --txt-bright: #ffffff;
            --txt-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-base);
            color: var(--txt-bright);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .station-container {
            width: 100%;
            max-width: 550px;
            background: var(--panel-card);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 1.25rem; font-weight: 800; letter-spacing: 0.5px; color: var(--accent-cyan); text-transform: uppercase; }

        .status-pill {
            background: rgba(255, 51, 51, 0.1);
            color: var(--alert-red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(255, 51, 51, 0.2);
            text-transform: uppercase;
        }
        .status-pill.connected {
            background: rgba(57, 255, 20, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .deck {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glow);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h2 { margin: 0 0 12px 0; font-size: 0.8rem; font-weight: 700; color: var(--txt-muted); text-transform: uppercase; letter-spacing: 1px; }

        .beacon-id-display {
            font-family: monospace;
            font-size: 1.4rem;
            color: var(--accent-green);
            background: #06080c;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px dashed #22c55e;
            letter-spacing: 2px;
        }

        .input-row { display: flex; gap: 10px; }

        input[type="text"] {
            flex: 1;
            background: #06080c;
            color: #fff;
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            padding: 12px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        input[type="text"]:focus { outline: 1px solid var(--accent-cyan); }
        input[type="text"]:disabled { background: #0b0d14; color: #334155; cursor: not-allowed; }

        .btn {
            background: var(--accent-cyan);
            color: #000;
            font-weight: 700;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: opacity 0.15s ease;
        }
        .btn:hover:not(:disabled) { opacity: 0.85; }
        .btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

        .terminal {
            background: #06080c;
            border: 1px solid var(--border-glow);
            height: 180px;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #e2e8f0;
            line-height: 1.5;
        }
        .log-row { margin-bottom: 8px; border-bottom: 1px solid #0f131a; padding-bottom: 6px; }
        .log-time { color: var(--txt-muted); margin-right: 8px; }
        .log-tag { font-weight: bold; margin-right: 6px; }
    </style>
</head>
<body>

    <div class="station-container">
        <header>
            <h1>📡 P2P Text Beacon</h1>
            <div class="status-pill" id="statusBadge">Offline</div>
        </header>

        <!-- DEVICE A: Displays this panel to show its dynamic unique address ID -->
        <div class="deck">
            <h2>Your Local Beacon Tower Address ID</h2>
            <div class="beacon-id-display" id="localIdDisplay">GENERATING TARGET LINK...</div>
        </div>

        <!-- DEVICE B: Uses this panel to input Device A's address code -->
        <div class="deck">
            <h2>Link to Remote Station Address ID</h2>
            <div class="input-row">
                <input type="text" id="remoteIdInput" placeholder="Enter remote tower address id code...">
                <button class="btn" id="connectBtn" onclick="connectToRemoteTower()">Link</button>
            </div>
        </div>

        <!-- BROADCAST ROW PANEL -->
        <div class="deck">
            <h2>Broadcast Content Packet</h2>
            <div class="input-row">
                <input type="text" id="payloadInput" placeholder="Type transmission packet stream..." disabled onkeydown="if(event.key==='Enter') broadcastMessage()">
                <button class="btn" id="sendBtn" style="background: var(--accent-green);" disabled onclick="broadcastMessage()">Beam</button>
            </div>
        </div>

        <!-- TRANSMISSION DISPLACEMENT FEED -->
        <div class="terminal" id="terminalFeedBox">
            <div class="log-row" style="color: var(--txt-muted);">[SYSTEM] Active framework online. Awaiting signaling connection parameters...</div>
        </div>
    </div>

    <script>
        let peerEngineInstance = null;
        let activeDataChannelConnection = null;

        const localIdNode = document.getElementById('localIdDisplay');
        const remoteInputNode = document.getElementById('remoteIdInput');
        const connectButtonNode = document.getElementById('connectBtn');
        const textPayloadInputNode = document.getElementById('payloadInput');
        const sendButtonNode = document.getElementById('sendBtn');
        const feedTerminalBoxNode = document.getElementById('terminalFeedBox');
        const statusBadgeElementNode = document.getElementById('statusBadge');

        function appendFeedLog(labelTag, bodyText, colorHex = '#e2e8f0') {
            const rowElement = document.createElement('div');
            rowElement.classList.add('log-row');
            rowElement.style.color = colorHex;

            const currentTimeStamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            rowElement.innerHTML = `
                <span class="log-time">[${currentTimeStamp}]</span>
                <span class="log-tag" style="color: ${colorHex === '#e2e8f0' ? 'var(--txt-muted)' : 'inherit'}">${labelTag}:</span>
                <span>${bodyText}</span>
            `;

            feedTerminalBoxNode.appendChild(rowElement);
            feedTerminalBoxNode.scrollTop = feedTerminalBoxNode.scrollHeight;
        }

        // Initialize Peer Engine with a randomized unique string profile identifier
        function initializeNetworkBeacon() {
            // Generates a totally random, unique string ID tag to prevent any collision
            const generatedRandomId = "beacon-" + Math.floor(100000 + Math.random() * 900000);
            
            // Setup infrastructure layer targeting standard global STUN parameters
            peerEngineInstance = new Peer(generatedRandomId, {
                config: { iceServers: [{ urls: 'stun:://google.com' }] }
            });

            peerEngineInstance.on('open', (assignedId) => {
                localIdNode.textContent = assignedId;
                statusBadgeElementNode.textContent = "Awaiting Peer";
                appendFeedLog('SYS', 'Tower baseline initialized. Ready to receive incoming links.');
            });

            peerEngineInstance.on('error', (errorContext) => {
                appendFeedLog('ERROR', `Signaling breakdown: ${errorContext.type}`, 'var(--alert-red)');
            });

            // Catch incoming connections initiated from another machine automatically
            peerEngineInstance.on('connection', (incomingConnection) => {
                if (activeDataChannelConnection) return; // Channel busy safety lock
                wireDataStreams(incomingConnection);
            });
        }

        // --- CONNECT AS AN OUTBOUND TRANSMITTER ---
        function connectToRemoteTower() {
            const targetRemoteId = remoteInputNode.value.trim();
            if (!targetRemoteId) return alert("Please specify a valid destination address id code!");

            appendFeedLog('NET', `Attempting connection handshakes with remote station: [${targetRemoteId}]...`);
            
            const outboundConnection = peerEngineInstance.connect(targetRemoteId);
            wireDataStreams(outboundConnection);
        }

        // --- WIRE AND CAPTURE SYSTEM EVENTS ---
        function wireDataStreams(connectionInstance) {
            activeDataChannelConnection = connectionInstance;

            activeDataChannelConnection.on('open', () => {
                statusBadgeElementNode.textContent = "Connected";
                statusBadgeElementNode.classList.add('connected');
